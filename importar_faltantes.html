function log(msg, type='info') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = type; d.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function pb(pct) { document.getElementById('pb').style.width = pct+'%'; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function toFS(data) {
  const fields = {};
  for (const [k,v] of Object.entries(data)) {
    if (typeof v === 'string') fields[k] = {stringValue: v};
    else if (typeof v === 'number') fields[k] = {integerValue: String(v)};
    else if (typeof v === 'boolean') fields[k] = {booleanValue: v};
  }
  return {fields};
}

function normNombre(n) {
  return n.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

async function importar() {
  document.getElementById('btn').disabled = true;
  log('Cargando operarios actuales de Firestore...', 'info');

  // Cargar todos los operarios existentes
  let existentes = [];
  let pageToken = '';
  do {
    const url = API + '/horas_usuarios?pageSize=300' + (pageToken ? '&pageToken='+encodeURIComponent(pageToken) : '');
    const r = await fetch(url);
    const d = await r.json();
    if (d.documents) {
      for (const doc of d.documents) {
        const f = doc.fields || {};
        existentes.push({
          nombre: normNombre(f.nombre?.stringValue || ''),
          legajo: f.legajo?.stringValue || '',
          dni: f.dni?.stringValue || ''
        });
      }
    }
    pageToken = d.nextPageToken || '';
    await sleep(300);
  } while(pageToken);

  log(`✓ ${existentes.length} operarios en Firestore`, 'ok');
  document.getElementById('s-total').textContent = existentes.length;

  // Detectar faltantes — comparar por nombre normalizado o legajo
  const faltantes = EXCEL_OPS.filter(op => {
    const nombreNorm = normNombre(op.nombre);
    const enFS = existentes.find(e =>
      e.nombre === nombreNorm ||
      e.legajo === op.legajo ||
      e.dni === op.legajo
    );
    return !enFS;
  });

  log(`Faltantes detectados: ${faltantes.length}`, faltantes.length > 0 ? 'warn' : 'ok');
  document.getElementById('s-faltantes').textContent = faltantes.length;
  pb(20);

  if (faltantes.length === 0) {
    log('✅ Todos los operarios ya están en Firestore', 'ok');
    pb(100);
    return;
  }

  log('Agregando operarios faltantes...', 'info');
  let ok = 0, err = 0;

  for (let i = 0; i < faltantes.length; i++) {
    const op = faltantes[i];
    const data = {
      nombre: op.nombre,
      dni: op.legajo,
      legajo: op.legajo,
      password: op.pass,
      horasRecibo: op.horas,
      rol: 'OPERARIO',
      tipo: 'FIJO',
      activo: true
    };

    try {
      const r = await fetch(API + '/horas_usuarios', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(toFS(data))
      });
      if (r.ok) {
        ok++;
        log(`✓ ${op.nombre}`, 'ok');
      } else {
        err++;
        log(`Error ${op.nombre}`, 'err');
      }
    } catch(e) { err++; }

    document.getElementById('s-ok').textContent = ok;
    document.getElementById('s-err').textContent = err;
    pb(20 + (i+1)/faltantes.length*80);
    await sleep(150);
  }

  pb(100);
  log('', 'info');
  log(`✅ COMPLETO — Agregados: ${ok} · Errores: ${err}`, 'ok');
  log('Recargá la app y van a aparecer todos los operarios', 'info');
}
