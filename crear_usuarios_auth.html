<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaClean · Crear Usuarios Auth</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f4f7fa;color:#1a2533;padding:24px}
  h1{color:#1a8fcb;font-size:22px;margin-bottom:4px}
  .sub{color:#7a8899;font-size:13px;margin-bottom:20px}
  .card{background:#fff;border:1.5px solid #dce3ed;border-radius:14px;padding:20px;margin-bottom:16px;max-width:640px}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
  .stat{font-size:36px;font-weight:900;color:#1a8fcb}
  .stat-label{font-size:11px;color:#8fa3b8;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
  .btn{background:linear-gradient(135deg,#1a8fcb,#0e6fa0);color:#fff;border:none;border-radius:10px;padding:13px 24px;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;width:100%;max-width:640px;display:block;margin-bottom:10px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-green{background:linear-gradient(135deg,#27a85a,#1d7a42)}
  .progress{background:#dce3ed;border-radius:4px;height:6px;max-width:640px;margin-bottom:12px;overflow:hidden}
  .progress-bar{height:100%;background:#1a8fcb;transition:width .2s;width:0%;border-radius:4px}
  .log{background:#1a2533;border-radius:10px;padding:14px;height:340px;overflow-y:auto;font-family:monospace;font-size:12px;max-width:640px}
  .ok{color:#27a85a}.err{color:#d63d4a}.info{color:#1a8fcb}.warn{color:#e07b2a}
  .field{margin-bottom:12px;max-width:640px}
  .field label{display:block;font-size:11px;font-weight:700;color:#8fa3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .field input{width:100%;background:#f4f7fa;border:1.5px solid #dce3ed;color:#1a2533;padding:9px 12px;border-radius:8px;font-size:14px;outline:none}
</style>
</head>
<body>
<h1>MEGACLEAN · CREAR USUARIOS AUTH</h1>
<div class="sub">Paso 1: autenticá con tu DNI admin → Paso 2: crea todos los usuarios</div>

<div class="field">
  <label>API Key Firebase</label>
  <input id="api-key" value="AIzaSyBg7lvQteUOaHwEyI1qe1OUPK81-9DL0Ng">
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:640px;margin-bottom:12px">
  <div class="field" style="margin:0">
    <label>Tu DNI (admin)</label>
    <input id="login-dni" placeholder="25365716">
  </div>
  <div class="field" style="margin:0">
    <label>Tu contraseña</label>
    <input id="login-pass" type="password" placeholder="••••••••">
  </div>
</div>

<button class="btn" id="btn-login" onclick="loginAdmin()">1. AUTENTICAR COMO ADMIN</button>
<button class="btn btn-green" id="btn-crear" onclick="crearTodos()" disabled>2. CREAR TODOS LOS USUARIOS</button>

<div class="card">
  <div class="grid">
    <div><div class="stat" id="stat-total">—</div><div class="stat-label">Operarios</div></div>
    <div><div class="stat" id="stat-ok" style="color:#27a85a">0</div><div class="stat-label">Creados</div></div>
    <div><div class="stat" id="stat-exist" style="color:#e07b2a">0</div><div class="stat-label">Ya existían</div></div>
    <div><div class="stat" id="stat-err" style="color:#d63d4a">0</div><div class="stat-label">Errores</div></div>
  </div>
</div>

<div class="progress"><div class="progress-bar" id="pb"></div></div>
<div class="log" id="log"></div>

<script>
const FIRESTORE = 'https://firestore.googleapis.com/v1/projects/mega-clean-12f17/databases/(default)/documents';
let _token = null;
let _operarios = [];
let _app = null;

function log(msg, type='info') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = type; d.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function pb(pct) { document.getElementById('pb').style.width = pct + '%'; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function ultimosTres(dni) { return String(dni).replace(/\D/g,'').slice(-3) || '000'; }
function toFS(d) {
  const f={};
  for(const[k,v]of Object.entries(d)){
    if(typeof v==='string')f[k]={stringValue:v};
    else if(typeof v==='number')f[k]={integerValue:String(v)};
    else if(typeof v==='boolean')f[k]={booleanValue:v};
  }
  return{fields:f};
}

async function loginAdmin() {
  const apiKey = document.getElementById('api-key').value.trim();
  const dni = document.getElementById('login-dni').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  if (!apiKey || !dni || !pass) { alert('Completá todos los campos'); return; }

  // Inicializar Firebase
  if (!_app) {
    _app = firebase.initializeApp({
      apiKey,
      authDomain: 'mega-clean-12f17.firebaseapp.com',
      projectId: 'mega-clean-12f17'
    });
  }

  const email = dni + '@megaclean.com.ar';
  log('Autenticando ' + email + '...', 'info');

  try {
    const cred = await firebase.auth().signInWithEmailAndPassword(email, pass);
    _token = await cred.user.getIdToken();
    log('✓ Autenticado correctamente', 'ok');
    log('Cargando operarios de Firestore con token...', 'info');

    // Cargar TODOS los operarios con token
    _operarios = [];
    let pageToken = '';
    let pages = 0;
    do {
      const url = FIRESTORE + '/horas_usuarios?pageSize=300' + (pageToken ? '&pageToken='+encodeURIComponent(pageToken) : '');
      const r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + _token } });
      const d = await r.json();
      if (d.documents) {
        for (const doc of d.documents) {
          const f = doc.fields || {};
          const id = doc.name.split('/').pop();
          const dni2 = f.dni?.stringValue || '';
          const nombre = f.nombre?.stringValue || '';
          const passExist = f.password?.stringValue || '';
          if (!dni2) continue;
          const pass2 = passExist || ultimosTres(dni2);
          _operarios.push({ id, dni: dni2, nombre, pass: pass2, passExist, rol: f.rol?.stringValue||'OPERARIO' });
        }
      }
      pageToken = d.nextPageToken || '';
      if (pageToken) await sleep(300);
      pages++;
    } while (pageToken && pages < 10);

    log(`✓ ${_operarios.length} operarios cargados`, 'ok');
    document.getElementById('stat-total').textContent = _operarios.length;
    document.getElementById('btn-crear').disabled = false;
    document.getElementById('btn-login').disabled = true;

  } catch(e) {
    log('Error: ' + e.message, 'err');
    log('Si el error es "user not found", primero creá tu usuario admin manualmente', 'warn');
  }
}

async function crearTodos() {
  const apiKey = document.getElementById('api-key').value.trim();
  const AUTH_URL = `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`;
  document.getElementById('btn-crear').disabled = true;

  // Agregar admins hardcoded
  const todos = [..._operarios,
    { id:'adm1', dni:'25365716', nombre:'Roberto Admin', pass:'1945', passExist:'1945' },
    { id:'adm2', dni:'admin', nombre:'Administrador', pass:'admin1234', passExist:'admin1234' }
  ];

  log(`Creando ${todos.length} usuarios en Firebase Auth...`, 'info');
  let ok=0, exist=0, err=0;
  const sinPass=[];

  for (let i=0; i<todos.length; i++) {
    const op = todos[i];
    const email = op.dni + '@megaclean.com.ar';
    let pass = op.pass;
    // Firebase requiere mínimo 6 chars
    while (pass.length < 6) pass = pass + pass;
    pass = pass.slice(0,6);

    try {
      const r = await fetch(AUTH_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, password: pass, returnSecureToken:false})
      });
      const d = await r.json();

      if (d.error) {
        if (d.error.message === 'EMAIL_EXISTS') {
          exist++;
        } else {
          err++;
          log(`Error ${op.nombre}: ${d.error.message}`, 'err');
        }
      } else {
        ok++;
        // Si no tenía contraseña, guardarla en Firestore
        if (!op.passExist && op.id && !op.id.startsWith('adm')) {
          const mask = 'updateMask.fieldPaths=password';
          await fetch(`${FIRESTORE}/horas_usuarios/${op.id}?${mask}`, {
            method:'PATCH',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+_token},
            body: JSON.stringify(toFS({password: op.pass}))
          });
          sinPass.push(`${op.nombre} (DNI: ${op.dni}) → contraseña: ${op.pass}`);
        }
      }
    } catch(e) { err++; }

    document.getElementById('stat-ok').textContent = ok;
    document.getElementById('stat-exist').textContent = exist;
    document.getElementById('stat-err').textContent = err;
    pb((i+1)/todos.length*100);
    if ((i+1)%20===0) log(`${i+1}/${todos.length} · OK:${ok} · Exist:${exist} · Err:${err}`, 'ok');
    await sleep(80);
  }

  pb(100);
  log('', 'info');
  log('✅ PROCESO COMPLETO', 'ok');
  log(`Creados: ${ok} · Ya existían: ${exist} · Errores: ${err}`, 'ok');
  if (sinPass.length > 0) {
    log('', 'info');
    log('--- CONTRASEÑAS ASIGNADAS AUTOMÁTICAMENTE ---', 'warn');
    for (const s of sinPass) log(s, 'warn');
    log('Guardá esta lista con las contraseñas por defecto', 'warn');
  }
}
</script>
</body>
</html>
