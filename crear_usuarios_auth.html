  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function pb(pct) { document.getElementById('pb').style.width = pct + '%'; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function crearTodos() {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { alert('Completá el API Key'); return; }
  document.getElementById('btn-go').disabled = true;
  const AUTH_URL = `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`;

  log(`Creando ${OPERARIOS.length} usuarios...`, 'info');
  log('Contraseña por defecto = últimos 3 dígitos del legajo (completado a 6)', 'warn');
  let ok=0, exist=0, err=0;
  const sinPass=[];

  for (let i=0; i<OPERARIOS.length; i++) {
    const op = OPERARIOS[i];
    const email = op.dni + '@megaclean.com.ar';
    const pass = op.passAuth;

    try {
      const r = await fetch(AUTH_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, password: pass, returnSecureToken:false})
      });
      const d = await r.json();
      if (d.error) {
        if (d.error.message === 'EMAIL_EXISTS') {
          exist++;
        } else {
          err++;
          log(`Error ${op.nombre}: ${d.error.message}`, 'err');
        }
      } else {
        ok++;
        sinPass.push(`${op.nombre} (Leg.${op.dni}) → clave: ${op.passCorta}`);
      }
    } catch(e) { err++; }

    document.getElementById('stat-ok').textContent = ok;
    document.getElementById('stat-exist').textContent = exist;
    document.getElementById('stat-err').textContent = err;
    pb((i+1)/OPERARIOS.length*100);
    if ((i+1)%20===0) log(`${i+1}/${OPERARIOS.length} · OK:${ok} · Exist:${exist} · Err:${err}`, 'ok');
    await sleep(80);
  }

  pb(100);
  log('', 'info');
  log('✅ PROCESO COMPLETO', 'ok');
  log(`Creados: ${ok} · Ya existían: ${exist} · Errores: ${err}`, 'ok');
  log('', 'info');
  log('--- CONTRASEÑAS DE ACCESO (guardá esta lista) ---', 'warn');
  for (const s of sinPass) log(s, 'warn');
}
