<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaClean Gestión</title>

<style>
body { font-family: Arial; background:#f4f7fa; }
.container { max-width:600px; margin:auto; padding:20px; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
.btn { padding:12px; margin-top:10px; width:100%; border:none; border-radius:8px; }
.btn-entrar { background:#27a85a; color:#fff; }
.btn-ver { background:#1a8fcb; color:#fff; }
.login-box { background:#fff; padding:20px; border-radius:10px; text-align:center; }
input { padding:10px; width:100%; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<div id="login">
  <div class="login-box">
    <h2>Ingreso Operario</h2>
    <input type="text" id="usuario" placeholder="Apellido">
    <button class="btn btn-entrar" onclick="login()">Ingresar</button>
  </div>
</div>

<div id="app" style="display:none;">
  <h2>Gestión de Horas</h2>
  <button onclick="logout()">Cerrar sesión</button>
  <button class="btn btn-ver" onclick="verResumen()">Ver resumen completo</button>
  <div id="resumen"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBg7lvQteUOaHwEyI1qe1OUPK81-9DL0Ng",
  authDomain: "mega-clean-12f17.firebaseapp.com",
  projectId: "mega-clean-12f17",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let OPERARIO_ID = null;

// LOGIN
async function login() {
  const input = document.getElementById("usuario").value.toLowerCase().trim();
  if (!input) return alert("Ingresá tu apellido");

  const snapshot = await db.collection("horas_usuarios").get();

  let encontrado = null;

  snapshot.forEach(doc => {
    if (doc.id.includes(input)) {
      encontrado = doc.id;
    }
  });

  if (!encontrado) return alert("Operario no encontrado");

  localStorage.setItem("operario_id", encontrado);
  iniciarApp();
}

function logout() {
  localStorage.removeItem("operario_id");
  location.reload();
}

function iniciarApp() {
  OPERARIO_ID = localStorage.getItem("operario_id");
  if (!OPERARIO_ID) return;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// ================= RESUMEN =================
async function verResumen() {

  const hoy = new Date();
  const mes = hoy.getMonth();
  const año = hoy.getFullYear();

  // 🔥 RECIBO
  const userDoc = await db.collection("horas_usuarios").doc(OPERARIO_ID).get();
  const horasRecibo = userDoc.data().horasRecibo || 0;

  // 🔥 SERVICIOS
  const serviciosSnap = await db.collection("horas_servicios").get();

  let mapaServicios = {};
  let horasObjetivo = 0;

  serviciosSnap.forEach(doc => {

    const data = doc.data();
    mapaServicios[doc.id] = data;

    if (!data.operarios || !data.operarios.includes(OPERARIO_ID)) return;
    if (data.tipo !== "FIJO") return;

    if (data.horaInicio && data.horaFin && data.dias) {

      const [h1, m1] = data.horaInicio.split(":").map(Number);
      const [h2, m2] = data.horaFin.split(":").map(Number);

      const horasDia = (h2 + m2/60) - (h1 + m1/60);
      const diasSemana = data.dias.length;

      horasObjetivo += horasDia * diasSemana * 4;
    }
  });

  // 🔥 FICHAJES (VARIABLES)
  const fichajesSnap = await db.collection("fichajes")
    .where("operario","==",OPERARIO_ID)
    .get();

  let entrada = null;
  let variableMs = 0;

  fichajesSnap.forEach(doc => {

    const d = doc.data();
    if (!d.timestamp) return;

    const fecha = new Date(d.timestamp);

    if (fecha.getMonth() !== mes || fecha.getFullYear() !== año) return;

    if (d.tipo === "entrada") {
      entrada = { t: d.timestamp, servicio: d.servicio };
    }

    if (d.tipo === "salida" && entrada) {

      const duracion = d.timestamp - entrada.t;

      const servicioData = mapaServicios[entrada.servicio];

      if (!servicioData || servicioData.tipo !== "FIJO") {
        variableMs += duracion;
      }

      entrada = null;
    }
  });

  const horasVariables = variableMs / 1000 / 60 / 60;

  // 💣 TOTAL CORRECTO
  const totalTrabajado = horasObjetivo + horasVariables;

  const diferencia = totalTrabajado - horasRecibo;

  document.getElementById("resumen").innerHTML = `
    <div class="card">
      <b>Operario:</b> ${OPERARIO_ID}<br><br>

      <b>FIJO objetivo:</b> ${horasObjetivo.toFixed(1)}<br>
      <b>VARIABLE:</b> ${horasVariables.toFixed(1)}<br><br>

      <b>TOTAL trabajado:</b> ${totalTrabajado.toFixed(1)}<br>
      <b>RECIBO:</b> ${horasRecibo}<br><br>

      <b>DIFERENCIA FINAL:</b> ${diferencia.toFixed(1)} hs<br>
      <b>${diferencia >= 0 ? "PAGAR HORAS EXTRA" : "DEBE HORAS"}</b>
    </div>
  `;
}

iniciarApp();

</script>

</body>
</html>
