<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaClean Gestión</title>

<style>
body { font-family: Arial; background:#f4f7fa; }
.container { max-width:600px; margin:auto; padding:20px; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
.btn { padding:12px; margin-top:10px; width:100%; border:none; border-radius:8px; }
.btn-entrar { background:#27a85a; color:#fff; }
.btn-salir { background:#d63d4a; color:#fff; }
.btn-ver { background:#1a8fcb; color:#fff; }
.estado { padding:5px; border-radius:5px; font-size:12px; display:inline-block; }
.activo { background:#27a85a; color:#fff; }
.inactivo { background:#999; color:#fff; }
.login-box { background:#fff; padding:20px; border-radius:10px; text-align:center; }
input { padding:10px; width:100%; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<div id="login">
  <div class="login-box">
    <h2>Ingreso Operario</h2>
    <input type="text" id="usuario" placeholder="Apellido">
    <button class="btn btn-entrar" onclick="login()">Ingresar</button>
  </div>
</div>

<div id="app" style="display:none;">
  <h2>Gestión de Horas</h2>
  <button onclick="logout()">Cerrar sesión</button>
  <button class="btn btn-ver" onclick="verResumen()">Ver resumen</button>
  <div id="resumen"></div>
  <div id="servicios"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBg7lvQteUOaHwEyI1qe1OUPK81-9DL0Ng",
  authDomain: "mega-clean-12f17.firebaseapp.com",
  projectId: "mega-clean-12f17",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let OPERARIO_ACTUAL = null;

// ================= LOGIN =================
function login() {
  const user = document.getElementById("usuario").value.toLowerCase().trim();
  if (!user) return alert("Ingresá tu apellido");

  localStorage.setItem("operario", user);
  iniciarApp();
}

function logout() {
  localStorage.removeItem("operario");
  location.reload();
}

function iniciarApp() {
  OPERARIO_ACTUAL = localStorage.getItem("operario");
  if (!OPERARIO_ACTUAL) return;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// ================= RESUMEN =================
async function verResumen() {

  const hoy = new Date();
  const mes = hoy.getMonth();
  const año = hoy.getFullYear();

  // 🔥 HORAS RECIBO
  const userDoc = await db.collection("horas_usuarios").doc("op_"+OPERARIO_ACTUAL).get();
  const horasRecibo = userDoc.exists ? userDoc.data().horasRecibo || 0 : 0;

  // 🔥 HORAS TRABAJADAS
  const fichajes = await db.collection("fichajes")
    .where("operario","==",OPERARIO_ACTUAL)
    .get();

  let totalMs = 0;
  let entrada = null;

  fichajes.forEach(doc => {
    const d = doc.data();
    const fecha = new Date(d.timestamp);

    if (fecha.getMonth() !== mes || fecha.getFullYear() !== año) return;

    if (d.tipo === "entrada") entrada = d.timestamp;
    if (d.tipo === "salida" && entrada) {
      totalMs += (d.timestamp - entrada);
      entrada = null;
    }
  });

  const horasTrabajadas = totalMs / 1000 / 60 / 60;

  // 🔥 HORAS OBJETIVO
  const servicios = await db.collection("horas_servicios").get();

  let horasObjetivo = 0;

  servicios.forEach(doc => {
    const data = doc.data();

    if (!data.operarios || !data.operarios.includes("op_"+OPERARIO_ACTUAL)) return;
    if (data.tipo !== "FIJO") return;

    if (data.horariosPorDia) {
      const horarios = JSON.parse(data.horariosPorDia);

      Object.values(horarios).forEach(dia => {
        horasObjetivo += dia.hs * 4;
      });
    }
  });

  const diferencia = horasTrabajadas - horasRecibo;

  document.getElementById("resumen").innerHTML = `
    <div class="card">
      <b>Horas objetivo:</b> ${horasObjetivo.toFixed(1)}<br>
      <b>Horas trabajadas:</b> ${horasTrabajadas.toFixed(1)}<br>
      <b>Horas recibo:</b> ${horasRecibo}<br><br>

      <b>Diferencia:</b> ${diferencia.toFixed(1)} hs<br>
      <b>${diferencia >= 0 ? "PAGAR" : "DEBE HORAS"}</b>
    </div>
  `;
}

</script>

</body>
</html>
