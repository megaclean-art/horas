<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaClean Gestión</title>

<style>
body { font-family: Arial; background:#f4f7fa; }
.container { max-width:900px; margin:auto; padding:20px; }

.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }

.btn { padding:12px; margin-top:10px; width:100%; border:none; border-radius:8px; cursor:pointer; }

.btn-entrar { background:#27a85a; color:#fff; }
.btn-ver { background:#1a8fcb; color:#fff; }

input { padding:10px; width:100%; margin-top:10px; }

.row-ok { border-left:6px solid #27a85a; }
.row-debe { border-left:6px solid #d63031; }
.row-extra { border-left:6px solid #f39c12; }
</style>
</head>

<body>

<div class="container">

<h2>Panel MegaClean</h2>

<input type="text" id="usuario" placeholder="Apellido o admin">
<button class="btn btn-entrar" onclick="login()">Ingresar</button>

<div id="contenido"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBg7lvQteUOaHwEyI1qe1OUPK81-9DL0Ng",
  authDomain: "mega-clean-12f17.firebaseapp.com",
  projectId: "mega-clean-12f17",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let esAdmin = false;
let OPERARIO_ID = null;

// LOGIN
async function login() {

  const input = document.getElementById("usuario").value.toLowerCase().trim();

  if (input === "admin") {
    esAdmin = true;
    cargarAdmin();
    return;
  }

  const snapshot = await db.collection("horas_usuarios").get();

  snapshot.forEach(doc => {
    if (doc.id.includes(input)) {
      OPERARIO_ID = doc.id;
    }
  });

  if (!OPERARIO_ID) return alert("No encontrado");

  cargarOperario();
}

// ================= ADMIN =================
async function cargarAdmin() {

  const cont = document.getElementById("contenido");
  cont.innerHTML = "<h3>Cargando...</h3>";

  const hoy = new Date();
  const mes = hoy.getMonth();
  const año = hoy.getFullYear();

  const usuarios = await db.collection("horas_usuarios").get();
  const servicios = await db.collection("horas_servicios").get();
  const fichajes = await db.collection("fichajes").get();

  let mapaServicios = {};
  servicios.forEach(s => mapaServicios[s.id] = s.data());

  let html = "";

  for (const userDoc of usuarios.docs) {

    const userId = userDoc.id;
    const user = userDoc.data();

    let horasObjetivo = 0;
    let variableMs = 0;

    // FIJO
    servicios.forEach(doc => {

      const data = doc.data();

      if (!data.operarios || !data.operarios.includes(userId)) return;
      if (data.tipo !== "FIJO") return;

      const [h1, m1] = data.horaInicio.split(":").map(Number);
      const [h2, m2] = data.horaFin.split(":").map(Number);

      const horasDia = (h2 + m2/60) - (h1 + m1/60);
      const diasSemana = data.dias.length;

      horasObjetivo += horasDia * diasSemana * 4;
    });

    // VARIABLE
    let entrada = null;

    fichajes.forEach(f => {

      const d = f.data();
      if (d.operario !== userId || !d.timestamp) return;

      const fecha = new Date(d.timestamp);
      if (fecha.getMonth() !== mes || fecha.getFullYear() !== año) return;

      if (d.tipo === "entrada") entrada = { t: d.timestamp, servicio: d.servicio };

      if (d.tipo === "salida" && entrada) {

        const servicio = mapaServicios[entrada.servicio];

        if (!servicio || servicio.tipo !== "FIJO") {
          variableMs += (d.timestamp - entrada.t);
        }

        entrada = null;
      }

    });

    const horasVariables = variableMs / 1000 / 60 / 60;
    const total = horasObjetivo + horasVariables;
    const recibo = user.horasRecibo || 0;

    const diff = total - recibo;

    let clase = "row-ok";
    if (diff < -5) clase = "row-debe";
    if (diff > 5) clase = "row-extra";

    html += `
      <div class="card ${clase}">
        <b>${user.nombre}</b><br>
        FIJO: ${horasObjetivo.toFixed(1)} |
        VAR: ${horasVariables.toFixed(1)} |
        TOTAL: ${total.toFixed(1)} |
        RECIBO: ${recibo} |
        DIF: ${diff.toFixed(1)}
      </div>
    `;
  }

  cont.innerHTML = html;
}

// ================= OPERARIO =================
function cargarOperario() {
  document.getElementById("contenido").innerHTML =
    "<h3>Modo operario activo (usar versión anterior)</h3>";
}

</script>

</body>
</html>
