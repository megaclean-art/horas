<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaClean Gestión</title>

<style>
body { font-family: Arial; background:#f4f7fa; }
.container { max-width:600px; margin:auto; padding:20px; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
.btn { padding:12px; margin-top:10px; width:100%; border:none; border-radius:8px; }
.btn-entrar { background:#27a85a; color:#fff; }
.btn-salir { background:#d63d4a; color:#fff; }
.estado { padding:5px; border-radius:5px; font-size:12px; display:inline-block; }
.activo { background:#27a85a; color:#fff; }
.inactivo { background:#999; color:#fff; }
.login-box { background:#fff; padding:20px; border-radius:10px; text-align:center; }
input { padding:10px; width:100%; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<div id="login">
  <div class="login-box">
    <h2>Ingreso Operario</h2>
    <input type="text" id="usuario" placeholder="Apellido">
    <button class="btn btn-entrar" onclick="login()">Ingresar</button>
  </div>
</div>

<div id="app" style="display:none;">
  <h2>Gestión de Horas</h2>
  <button onclick="logout()">Cerrar sesión</button>
  <div id="servicios">Cargando...</div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBg7lvQteUOaHwEyI1qe1OUPK81-9DL0Ng",
  authDomain: "mega-clean-12f17.firebaseapp.com",
  projectId: "mega-clean-12f17",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let OPERARIO_ACTUAL = null;
let estadoOperario = {};

// ================= LOGIN =================
function login() {
  const user = document.getElementById("usuario").value.toLowerCase().trim();
  if (!user) return alert("Ingresá tu apellido");

  localStorage.setItem("operario", user);
  iniciarApp();
}

function logout() {
  localStorage.removeItem("operario");
  location.reload();
}

function iniciarApp() {
  OPERARIO_ACTUAL = localStorage.getItem("operario");
  if (!OPERARIO_ACTUAL) return;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  cargarServicios();
}

// ================= GPS =================
function obtenerUbicacion() {
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      pos => resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      }),
      () => resolve({ lat: -31.42, lng: -64.18 })
    );
  });
}

// ================= DÍA =================
function obtenerDia() {
  const dias = ["DOM","LUN","MAR","MIE","JUE","VIE","SAB"];
  return dias[new Date().getDay()];
}

// ================= SERVICIOS =================
async function cargarServicios() {

  const diaHoy = obtenerDia();
  const snapshot = await db.collection("horas_servicios").get();

  let servicios = [];

  snapshot.forEach(doc => {
    const data = doc.data();

    if (!doc.id.toLowerCase().includes(OPERARIO_ACTUAL)) return;
    if (!data.dias || !data.dias.includes(diaHoy)) return;

    servicios.push({
      id: doc.id,
      cliente: data.cliente,
      direccion: data.direccion
    });
  });

  renderServicios(servicios);
}

// ================= RENDER =================
function renderServicios(servicios) {

  const cont = document.getElementById("servicios");
  cont.innerHTML = "";

  if (servicios.length === 0) {
    cont.innerHTML = "No tenés servicios hoy";
    return;
  }

  servicios.forEach(s => {

    const trabajando = estadoOperario[s.id] === true;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${s.cliente}</b><br>
      <small>${s.direccion}</small><br>
      <span class="estado ${trabajando ? 'activo' : 'inactivo'}">
        ${trabajando ? 'Trabajando' : 'No activo'}
      </span><br>

      ${!trabajando ? `
        <button class="btn btn-entrar" onclick="fichar('${s.id}','entrada')">Entrar</button>
      ` : ''}

      ${trabajando ? `
        <button class="btn btn-salir" onclick="fichar('${s.id}','salida')">Salir</button>
      ` : ''}
    `;

    cont.appendChild(div);
  });
}

// ================= FICHAR REAL =================
async function fichar(id, tipo) {

  const ubicacion = await obtenerUbicacion();
  const ahora = new Date();

  if (tipo === "entrada") {
    if (estadoOperario[id]) return alert("Ya estás trabajando");
    estadoOperario[id] = true;
  } else {
    if (!estadoOperario[id]) return alert("No podés salir sin entrar");
    estadoOperario[id] = false;
  }

  // 🔥 GUARDAR EN FIREBASE
  await db.collection("fichajes").add({
    operario: OPERARIO_ACTUAL,
    servicio: id,
    tipo: tipo,
    fecha: ahora.toISOString().split("T")[0],
    hora: ahora.toLocaleTimeString(),
    lat: ubicacion.lat,
    lng: ubicacion.lng
  });

  alert("Fichada guardada ✔");

  cargarServicios();
}

// ================= INIT =================
iniciarApp();

</script>

</body>
</html>
