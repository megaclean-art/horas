<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaClean Panel</title>

<style>
body {
  font-family: Arial;
  background: #eef2f6;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

h2 {
  margin-bottom: 10px;
}

input {
  padding: 10px;
  width: 100%;
  margin-bottom: 10px;
}

.btn {
  padding: 12px;
  width: 100%;
  background: #27a85a;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 10px;
  margin-top: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
}

.ok { border-left: 6px solid #27a85a; }
.debe { border-left: 6px solid #d63031; }
.extra { border-left: 6px solid #f39c12; }

.rank-title {
  margin-top: 30px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

<h2>Panel MegaClean</h2>

<input type="text" id="usuario" placeholder="Ingresar 'admin'">
<button class="btn" onclick="login()">Entrar</button>

<div id="contenido"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBg7lvQteUOaHwEyI1qe1OUPK81-9DL0Ng",
  authDomain: "mega-clean-12f17.firebaseapp.com",
  projectId: "mega-clean-12f17",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function login() {

  const input = document.getElementById("usuario").value;

  if (input !== "admin") return alert("Solo admin");

  cargarDashboard();
}

// ================= DASHBOARD =================
async function cargarDashboard() {

  const cont = document.getElementById("contenido");
  cont.innerHTML = "Cargando...";

  const hoy = new Date();
  const mes = hoy.getMonth();
  const año = hoy.getFullYear();

  const usuarios = await db.collection("horas_usuarios").get();
  const servicios = await db.collection("horas_servicios").get();
  const fichajes = await db.collection("fichajes").get();

  let mapaServicios = {};
  servicios.forEach(s => mapaServicios[s.id] = s.data());

  let resultados = [];

  for (const u of usuarios.docs) {

    const userId = u.id;
    const user = u.data();

    let horasObjetivo = 0;
    let variableMs = 0;

    // FIJO
    servicios.forEach(s => {

      const data = s.data();

      if (!data.operarios || !data.operarios.includes(userId)) return;
      if (data.tipo !== "FIJO") return;

      const [h1,m1] = data.horaInicio.split(":").map(Number);
      const [h2,m2] = data.horaFin.split(":").map(Number);

      const horasDia = (h2+m2/60)-(h1+m1/60);
      const dias = data.dias.length;

      horasObjetivo += horasDia * dias * 4;
    });

    // VARIABLE
    let entrada = null;

    fichajes.forEach(f => {

      const d = f.data();

      if (d.operario !== userId || !d.timestamp) return;

      const fecha = new Date(d.timestamp);
      if (fecha.getMonth() !== mes || fecha.getFullYear() !== año) return;

      if (d.tipo === "entrada") entrada = {t:d.timestamp, servicio:d.servicio};

      if (d.tipo === "salida" && entrada) {

        const serv = mapaServicios[entrada.servicio];

        if (!serv || serv.tipo !== "FIJO") {
          variableMs += (d.timestamp - entrada.t);
        }

        entrada = null;
      }
    });

    const variable = variableMs / 1000 / 60 / 60;
    const total = horasObjetivo + variable;
    const recibo = user.horasRecibo || 0;

    const diff = total - recibo;

    resultados.push({
      nombre: user.nombre,
      fijo: horasObjetivo,
      variable,
      total,
      recibo,
      diff
    });
  }

  // 🔥 RANKING
  resultados.sort((a,b)=>b.diff - a.diff);

  // 🔝 TOP
  const top = resultados.slice(0,5);
  const bottom = resultados.slice(-5).reverse();

  let html = "";

  html += `<div class="rank-title">🏆 Mejores</div><div class="grid">`;
  top.forEach(r => html += cardHTML(r));
  html += "</div>";

  html += `<div class="rank-title">⚠️ Deben horas</div><div class="grid">`;
  bottom.forEach(r => html += cardHTML(r));
  html += "</div>";

  html += `<div class="rank-title">📊 Todos</div><div class="grid">`;
  resultados.forEach(r => html += cardHTML(r));
  html += "</div>";

  cont.innerHTML = html;
}

// CARD
function cardHTML(r) {

  let clase = "ok";
  if (r.diff < -5) clase = "debe";
  if (r.diff > 5) clase = "extra";

  return `
    <div class="card ${clase}">
      <b>${r.nombre}</b><br><br>
      FIJO: ${r.fijo.toFixed(0)}<br>
      VAR: ${r.variable.toFixed(0)}<br>
      TOTAL: ${r.total.toFixed(0)}<br>
      RECIBO: ${r.recibo}<br><br>
      <b>DIF: ${r.diff.toFixed(0)}</b>
    </div>
  `;
}

</script>

</body>
</html>
