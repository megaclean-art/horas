<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MegaClean · Control de Horas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1114;
    --surface: #181c21;
    --surface2: #1f252c;
    --border: #2a3240;
    --accent: #00b4d8;
    --accent2: #0077b6;
    --green: #2dc653;
    --red: #e63946;
    --yellow: #f4a261;
    --text: #e8edf2;
    --text2: #7a8899;
    --text3: #4a5568;
    --radius: 10px;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }

  /* ── UTILS ── */
  .hidden { display: none !important; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
  .pill-green { background: rgba(45,198,83,.15); color: var(--green); border: 1px solid rgba(45,198,83,.3); }
  .pill-red { background: rgba(230,57,70,.15); color: var(--red); border: 1px solid rgba(230,57,70,.3); }
  .pill-yellow { background: rgba(244,162,97,.15); color: var(--yellow); border: 1px solid rgba(244,162,97,.3); }
  .pill-blue { background: rgba(0,180,216,.15); color: var(--accent); border: 1px solid rgba(0,180,216,.3); }
  .pill-gray { background: rgba(122,136,153,.1); color: var(--text2); border: 1px solid var(--border); }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: var(--radius); font-size: 13px; z-index: 9999; transition: transform .3s ease; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── LOADER ── */
  #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9000; flex-direction: column; gap: 16px; }
  .loader-logo { font-family: var(--font-display); font-size: 28px; font-weight: 900; letter-spacing: 3px; color: var(--accent); }
  .loader-bar { width: 120px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .loader-bar::after { content: ''; display: block; width: 40%; height: 100%; background: var(--accent); animation: loadSlide 1s ease infinite; }
  @keyframes loadSlide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }

  /* ── LOGIN ── */
  #screen-login { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse at 50% 0%, rgba(0,119,182,.12) 0%, transparent 60%); }
  .login-logo { font-family: var(--font-display); font-size: 38px; font-weight: 900; letter-spacing: 4px; color: var(--accent); margin-bottom: 4px; }
  .login-sub { font-size: 12px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-bottom: 40px; }
  .login-card { width: 100%; max-width: 360px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 24px; }
  .login-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text2); letter-spacing: 1px; margin-bottom: 24px; text-transform: uppercase; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  .field input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--font-body); font-size: 16px; padding: 12px 14px; border-radius: var(--radius); outline: none; transition: border-color .2s; }
  .field input:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; background: var(--accent); color: #fff; font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: var(--radius); padding: 14px; cursor: pointer; transition: background .2s, transform .1s; margin-top: 8px; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border-radius: var(--radius); padding: 11px 18px; cursor: pointer; transition: all .2s; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(230,57,70,.1); color: var(--red); border: 1px solid rgba(230,57,70,.3); font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border-radius: var(--radius); padding: 11px 18px; cursor: pointer; transition: all .2s; }
  .btn-green { background: var(--green); color: #fff; border: none; font-family: var(--font-display); font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; border-radius: 14px; padding: 18px; cursor: pointer; transition: all .2s; }
  .btn-red-big { background: var(--red); color: #fff; border: none; font-family: var(--font-display); font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; border-radius: 14px; padding: 18px; cursor: pointer; transition: all .2s; }

  /* ── MAIN LAYOUT ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-logo { font-family: var(--font-display); font-size: 22px; font-weight: 900; letter-spacing: 3px; color: var(--accent); }
  .topbar-user { display: flex; align-items: center; gap: 10px; }
  .topbar-name { font-size: 13px; color: var(--text2); font-weight: 500; }
  .topbar-role { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
  .btn-logout { background: none; border: 1px solid var(--border); color: var(--text3); font-size: 12px; padding: 5px 10px; border-radius: 6px; cursor: pointer; transition: all .2s; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ── TABS ── */
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 1; min-width: 80px; padding: 14px 8px 12px; text-align: center; font-family: var(--font-display); font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; white-space: nowrap; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* ── CONTENT ── */
  .content { flex: 1; padding: 16px; max-width: 640px; margin: 0 auto; width: 100%; }
  .section-title { font-family: var(--font-display); font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--text); margin-bottom: 4px; }
  .section-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

  /* ── FICHAR (OPERARIO) ── */
  .fecha-hoy { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .fecha-label { font-family: var(--font-display); font-size: 13px; font-weight: 600; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; }
  .fecha-valor { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text); }
  .reloj { font-family: var(--font-display); font-size: 36px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }

  .servicio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; transition: border-color .2s; }
  .servicio-card.activo { border-color: var(--green); background: rgba(45,198,83,.04); }
  .servicio-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .servicio-cliente { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .servicio-dir { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .servicio-horario { font-size: 13px; color: var(--text3); margin-top: 6px; }
  .servicio-horario span { color: var(--accent); font-weight: 600; }
  .servicio-actions { display: flex; gap: 10px; margin-top: 12px; }
  .servicio-actions button { flex: 1; padding: 12px; border-radius: var(--radius); font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; transition: all .2s; }
  .btn-entrar { background: var(--green); color: #fff; }
  .btn-salir { background: var(--red); color: #fff; }
  .btn-entrar:disabled, .btn-salir:disabled { opacity: .4; cursor: not-allowed; }

  .fichada-info { margin-top: 10px; padding: 10px 12px; background: var(--bg); border-radius: 8px; font-size: 12px; color: var(--text2); }
  .fichada-row { display: flex; justify-content: space-between; padding: 3px 0; }
  .fichada-row .val { color: var(--text); font-weight: 600; }
  .gps-ok { color: var(--green); }
  .gps-warn { color: var(--yellow); }

  .no-servicios { text-align: center; padding: 40px 20px; color: var(--text3); }
  .no-servicios .icon { font-size: 40px; margin-bottom: 12px; }

  /* ── ADMIN PANEL ── */
  .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .stat-num { font-family: var(--font-display); font-size: 36px; font-weight: 900; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-top: 2px; }

  .card-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .card-section-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text2); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-sm { margin-bottom: 10px; }
  .field-sm label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
  .field-sm input, .field-sm select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--font-body); font-size: 14px; padding: 9px 12px; border-radius: 8px; outline: none; }
  .field-sm input:focus, .field-sm select:focus { border-color: var(--accent); }
  .field-sm select option { background: var(--bg); }

  .dias-check { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .dia-btn { padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text2); font-family: var(--font-display); font-size: 13px; font-weight: 600; letter-spacing: .5px; border-radius: 6px; cursor: pointer; transition: all .2s; }
  .dia-btn.sel { background: rgba(0,180,216,.15); border-color: var(--accent); color: var(--accent); }

  /* ── LIST ITEMS ── */
  .list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .list-item:last-child { border-bottom: none; }
  .list-item-info { flex: 1; }
  .list-item-name { font-weight: 600; font-size: 15px; }
  .list-item-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .list-item-actions { display: flex; gap: 8px; }
  .btn-icon { background: var(--bg); border: 1px solid var(--border); color: var(--text2); width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; transition: all .2s; }
  .btn-icon:hover { border-color: var(--red); color: var(--red); }
  .btn-icon.edit:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SUPERVISOR ── */
  .fichada-supervisor { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .fs-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .fs-operario { font-family: var(--font-display); font-size: 18px; font-weight: 700; }
  .fs-detalle { font-size: 12px; color: var(--text2); display: flex; flex-direction: column; gap: 3px; }
  .fs-actions { display: flex; gap: 8px; margin-top: 10px; }

  /* ── MIS HORAS ── */
  .resumen-mes { background: linear-gradient(135deg, rgba(0,180,216,.1), rgba(0,119,182,.05)); border: 1px solid rgba(0,180,216,.2); border-radius: 12px; padding: 20px 16px; margin-bottom: 16px; text-align: center; }
  .resumen-num { font-family: var(--font-display); font-size: 56px; font-weight: 900; color: var(--accent); line-height: 1; }
  .resumen-label { font-size: 13px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .resumen-tipo { font-size: 11px; color: var(--text3); margin-top: 8px; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500; display: flex; align-items: flex-end; justify-content: center; padding: 16px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 12px 12px; width: 100%; max-width: 480px; padding: 24px 20px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button { flex: 1; }

  /* ── RESPONSIVE ── */
  @media(max-width: 380px) {
    .admin-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">MEGACLEAN</div>
  <div style="font-size:11px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-top:-8px;">Control de Horas</div>
  <div class="loader-bar"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- LOGIN -->
<div id="screen-login" class="hidden">
  <div class="login-logo">MEGACLEAN</div>
  <div class="login-sub">Control de Horas</div>
  <div class="login-card">
    <div class="login-title">Ingresar</div>
    <div class="field">
      <label>DNI</label>
      <input type="number" id="login-dni" placeholder="Ej: 30123456" inputmode="numeric">

      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>

<!-- APP MAIN -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-logo">MEGACLEAN</div>
    <div class="topbar-user">
      <div>
        <div class="topbar-name" id="topbar-name">—</div>
        <div class="topbar-role" id="topbar-role">—</div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>

  <div class="tabs" id="main-tabs"></div>

  <div class="content" id="main-content"></div>
</div>

<!-- MODALES -->
<div id="modal-container"></div>

<script>
// ════════════════════════════════════════════
//  FIREBASE CONFIG
// ════════════════════════════════════════════
const FB_CONFIG = {
  apiKey: "AIzaSyBg7lvQteU0aHwEyI1qe10UPK81-9DL0Ng",
  authDomain: "mega-clean-12f17.firebaseapp.com",
  projectId: "mega-clean-12f17",
  storageBucket: "mega-clean-12f17.appspot.com",
  messagingSenderId: "395826988",
  appId: "mega-clean-12f17"
};
const API = `https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents`;

// ════════════════════════════════════════════
//  ESTADO GLOBAL
// ════════════════════════════════════════════
let currentUser = null;
let reloj_interval = null;
const DIAS_SEMANA = ['LUN','MAR','MIE','JUE','VIE','SAB','DOM'];
const DIAS_FULL = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const DIAS_JS = [1,2,3,4,5,6,0]; // getDay() map

// ════════════════════════════════════════════
//  FIRESTORE HELPERS
// ════════════════════════════════════════════
function toFS(data) {
  const fields = {};
  for (const [k, v] of Object.entries(data)) {
    if (v === null || v === undefined) fields[k] = { nullValue: null };
    else if (typeof v === 'boolean') fields[k] = { booleanValue: v };
    else if (typeof v === 'number') fields[k] = { integerValue: String(v) };
    else if (typeof v === 'string') fields[k] = { stringValue: v };
    else if (Array.isArray(v)) fields[k] = { arrayValue: { values: v.map(i => typeof i === 'string' ? { stringValue: i } : { integerValue: String(i) }) } };
    else fields[k] = { stringValue: JSON.stringify(v) };
  }
  return { fields };
}

function fromFS(doc) {
  if (!doc.fields) return {};
  const out = {};
  for (const [k, v] of Object.entries(doc.fields)) {
    if (v.stringValue !== undefined) out[k] = v.stringValue;
    else if (v.integerValue !== undefined) out[k] = Number(v.integerValue);
    else if (v.doubleValue !== undefined) out[k] = v.doubleValue;
    else if (v.booleanValue !== undefined) out[k] = v.booleanValue;
    else if (v.nullValue !== undefined) out[k] = null;
    else if (v.arrayValue) out[k] = (v.arrayValue.values || []).map(i => i.stringValue ?? i.integerValue ?? i.booleanValue);
    else out[k] = null;
  }
  out._id = doc.name?.split('/').pop();
  return out;
}

async function fsGet(col, id) {
  const r = await fetch(`${API}/${col}/${id}`);
  if (!r.ok) return null;
  return fromFS(await r.json());
}

async function fsList(col, filter) {
  let url = `${API}/${col}?pageSize=200`;
  const r = await fetch(url);
  if (!r.ok) return [];
  const data = await r.json();
  if (!data.documents) return [];
  return data.documents.map(fromFS);
}

async function fsSave(col, id, data) {
  const body = toFS(data);
  const mask = Object.keys(data).map(k => `updateMask.fieldPaths=${k}`).join('&');
  const r = await fetch(`${API}/${col}/${id}?${mask}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
  });
  return r.ok;
}

async function fsAdd(col, data) {
  const r = await fetch(`${API}/${col}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(toFS(data))
  });
  const d = await r.json();
  return d.name?.split('/').pop();
}

async function fsDelete(col, id) {
  await fetch(`${API}/${col}/${id}`, { method: 'DELETE' });
}

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
function toast(msg, type = 'info') {
  const t = document.getElementById('toast');
  const colors = { info: 'var(--accent)', ok: 'var(--green)', error: 'var(--red)', warn: 'var(--yellow)' };
  t.style.borderColor = colors[type] || colors.info;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════
async function doLogin() {
  const dni = document.getElementById('login-dni').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  if (!dni || !pass) return toast('Ingresá DNI y contraseña', 'warn');

  // Admin hardcoded
  if (dni === 'admin' || dni === 'ADMIN') {
    if (pass === 'admin1234') {
      currentUser = { _id: 'admin', nombre: 'Administrador', rol: 'ADMIN', dni: 'admin' };
      iniciarApp();
      return;
    }
  }
  // Roberto hardcoded
  if (dni === '25365716' && pass === '1945') {
    currentUser = { _id: 'roberto', nombre: 'Roberto', rol: 'ADMIN', dni: '25365716' };
    iniciarApp();
    return;
  }

  showLoader(true);
  const users = await fsList('horas_usuarios');
  showLoader(false);
  const user = users.find(u => String(u.dni) === String(dni) && u.password === pass && u.activo !== false);
  if (!user) return toast('DNI o contraseña incorrectos', 'error');
  currentUser = user;
  iniciarApp();
}

function doLogout() {
  currentUser = null;
  if (reloj_interval) clearInterval(reloj_interval);
  document.getElementById('app').classList.add('hidden');
  document.getElementById('screen-login').classList.remove('hidden');
  document.getElementById('login-dni').value = '';
  document.getElementById('login-pass').value = '';
}

function iniciarApp() {
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('topbar-name').textContent = currentUser.nombre;
  document.getElementById('topbar-role').textContent = currentUser.rol;
  renderTabs();
  navigateTo(currentUser.rol === 'OPERARIO' ? 'fichar' : currentUser.rol === 'SUPERVISOR' ? 'supervisor' : 'dashboard');
}

function fechaHoy() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function isoHoy() {
  return new Date().toISOString().split('T')[0];
}
function horaActual() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function horaCompleta() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function diasHoy() {
  // retorna índice 0..6 (LUN=0..DOM=6)
  const js = new Date().getDay(); // 0=dom,1=lun...
  return DIAS_JS.indexOf(js);
}
function diffHoras(entrada, salida) {
  const [h1,m1] = entrada.split(':').map(Number);
  const [h2,m2] = salida.split(':').map(Number);
  return ((h2*60+m2) - (h1*60+m1)) / 60;
}
function distanciaMetros(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function cargarServiciosHoy() {
  const servicios = await fsList('horas_servicios');
  const diaIdx = diasHoy();
  const diaStr = DIAS_SEMANA[diaIdx];

  // Servicios fijos asignados
  const serviciosHoy = servicios.filter(s => {
    const dias = s.dias || [];
    const operariosIds = s.operarios ? (Array.isArray(s.operarios) ? s.operarios : s.operarios.split(',')) : [];
    return dias.includes(diaStr) && (operariosIds.includes(currentUser._id) || operariosIds.includes(String(currentUser._id)));
  });

  // Coberturas activas de hoy
  const coberturasHoy = await cargarCoberturasHoy();

  // Cargar fichadas de hoy
  const todasFichadas = await fsList('horas_fichadas');
  const fichadasHoy = todasFichadas.filter(f => f.operarioId === currentUser._id && f.fecha === isoHoy());

  const cont = document.getElementById('servicios-hoy');
  if (!cont) return;

  if (serviciosHoy.length === 0 && coberturasHoy.length === 0) {
    cont.innerHTML = `<div class="no-servicios"><div class="icon">📅</div><div style="font-size:15px;color:var(--text2)">No tenés servicios asignados para hoy</div><div style="font-size:12px;margin-top:8px">Si creés que hay un error, consultá con tu supervisor</div></div>`;
    return;
  }

  // Renderizar servicios fijos
  const htmlFijos = serviciosHoy.map(s => renderTarjetaServicio(s, fichadasHoy, false));

  // Renderizar coberturas variables
  const htmlCoberturas = coberturasHoy.map(cob => {
    // Construir objeto similar a servicio para reutilizar la tarjeta
    const srvSimulado = {
      _id: cob.servicioId,
      cliente: cob.clienteNombre,
      direccion: '',
      horaInicio: cob.horaInicio,
      horaFin: cob.horaFin,
      horasContratadas: cob.horasContratadas,
      dias: cob.dias,
      _coberturaId: cob._id,
      _motivo: cob.motivo,
      _horasExtra: cob.horasExtraAutorizadas || 0
    };
    return renderTarjetaServicio(srvSimulado, fichadasHoy, true);
  });

  cont.innerHTML = [
    serviciosHoy.length > 0 ? `<div style="font-size:11px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:8px">Servicios fijos</div>` : '',
    ...htmlFijos,
    coberturasHoy.length > 0 ? `<div style="font-size:11px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:16px 0 8px">Coberturas activas</div>` : '',
    ...htmlCoberturas
  ].join('');
}

function renderTarjetaServicio(s, fichadasHoy, esCobertura) {
  const fichadaKey = esCobertura ? `${currentUser._id}_cob_${s._coberturaId}_${isoHoy()}` : `${currentUser._id}_${s._id}_${isoHoy()}`;
  const fichada = fichadasHoy.find(f => f._fichadaKey === fichadaKey || f.servicioId === s._id && f.fecha === isoHoy() && (esCobertura ? f.coberturaId === s._coberturaId : !f.coberturaId));
  const tieneEntrada = fichada && fichada.entrada;
  const tieneSalida = fichada && fichada.salida;
  const enCurso = tieneEntrada && !tieneSalida;

  // Verificar si está bloqueado por horas extra
  const bloqueado = fichada?.bloqueadoHorasExtra;

  let fichadaHtml = '';
  if (fichada) {
    fichadaHtml = `<div class="fichada-info">
      ${tieneEntrada ? `<div class="fichada-row"><span>Entrada:</span><span class="val">${fichada.entrada}</span></div>` : ''}
      ${tieneSalida ? `<div class="fichada-row"><span>Salida:</span><span class="val">${fichada.salida}</span></div>` : ''}
      ${tieneSalida ? `<div class="fichada-row"><span>Horas trabajadas:</span><span class="val">${diffHoras(fichada.entrada, fichada.salida).toFixed(1)}hs</span></div>` : ''}
      <div class="fichada-row"><span>GPS entrada:</span><span class="val ${fichada.gpsOk ? 'gps-ok' : 'gps-warn'}">${fichada.gpsOk ? '✓ OK' : '⚠ Fuera de rango'} ${fichada.distanciaEntrada ? Math.round(fichada.distanciaEntrada)+'m' : ''}</span></div>
      ${bloqueado ? `<div style="background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);border-radius:6px;padding:8px;margin-top:6px;font-size:12px;color:var(--red)">⛔ Salida bloqueada — superás las horas contratadas. Aguardá autorización del supervisor.</div>` : ''}
    </div>`;
  }

  let estado = tieneSalida ? `<span class="pill pill-green">✓ Completado</span>`
    : bloqueado ? `<span class="pill pill-red">⛔ Bloqueado</span>`
    : enCurso ? `<span class="pill pill-yellow">En curso</span>`
    : `<span class="pill pill-gray">Pendiente</span>`;

  const cobTag = esCobertura ? `<span class="pill pill-blue" style="font-size:10px;margin-left:4px">${s._motivo||'Cobertura'}</span>` : '';

  return `<div class="servicio-card ${enCurso ? 'activo' : ''}">
    <div class="servicio-header">
      <div>
        <div class="servicio-cliente">${s.cliente} ${cobTag}</div>
        ${s.direccion ? `<div class="servicio-dir">📍 ${s.direccion}</div>` : ''}
        <div class="servicio-horario">Horario: <span>${s.horaInicio||'--:--'} – ${s.horaFin||'--:--'}</span> · ${s.horasContratadas||0}hs contratadas${s._horasExtra > 0 ? ` <span style="color:var(--yellow)">+${s._horasExtra}hs extra auth.</span>` : ''}</div>
      </div>
      ${estado}
    </div>
    ${fichadaHtml}
    <div class="servicio-actions">
      <button class="btn-entrar" ${tieneEntrada ? 'disabled' : ''} onclick="ficharEntradaV2('${s._id}','${s.cliente}','${esCobertura ? s._coberturaId : ''}')">
        ${tieneEntrada ? '✓ Entrada marcada' : '▶ ENTRAR'}
      </button>
      <button class="btn-salir" ${!tieneEntrada || tieneSalida || bloqueado ? 'disabled' : ''} onclick="ficharSalidaV2('${s._id}','${s.cliente}','${esCobertura ? s._coberturaId : ''}',${s.horasContratadas||0},${s._horasExtra||0})">
        ${tieneSalida ? '✓ Salida marcada' : bloqueado ? '⛔ Bloqueado' : '■ SALIR'}
      </button>
    </div>
  </div>`;
}

async function ficharEntradaV2(servicioId, clienteNombre, coberturaId = '') {
  const pos = await getGPS();
  const servicio = await fsGet('horas_servicios', servicioId);
  let gpsOk = true, distancia = 0, lat = 0, lon = 0;

  if (pos) {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    if (servicio && servicio.lat && servicio.lon) {
      distancia = distanciaMetros(lat, lon, Number(servicio.lat), Number(servicio.lon));
      gpsOk = distancia <= (servicio.radioGps || 300);
    }
  }

  const id = coberturaId
    ? `${currentUser._id}_cob_${coberturaId}_${isoHoy()}`
    : `${currentUser._id}_${servicioId}_${isoHoy()}`;

  await fsSave('horas_fichadas', id, {
    operarioId: currentUser._id,
    operarioNombre: currentUser.nombre,
    servicioId,
    coberturaId,
    clienteNombre,
    fecha: isoHoy(),
    entrada: horaActual(),
    salida: '',
    latEntrada: String(lat),
    lonEntrada: String(lon),
    gpsOk,
    distanciaEntrada: distancia,
    aprobado: false,
    bloqueadoHorasExtra: false,
    estado: 'en-curso',
    tipoFichada: coberturaId ? 'COBERTURA' : 'FIJO'
  });

  toast(gpsOk ? `✓ Entrada registrada — ${clienteNombre}` : `⚠ Entrada marcada fuera de rango GPS`, gpsOk ? 'ok' : 'warn');
  await cargarServiciosHoy();
}

async function ficharSalidaV2(servicioId, clienteNombre, coberturaId = '', horasContratadas = 0, horasExtra = 0) {
  const id = coberturaId
    ? `${currentUser._id}_cob_${coberturaId}_${isoHoy()}`
    : `${currentUser._id}_${servicioId}_${isoHoy()}`;

  const fichada = await fsGet('horas_fichadas', id);
  if (!fichada || !fichada.entrada) return toast('No hay entrada registrada', 'error');

  const salida = horaActual();
  const horas = diffHoras(fichada.entrada, salida);
  const tope = horasContratadas + horasExtra;

  // Verificar si supera el tope
  if (tope > 0 && horas > tope) {
    // Bloquear salida — requiere autorización
    await fsSave('horas_fichadas', id, {
      salidaTentativa: salida,
      horasTentativas: horas,
      bloqueadoHorasExtra: true,
      estado: 'bloqueado-horas-extra'
    });
    toast(`⛔ Superás ${tope}hs contratadas. Se notificó al supervisor para autorizar.`, 'warn');
    await cargarServiciosHoy();
    return;
  }

  await fsSave('horas_fichadas', id, {
    salida,
    horasTrabajadas: horas,
    bloqueadoHorasExtra: false,
    estado: 'completo'
  });
  toast(`✓ Salida registrada — ${horas.toFixed(1)}hs en ${clienteNombre}`, 'ok');
  await cargarServiciosHoy();
}

// Mantener compatibilidad con funciones anteriores
async function ficharEntrada(servicioId, clienteNombre) {
  return ficharEntradaV2(servicioId, clienteNombre, '');
}
async function ficharSalida(servicioId, clienteNombre) {
  const servicio = await fsGet('horas_servicios', servicioId);
  return ficharSalidaV2(servicioId, clienteNombre, '', servicio?.horasContratadas || 0, 0);
}

function getGPS() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(resolve, () => resolve(null), { timeout: 8000, enableHighAccuracy: true });
  });
}

            <input id="op-dni" type="number" inputmode="numeric" placeholder="30123456" value="${o.dni||''}">
          </div>
          <div class="field-sm"><label>Contraseña</label>
            <input id="op-pass" type="password" placeholder="${esEdicion?'Dejar vacío para no cambiar':'••••••••'}" value="">
          </div>
        </div>
        <div class="form-row">
          <div class="field-sm"><label>Rol</label>
            <select id="op-rol">
              <option value="OPERARIO" ${(o.rol||'OPERARIO')==='OPERARIO'?'selected':''}>Operario</option>
              <option value="SUPERVISOR" ${o.rol==='SUPERVISOR'?'selected':''}>Supervisor</option>
              <option value="ADMIN" ${o.rol==='ADMIN'?'selected':''}>Admin</option>
            </select>
          </div>
          <div class="field-sm"><label>Tipo liquidación</label>
            <select id="op-tipo" onchange="toggleHorasFijas()">
              <option value="VARIABLE" ${(o.tipo||'VARIABLE')==='VARIABLE'?'selected':''}>Variable (horas reales)</option>
              <option value="FIJO" ${o.tipo==='FIJO'?'selected':''}>Fijo (× 4 semanas)</option>
            </select>
          </div>
        </div>
        <div class="field-sm" id="campo-hs-sem" style="display:${o.tipo==='FIJO'?'block':'none'}">
          <label>Horas por semana</label>
          <input id="op-hs" type="number" step="0.5" placeholder="Ej: 24" value="${o.horasSemana||''}">
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="cerrarModal()">CANCELAR</button>
          <button class="btn-primary" onclick="guardarOperario('${id||''}')">
            ${esEdicion ? '💾 GUARDAR CAMBIOS' : '✓ CREAR OPERARIO'}
          </button>
        </div>
      </div>
    </div>`;
}

function toggleHorasFijas() {
  const tipo = document.getElementById('op-tipo')?.value;
  const campo = document.getElementById('campo-hs-sem');
  if (campo) campo.style.display = tipo === 'FIJO' ? 'block' : 'none';
}

async function guardarOperario(id = '') {
  const nombre = document.getElementById('op-nombre').value.trim();
  const dni = document.getElementById('op-dni').value.trim();
  const pass = document.getElementById('op-pass').value.trim();
  const rol = document.getElementById('op-rol').value;
  const tipo = document.getElementById('op-tipo').value;
  const hs = Number(document.getElementById('op-hs')?.value || 0);

  if (!nombre) return toast('El nombre es obligatorio', 'warn');
  if (!id && !pass) return toast('La contraseña es obligatoria para usuarios nuevos', 'warn');

  const data = { nombre, dni, rol, tipo, horasSemana: hs, activo: true };
  if (pass) data.password = pass;

  if (id) {
    await fsSave('horas_usuarios', id, data);
    toast(`✓ ${nombre} actualizado`, 'ok');
  } else {
    await fsAdd('horas_usuarios', data);
    toast(`✓ ${nombre} creado`, 'ok');
  }
  cerrarModal();
  renderOperarios();
}

async function eliminarOperario(id, nombre) {
  if (!confirm(`¿Eliminar a ${nombre}?\nEsta acción no se puede deshacer.`)) return;
  await fsDelete('horas_usuarios', id);
  _operariosAll = _operariosAll.filter(o => o._id !== id);
  filtrarOperarios();
  toast(`${nombre} eliminado`, 'ok');
}

let diasSelServ = [];
let _serviciosCache = [];
let _operariosCache = [];

async function renderServicios() {
  const c = document.getElementById('main-content');
  c.innerHTML = `<div class="section-title">Servicios</div><div style="text-align:center;padding:30px;color:var(--text3)">Cargando...</div>`;
  const [servicios, operarios] = await Promise.all([fsList('horas_servicios'), fsList('horas_usuarios')]);
  _serviciosCache = servicios;

  // Supervisores únicos para filtro
  const supervisores = [...new Set(servicios.map(s => s.supervisor || s.idSupervisor).filter(Boolean))].sort();

  c.innerHTML = `
    <div class="section-title">Servicios</div>
    <div class="section-sub">ABM de objetivos y asignaciones</div>
    <button class="btn-primary" style="margin-bottom:14px" onclick="modalServicio()">+ NUEVO SERVICIO</button>

    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <input id="srv-buscar" placeholder="🔍 Buscar cliente..." oninput="filtrarServicios()"
        style="flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:14px;outline:none">
      <select id="srv-filtro-sup" onchange="filtrarServicios()"
        style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;outline:none">
        <option value="">Todos los supervisores</option>
        ${supervisores.map(s=>`<option value="${s}">${s}</option>`).join('')}
      </select>
      <select id="srv-filtro-op" onchange="filtrarServicios()"
        style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;outline:none">
        <option value="">Todos los operarios</option>
        ${operarios.filter(o=>o.rol==='OPERARIO').sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(o=>`<option value="${o._id}">${o.nombre}</option>`).join('')}
      </select>
    </div>

    <div id="srv-lista"></div>`;

  filtrarServicios();
}

function filtrarServicios() {
  const buscar = (document.getElementById('srv-buscar')?.value || '').toLowerCase();
  const filtroSup = document.getElementById('srv-filtro-sup')?.value || '';
  const filtroOp = document.getElementById('srv-filtro-op')?.value || '';

  let lista = _serviciosCache;
  if (buscar) lista = lista.filter(s => (s.cliente||'').toLowerCase().includes(buscar) || (s.codigo||'').includes(buscar) || (s.direccion||'').toLowerCase().includes(buscar));
  if (filtroSup) lista = lista.filter(s => (s.supervisor||s.idSupervisor||'') === filtroSup);
  if (filtroOp) lista = lista.filter(s => {
    const ops = Array.isArray(s.operarios) ? s.operarios : (s.operarios ? [s.operarios] : []);
    return ops.includes(filtroOp);
  });

  const cont = document.getElementById('srv-lista');
  if (!cont) return;

  if (lista.length === 0) {
    cont.innerHTML = `<div class="card-section"><div style="color:var(--text3);text-align:center;padding:20px">Sin resultados</div></div>`;
    return;
  }

  cont.innerHTML = `<div class="card-section">
    <div class="card-section-title">Mostrando ${lista.length} de ${_serviciosCache.length} servicios</div>
    ${lista.map(s => {
      const ops = (Array.isArray(s.operarios) ? s.operarios : (s.operarios ? [s.operarios] : []))
        .map(id => _operariosCache.find(o => o._id === id)?.nombre || id).filter(Boolean).join(', ');
      const supLabel = s.supervisor || (s.idSupervisor ? `Sup. ${s.idSupervisor}` : '');
      return `<div class="list-item">
        <div class="list-item-info" style="padding-right:8px">
          <div class="list-item-name">${s.cliente || '—'} ${s.codigo ? `<span style="color:var(--text3);font-size:11px;font-weight:400">#${s.codigo}</span>` : ''}</div>
          <div class="list-item-sub">📍 ${s.direccion || '<em style="color:var(--text3)">Sin dirección</em>'}</div>
          <div class="list-item-sub">
            ${(s.dias||[]).join(' · ')} &nbsp;·&nbsp; ${s.horaInicio||'--:--'} – ${s.horaFin||'--:--'} &nbsp;·&nbsp; ${s.horasContratadas||0}hs
            ${supLabel ? `&nbsp;·&nbsp; <span style="color:var(--text3)">🏷 ${supLabel}</span>` : ''}
          </div>
          <div class="list-item-sub" style="color:var(--accent)">👷 ${ops || '<em style="color:var(--text3)">Sin asignar</em>'}</div>
        </div>
        <div class="list-item-actions" style="flex-shrink:0">
          <button class="btn-icon edit" title="Editar" onclick="modalServicio('${s._id}')">✏️</button>
          <button class="btn-icon" title="Eliminar" onclick="eliminarServicio('${s._id}','${s.cliente}')">🗑</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function filtrarOpsModal() {
  const q = (document.getElementById('sv-op-buscar')?.value || '').toLowerCase();
  document.querySelectorAll('[id^="op-row-"]').forEach(row => {
    const nombre = row.querySelector('div[style*="font-weight"]')?.textContent?.toLowerCase() || '';
    row.style.display = nombre.includes(q) ? '' : 'none';
  });
}

function toggleDia(dia) {
  const btn = document.getElementById('dia-' + dia);
  if (diasSelServ.includes(dia)) {
    diasSelServ = diasSelServ.filter(d => d !== dia);
    btn.classList.remove('sel');
  } else {
    diasSelServ.push(dia);
    btn.classList.add('sel');
  }
}

async function guardarServicio(id = '') {
  const cliente = document.getElementById('sv-cliente').value.trim();
  const direccion = document.getElementById('sv-dir').value.trim();
  const codigo = document.getElementById('sv-codigo').value.trim();
  const idSupervisor = document.getElementById('sv-idsup').value.trim();
  const supervisor = document.getElementById('sv-sup').value.trim();
  const horaInicio = document.getElementById('sv-inicio').value;
  const horaFin = document.getElementById('sv-fin').value;
  const horasContratadas = Number(document.getElementById('sv-hs').value) || 0;
  const radioGps = Number(document.getElementById('sv-radio').value) || 300;
  const operariosSelec = Array.from(document.querySelectorAll('[id^="chk-"]')).filter(c=>c.checked).map(c=>c.id.replace('chk-',''));

  if (!cliente) return toast('El nombre del cliente es obligatorio', 'warn');
  if (diasSelServ.length === 0) return toast('Seleccioná al menos un día', 'warn');

  const data = {
    cliente, direccion, codigo, idSupervisor, supervisor,
    horaInicio, horaFin, horasContratadas, radioGps,
    dias: diasSelServ,
    operarios: operariosSelec,
    tipo: 'FIJO',
    lat: '', lon: ''
  };

  if (id) {
    await fsSave('horas_servicios', id, data);
    toast(`✓ ${cliente} actualizado`, 'ok');
  } else {
    await fsAdd('horas_servicios', data);
    toast(`✓ ${cliente} creado`, 'ok');
  }

  cerrarModal();
  renderServicios();
}

async function eliminarServicio(id, nombre) {
  if (!confirm(`¿Eliminar el servicio "${nombre}"?\nEsta acción no se puede deshacer.`)) return;
  await fsDelete('horas_servicios', id);
  _serviciosCache = _serviciosCache.filter(s => s._id !== id);
  filtrarServicios();
  toast(`${nombre} eliminado`, 'ok');
}

async function eliminarServicio(id, nombre) {
  if (!confirm(`¿Eliminar servicio ${nombre}?`)) return;
  await fsDelete('horas_servicios', id);
  toast(`${nombre} eliminado`, 'ok');
  renderServicios();
}

async function autorizarHorasExtra(fichadaId) {
  const fichada = await fsGet('horas_fichadas', fichadaId);
  if (!fichada) return;
  await fsSave('horas_fichadas', fichadaId, {
    salida: fichada.salidaTentativa,
    horasTrabajadas: fichada.horasTentativas,
    bloqueadoHorasExtra: false,
    estado: 'completo',
    horasExtraAprobadas: true,
    aprobadoPor: currentUser.nombre
  });
  toast('✓ Horas extra autorizadas — salida registrada', 'ok');
  renderSupervisor();
}

async function rechazarHorasExtra(fichadaId) {
  const motivo = prompt('Motivo del rechazo:');
  if (motivo === null) return;
  await fsSave('horas_fichadas', fichadaId, {
    bloqueadoHorasExtra: false,
    estado: 'rechazado-horas-extra',
    observacion: motivo || 'Horas extra rechazadas por supervisor'
  });
  toast('Horas extra rechazadas', 'warn');
  renderSupervisor();
}

async function aprobarFichada(id) {
  await fsSave('horas_fichadas', id, { aprobado: true, estado: 'aprobado' });
  toast('✓ Fichada aprobada', 'ok');
  renderSupervisor();
}

async function observarFichada(id) {
  const obs = prompt('Ingresá la observación:');
  if (!obs) return;
  await fsSave('horas_fichadas', id, { aprobado: false, estado: 'observado', observacion: obs });
  toast('Fichada observada', 'warn');
  renderSupervisor();
}

  toast('Generando Excel...', 'info');
  const [fichadas, operarios, servicios] = await Promise.all([
    fsList('horas_fichadas'), fsList('horas_usuarios'), fsList('horas_servicios')
  ]);

  const mesActual = isoHoy().slice(0,7);
  const fichadasMes = fichadas.filter(f => f.fecha && f.fecha.startsWith(mesActual));

  // Agrupar por operario
  const porOperario = {};
  for (const f of fichadasMes) {
    if (!porOperario[f.operarioId]) porOperario[f.operarioId] = [];
    porOperario[f.operarioId].push(f);
  }

  let csv = 'Operario;DNI;Tipo;Fecha;Cliente;Entrada;Salida;Hs.Reales;Hs.Contratadas;GPS OK;Estado;Observacion\n';

  for (const [opId, fics] of Object.entries(porOperario)) {
    const op = operarios.find(o => o._id === opId);
    for (const f of fics.sort((a,b) => a.fecha.localeCompare(b.fecha))) {
      const srv = servicios.find(s => s._id === f.servicioId);
      csv += [
        f.operarioNombre || '',
        op?.dni || '',
        op?.tipo || 'VARIABLE',
        f.fecha,
        f.clienteNombre || '',
        f.entrada || '',
        f.salida || '',
        f.horasTrabajadas ? f.horasTrabajadas.toFixed(1) : '',
        srv?.horasContratadas || '',
        f.gpsOk ? 'SI' : 'NO',
        f.estado || '',
        f.observacion || ''
      ].join(';') + '\n';
    }
  }

  // Totales por operario
  csv += '\n;TOTALES POR OPERARIO;;\n';
  csv += 'Operario;Tipo;Hs.Mes;Metodo\n';
  for (const [opId, fics] of Object.entries(porOperario)) {
    const op = operarios.find(o => o._id === opId);
    let total;
    if (op?.tipo === 'FIJO') {
      total = (op.horasSemana || 0) * 4;
    } else {
      total = fics.reduce((s, f) => s + (f.horasTrabajadas || 0), 0);
    }
    csv += `${op?.nombre || opId};${op?.tipo || 'VARIABLE'};${total.toFixed(1)};${op?.tipo === 'FIJO' ? 'hs/sem × 4' : 'Suma real fichadas'}\n`;
  }

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `MegaClean_Horas_${mesActual}.csv`;
  a.click();
  toast('✓ Excel exportado', 'ok');
}

// ════════════════════════════════════════════
//  MÓDULO: COBERTURAS (ASIGNACIONES VARIABLES)
// ════════════════════════════════════════════
const MOTIVOS_COBERTURA = [
  'Vacaciones',
  'Lic. por enfermedad',
  'Lic. sin goce de sueldo',
  'Adicional',
  'Otro'
];

let _coberturasCache = [];

// ── SCREEN PRINCIPAL ──
async function renderCoberturas() {
  const c = document.getElementById('main-content');
  c.innerHTML = `<div class="section-title">Coberturas</div><div style="text-align:center;padding:30px;color:var(--text3)">Cargando...</div>`;

  const [coberturas, operarios, servicios] = await Promise.all([
    fsList('horas_coberturas'),
    fsList('horas_usuarios'),
    fsList('horas_servicios')
  ]);
  _coberturasCache = coberturas;

  // Stats
  const activas = coberturas.filter(c => c.estado === 'ACTIVA').length;
  const vencidas = coberturas.filter(c => c.estado === 'ACTIVA' && c.fechaFin && c.fechaFin < isoHoy()).length;

  c.innerHTML = `
    <div class="section-title">Coberturas</div>
    <div class="section-sub">Asignaciones variables y reemplazos</div>

    <div class="admin-grid" style="margin-bottom:14px">
      <div class="stat-card"><div class="stat-num">${activas}</div><div class="stat-label">Activas</div></div>
      <div class="stat-card"><div class="stat-num" style="color:${vencidas>0?'var(--yellow)':'var(--green)'}">${vencidas}</div><div class="stat-label">⚠ Vencidas</div></div>
    </div>

    <button class="btn-primary" style="margin-bottom:14px" onclick="modalCobertura()">+ NUEVA COBERTURA</button>

    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <input id="cob-buscar" placeholder="🔍 Buscar operario o cliente..." oninput="filtrarCoberturas()"
        style="flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:14px;outline:none">
      <select id="cob-filtro-estado" onchange="filtrarCoberturas()"
        style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;outline:none">
        <option value="">Todos los estados</option>
        <option value="ACTIVA">Activa</option>
        <option value="PAUSADA">Pausada</option>
        <option value="CERRADA">Cerrada</option>
      </select>
    </div>

    <div id="cob-lista"></div>`;

  filtrarCoberturas();
}

function filtrarCoberturas() {
  const q = (document.getElementById('cob-buscar')?.value || '').toLowerCase();
  const filtroEst = document.getElementById('cob-filtro-estado')?.value || '';

  let lista = _coberturasCache;
  if (q) lista = lista.filter(c =>
    (c.operarioNombre||'').toLowerCase().includes(q) ||
    (c.clienteNombre||'').toLowerCase().includes(q)
  );
  if (filtroEst) lista = lista.filter(c => c.estado === filtroEst);

  // Ordenar: activas primero, luego por fecha inicio desc
  lista = lista.sort((a,b) => {
    if (a.estado === 'ACTIVA' && b.estado !== 'ACTIVA') return -1;
    if (b.estado === 'ACTIVA' && a.estado !== 'ACTIVA') return 1;
    return (b.fechaInicio||'').localeCompare(a.fechaInicio||'');
  });

  const cont = document.getElementById('cob-lista');
  if (!cont) return;

  if (lista.length === 0) {
    cont.innerHTML = `<div class="card-section"><div style="color:var(--text3);text-align:center;padding:20px">Sin coberturas registradas</div></div>`;
    return;
  }

  cont.innerHTML = lista.map(cob => {
    const hoy = isoHoy();
    const vencida = cob.estado === 'ACTIVA' && cob.fechaFin && cob.fechaFin < hoy;
    const estadoColor = cob.estado === 'ACTIVA' ? (vencida ? 'pill-yellow' : 'pill-green') : cob.estado === 'PAUSADA' ? 'pill-yellow' : 'pill-gray';
    const estadoLabel = vencida ? '⚠ VENCIDA' : cob.estado;
    const diasStr = (cob.dias||[]).join(' · ');

    return `<div class="card-section" style="margin-bottom:10px;padding:14px 16px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span class="pill ${estadoColor}">${estadoLabel}</span>
            <span class="pill pill-blue" style="font-size:10px">${cob.motivo||'—'}</span>
          </div>
          <div style="font-family:var(--font-display);font-size:18px;font-weight:700">${cob.operarioNombre||'—'}</div>
          <div style="font-size:13px;color:var(--text2);margin-top:2px">🏢 ${cob.clienteNombre||'—'}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px">
            📅 Desde: ${cob.fechaInicio||'—'} → ${cob.fechaFin ? 'Hasta: '+cob.fechaFin : '<em>Sin fecha de cierre</em>'}
          </div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">
            ${diasStr} · ${cob.horaInicio||'--:--'} – ${cob.horaFin||'--:--'} · ${cob.horasContratadas||0}hs
            ${cob.horasExtraAutorizadas > 0 ? `· <span style="color:var(--yellow)">+${cob.horasExtraAutorizadas}hs extra autorizadas</span>` : ''}
          </div>
          ${cob.observaciones ? `<div style="font-size:12px;color:var(--text2);margin-top:4px;font-style:italic">"${cob.observaciones}"</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
          <button class="btn-icon edit" title="Editar" onclick="modalCobertura('${cob._id}')">✏️</button>
          ${cob.estado === 'ACTIVA'
            ? `<button class="btn-icon" title="Pausar" onclick="cambiarEstadoCobertura('${cob._id}','PAUSADA')" style="font-size:13px">⏸</button>
               <button class="btn-icon" title="Cerrar" onclick="cambiarEstadoCobertura('${cob._id}','CERRADA')" style="font-size:13px">✓</button>`
            : cob.estado === 'PAUSADA'
            ? `<button class="btn-icon edit" title="Reactivar" onclick="cambiarEstadoCobertura('${cob._id}','ACTIVA')" style="font-size:13px">▶</button>`
            : ''
          }
          <button class="btn-icon" title="Eliminar" onclick="eliminarCobertura('${cob._id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ALTA / EDICIÓN ──
async function modalCobertura(id = null) {
  const [operarios, servicios] = await Promise.all([
    fsList('horas_usuarios'),
    fsList('horas_servicios')
  ]);

  let cob = {};
  if (id) cob = await fsGet('horas_coberturas', id) || {};
  const esEdicion = !!id;

  // Solo operarios VARIABLE o sin tipo definido
  const opsVariable = operarios
    .filter(o => o.rol === 'OPERARIO')
    .sort((a,b) => a.nombre.localeCompare(b.nombre));

  const srvOpts = servicios
    .sort((a,b) => (a.cliente||'').localeCompare(b.cliente||''))
    .map(s => `<option value="${s._id}" data-dias='${JSON.stringify(s.dias||[])}' data-inicio="${s.horaInicio||''}" data-fin="${s.horaFin||''}" data-hs="${s.horasContratadas||0}" ${cob.servicioId===s._id?'selected':''}>${s.cliente} ${s.codigo?'#'+s.codigo:''}</option>`)
    .join('');

  const diasCob = Array.isArray(cob.dias) ? cob.dias : [];

  const m = document.getElementById('modal-container');
  m.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)cerrarModal()">
      <div class="modal">
        <div class="modal-title">${esEdicion ? 'Editar Cobertura' : 'Nueva Cobertura'}</div>

        <div class="field-sm">
          <label>Operario</label>
          <input id="cob-op-buscar" placeholder="🔍 Buscar operario..." oninput="filtrarOpsCob()"
            style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;outline:none;margin-bottom:4px">
          <select id="cob-op" size="4" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px;border-radius:8px;font-size:13px" onchange="autocompletarDesdePerfil()">
            ${opsVariable.map(o => `<option value="${o._id}" data-nombre="${o.nombre}" ${cob.operarioId===o._id?'selected':''}>${o.nombre}${o.dni?' · DNI '+o.dni:''}</option>`).join('')}
          </select>
        </div>

        <div class="field-sm">
          <label>Servicio / Objetivo</label>
          <input id="cob-srv-buscar" placeholder="🔍 Buscar servicio..." oninput="filtrarSrvCob()"
            style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;outline:none;margin-bottom:4px">
          <select id="cob-srv" size="4" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px;border-radius:8px;font-size:13px" onchange="cargarDatosServicio()">
            ${srvOpts}
          </select>
        </div>

        <div class="field-sm">
          <label>Motivo</label>
          <select id="cob-motivo" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:14px;outline:none">
            ${MOTIVOS_COBERTURA.map(m => `<option value="${m}" ${cob.motivo===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>

        <div class="form-row">
          <div class="field-sm">
            <label>Fecha inicio</label>
            <input id="cob-finicio" type="date" value="${cob.fechaInicio||isoHoy()}">
          </div>
          <div class="field-sm">
            <label>Fecha fin <span style="color:var(--text3);font-size:10px">(vacío = indefinida)</span></label>
            <input id="cob-ffin" type="date" value="${cob.fechaFin||''}">
          </div>
        </div>

        <div class="field-sm">
          <label>Días de trabajo</label>
          <div class="dias-check" id="dias-check-cob">
            ${DIAS_SEMANA.map(d => `<button class="dia-btn ${diasCob.includes(d)?'sel':''}" id="cob-dia-${d}" onclick="toggleDiaCob('${d}')">${d}</button>`).join('')}
          </div>
        </div>

        <div class="form-row">
          <div class="field-sm"><label>Hora inicio</label><input id="cob-hinicio" type="time" value="${cob.horaInicio||''}"></div>
          <div class="field-sm"><label>Hora fin</label><input id="cob-hfin" type="time" value="${cob.horaFin||''}"></div>
        </div>

        <div class="form-row">
          <div class="field-sm">
            <label>Horas contratadas / jornada</label>
            <input id="cob-hs" type="number" step="0.5" value="${cob.horasContratadas||''}">
          </div>
          <div class="field-sm">
            <label>Hs. extra autorizadas</label>
            <input id="cob-hsextra" type="number" step="0.5" placeholder="0" value="${cob.horasExtraAutorizadas||0}">
          </div>
        </div>

        <div class="field-sm">
          <label>Observaciones</label>
          <input id="cob-obs" placeholder="Ej: Cubre a Pérez por vacaciones" value="${cob.observaciones||''}">
        </div>

        <div class="modal-actions">
          <button class="btn-secondary" onclick="cerrarModal()">CANCELAR</button>
          <button class="btn-primary" onclick="guardarCobertura('${id||''}')">
            ${esEdicion ? '💾 GUARDAR CAMBIOS' : '✓ CREAR COBERTURA'}
          </button>
        </div>
      </div>
    </div>`;

  // Inicializar días seleccionados
  _diasSelCob = [...diasCob];
}

let _diasSelCob = [];

function toggleDiaCob(dia) {
  const btn = document.getElementById('cob-dia-' + dia);
  if (_diasSelCob.includes(dia)) {
    _diasSelCob = _diasSelCob.filter(d => d !== dia);
    btn.classList.remove('sel');
  } else {
    _diasSelCob.push(dia);
    btn.classList.add('sel');
  }
}

function filtrarOpsCob() {
  const q = (document.getElementById('cob-op-buscar')?.value || '').toLowerCase();
  document.querySelectorAll('#cob-op option').forEach(opt => {
    opt.style.display = opt.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function filtrarSrvCob() {
  const q = (document.getElementById('cob-srv-buscar')?.value || '').toLowerCase();
  document.querySelectorAll('#cob-srv option').forEach(opt => {
    opt.style.display = opt.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function cargarDatosServicio() {
  const sel = document.getElementById('cob-srv');
  const opt = sel.options[sel.selectedIndex];
  if (!opt) return;

  // Precargar días, horarios y horas del servicio seleccionado
  try {
    const dias = JSON.parse(opt.dataset.dias || '[]');
    _diasSelCob = [...dias];
    DIAS_SEMANA.forEach(d => {
      const btn = document.getElementById('cob-dia-' + d);
      if (btn) btn.classList.toggle('sel', dias.includes(d));
    });
  } catch(e) {}

  const hi = opt.dataset.inicio;
  const hf = opt.dataset.fin;
  const hs = opt.dataset.hs;
  if (hi) document.getElementById('cob-hinicio').value = hi;
  if (hf) document.getElementById('cob-hfin').value = hf;
  if (hs) document.getElementById('cob-hs').value = hs;
}

async function guardarCobertura(id = '') {
  const opSel = document.getElementById('cob-op');
  const srvSel = document.getElementById('cob-srv');

  const operarioId = opSel?.value || '';
  const operarioNombre = opSel?.options[opSel.selectedIndex]?.dataset.nombre || opSel?.options[opSel.selectedIndex]?.text?.split(' · ')[0] || '';
  const servicioId = srvSel?.value || '';
  const clienteNombre = srvSel?.options[srvSel.selectedIndex]?.text?.split(' #')[0] || '';
  const motivo = document.getElementById('cob-motivo').value;
  const fechaInicio = document.getElementById('cob-finicio').value;
  const fechaFin = document.getElementById('cob-ffin').value;
  const horaInicio = document.getElementById('cob-hinicio').value;
  const horaFin = document.getElementById('cob-hfin').value;
  const horasContratadas = Number(document.getElementById('cob-hs').value) || 0;
  const horasExtraAutorizadas = Number(document.getElementById('cob-hsextra').value) || 0;
  const observaciones = document.getElementById('cob-obs').value.trim();

  if (!operarioId) return toast('Seleccioná un operario', 'warn');
  if (!servicioId) return toast('Seleccioná un servicio', 'warn');
  if (!fechaInicio) return toast('La fecha de inicio es obligatoria', 'warn');
  if (_diasSelCob.length === 0) return toast('Seleccioná al menos un día', 'warn');

  const data = {
    operarioId, operarioNombre, servicioId, clienteNombre,
    motivo, fechaInicio, fechaFin,
    horaInicio, horaFin, horasContratadas,
    horasExtraAutorizadas, observaciones,
    dias: _diasSelCob,
    estado: 'ACTIVA',
    creadaPor: currentUser.nombre,
    fechaCreacion: id ? undefined : isoHoy()
  };
  if (!id) data.fechaCreacion = isoHoy();

  if (id) {
    // Mantener estado existente si ya tenía uno
    delete data.estado;
    await fsSave('horas_coberturas', id, data);
    toast(`✓ Cobertura actualizada`, 'ok');
  } else {
    await fsAdd('horas_coberturas', data);
    toast(`✓ Cobertura creada para ${operarioNombre}`, 'ok');
  }

  cerrarModal();
  renderCoberturas();
}

async function cambiarEstadoCobertura(id, nuevoEstado) {
  const labels = { ACTIVA: 'reactivar', PAUSADA: 'pausar', CERRADA: 'cerrar' };
  if (!confirm(`¿Deseas ${labels[nuevoEstado]} esta cobertura?`)) return;
  await fsSave('horas_coberturas', id, { estado: nuevoEstado });
  toast(`Cobertura ${nuevoEstado.toLowerCase()}`, 'ok');
  const idx = _coberturasCache.findIndex(c => c._id === id);
  if (idx >= 0) _coberturasCache[idx].estado = nuevoEstado;
  filtrarCoberturas();
}

async function eliminarCobertura(id) {
  if (!confirm('¿Eliminar esta cobertura? No se pueden deshacer.')) return;
  await fsDelete('horas_coberturas', id);
  _coberturasCache = _coberturasCache.filter(c => c._id !== id);
  filtrarCoberturas();
  toast('Cobertura eliminada', 'ok');
}

// ════════════════════════════════════════════
//  FICHAR — integración con coberturas
// ════════════════════════════════════════════
async function cargarCoberturasHoy() {
  const hoy = isoHoy();
  const diaIdx = diasHoy();
  const diaStr = DIAS_SEMANA[diaIdx];

  const coberturas = await fsList('horas_coberturas');
  return coberturas.filter(cob =>
    cob.operarioId === currentUser._id &&
    cob.estado === 'ACTIVA' &&
    (cob.dias||[]).includes(diaStr) &&
    cob.fechaInicio <= hoy &&
    (!cob.fechaFin || cob.fechaFin >= hoy)
  );
}


function cerrarModal() {
  document.getElementById('modal-container').innerHTML = '';
}
