// ── REPORTE 1: BANCO DE HORAS ──
async function renderReporteBancoHoras() {
  const c = document.getElementById('main-content');
  c.innerHTML = `<div class="section-title">Banco de Horas</div><div style="text-align:center;padding:30px;color:var(--text3)">Calculando...</div>`;

  const [operarios, fichadas, servicios, coberturas] = await Promise.all([
    fsList('horas_usuarios'), fsList('horas_fichadas'), fsList('horas_servicios'), fsList('horas_coberturas')
  ]);

  const mesActual = isoHoy().slice(0, 7);
  const fichadasMes = fichadas.filter(f => f.fecha?.startsWith(mesActual));

  // Horas fichadas reales este mes por operario
  const horasFichadasMes = {};
  for (const f of fichadasMes) {
    if (!f.operarioId || !f.horasTrabajadas) continue;
    horasFichadasMes[f.operarioId] = (horasFichadasMes[f.operarioId] || 0) + f.horasTrabajadas;
  }

  // Horas fijas por operario desde servicios asignados
  const horasFijasMes = {};
  for (const s of servicios) {
    const opsS = Array.isArray(s.operarios) ? s.operarios : [];
    const hsSemanales = Number(s.horasPorSemana) || (Number(s.horasContratadas)||0) * (s.dias?.length||0);
    const hsMensuales = hsSemanales * 4;
    for (const opId of opsS) {
      horasFijasMes[opId] = (horasFijasMes[opId] || 0) + hsMensuales;
    }
  }

  // ── HORAS DE COBERTURA (reemplazante) ──
  // Para coberturas activas del mes donde el operario es reemplazante
  // Si ya fichó → usar horas fichadas (ya están en horasFichadasMes)
  // Si NO fichó → calcular estimado desde días × horasContratadas y marcar como estimado
  const horasCoberturaEstimadas = {}; // { operarioId: { hs, sinFichar } }

  const cobMes = coberturas.filter(c =>
    c.reemplazanteId &&
    c.estado === 'ACTIVA' &&
    c.fechaInicio?.slice(0,7) === mesActual
  );

  for (const cob of cobMes) {
    const opId = cob.reemplazanteId;
    // Calcular horas exactas por día del período
    const fi = new Date(cob.fechaInicio + 'T12:00:00');
    const ff = cob.fechaFin ? new Date(cob.fechaFin + 'T12:00:00') : new Date();
    const diasCob2 = cob.dias || [];
    let hsEstimadas = 0;
    const srv2 = servicios.find(s => s._id === cob.servicioId);
    let horariosSrv = {};
    if (srv2?.horariosPorDia) {
      try { horariosSrv = typeof srv2.horariosPorDia==='string'?JSON.parse(srv2.horariosPorDia):srv2.horariosPorDia; } catch{}
    }
    const cur2 = new Date(fi);
    const DIAS_MAP2 = ['DOM','LUN','MAR','MIE','JUE','VIE','SAB'];
    while (cur2 <= ff) {
      const diaStr2 = DIAS_MAP2[cur2.getDay()];
      if (diasCob2.includes(diaStr2)) {
        let hsDia = Number(cob.horasContratadas) || 0;
        if (horariosSrv[diaStr2]?.hs) hsDia = Number(horariosSrv[diaStr2].hs);
        else if (srv2?.horasPorSemana && srv2?.dias?.length) hsDia = Number(srv2.horasPorSemana) / srv2.dias.length;
        hsEstimadas += hsDia;
      }
      cur2.setDate(cur2.getDate() + 1);
    }

    // Verificar si ya fichó en alguna de estas coberturas
    const fichadoCob = fichadasMes.some(f =>
      f.operarioId === opId &&
      f.coberturaId === cob._id
    );

    if (!horasCoberturaEstimadas[opId]) horasCoberturaEstimadas[opId] = { hs: 0, sinFichar: 0, conFichar: 0 };
    if (fichadoCob) {
      horasCoberturaEstimadas[opId].conFichar += hsEstimadas;
    } else {
      horasCoberturaEstimadas[opId].hs += hsEstimadas;
      horasCoberturaEstimadas[opId].sinFichar += hsEstimadas;
    }
  }

  // ── OPERARIOS EN LICENCIA POR ENFERMEDAD ──
  // Si tienen una cobertura AUSENCIA activa con motivo lic. por enfermedad este mes
  // sus horas fijas NO se computan mientras dure la licencia
  const enLicencia = {}; // { operarioId: { cob, diasLicencia } }
  const hoy = isoHoy();

  const cobsLicencia = coberturas.filter(c => {
    const motivo = (c.motivo||'').toLowerCase().trim();
    const opId = c.ausenteId || c.operarioId;
    return (
      c.estado === 'ACTIVA' &&
      (motivo.includes('enfermedad') || motivo.includes('art') || (motivo.includes('lic') && motivo.includes('enf'))) &&
      opId &&
      c.fechaInicio <= hoy &&
      (!c.fechaFin || c.fechaFin >= mesActual + '-01')
    );
  });

  for (const cob of cobsLicencia) {
    // Calcular días de licencia dentro del mes actual
    const fi = new Date(Math.max(new Date(cob.fechaInicio + 'T12:00:00'), new Date(mesActual + '-01T12:00:00')));
    const ff = new Date(Math.min(
      cob.fechaFin ? new Date(cob.fechaFin + 'T12:00:00') : new Date(hoy + 'T12:00:00'),
      new Date(hoy + 'T12:00:00')
    ));
    const diasLicencia = Math.max(0, Math.round((ff - fi) / (1000*60*60*24)) + 1);
    const opIdLic = cob.ausenteId || cob.operarioId;
    if (opIdLic) enLicencia[opIdLic] = { cob, diasLicencia, fechaInicio: cob.fechaInicio, fechaFin: cob.fechaFin };
  }

  // Total = fijas + variables fichadas + coberturas estimadas
  const ops = operarios.filter(o => o.rol === 'OPERARIO' && o.horasRecibo);
  const rows = ops.map(o => {
    const recibo = Number(o.horasRecibo) || 0;
    const licInfo = enLicencia[o._id];

    // Si está en licencia → calcular proporción de horas fijas a descontar
    let hsFijas = horasFijasMes[o._id] || 0;
    let hsFijasDescontadas = 0;
    if (licInfo) {
      // Días hábiles de licencia / días hábiles del mes × horas fijas mensuales
      const diasMes = new Date(parseInt(mesActual.split('-')[0]), parseInt(mesActual.split('-')[1]), 0).getDate();
      const proporcion = Math.min(1, licInfo.diasLicencia / diasMes);
      hsFijasDescontadas = hsFijas * proporcion;
      hsFijas = Math.max(0, hsFijas - hsFijasDescontadas);
    }

    const hsVariables = horasFichadasMes[o._id] || 0;
    const cobInfo = horasCoberturaEstimadas[o._id];
    const hsCoberturas = cobInfo ? cobInfo.hs : 0;
    const hsSinFichar = cobInfo ? cobInfo.sinFichar : 0;
    const trabajadas = hsFijas + hsVariables + hsCoberturas;
    const fuente = hsFijas > 0 && (hsVariables + hsCoberturas) > 0 ? 'MIXTO'
      : hsFijas > 0 ? 'FIJO'
      : (hsVariables + hsCoberturas) > 0 ? 'VARIABLE' : '—';
    const diff = trabajadas - recibo;
    return { op: o, recibo, trabajadas, hsFijas, hsVariables, hsCoberturas, hsSinFichar, diff, fuente, licInfo, hsFijasDescontadas };
  }).sort((a, b) => {
    // Licencias primero, luego por diferencia
    if (a.licInfo && !b.licInfo) return -1;
    if (!a.licInfo && b.licInfo) return 1;
    return a.diff - b.diff;
  });

  const nosDebenCount = rows.filter(r => r.diff < 0 && !r.licInfo).length;
  const debemosCount = rows.filter(r => r.diff > 0 && !r.licInfo).length;
  const equilibrio = rows.filter(r => r.diff === 0 && !r.licInfo).length;
  const licenciaCount = rows.filter(r => r.licInfo).length;

  const [y, m] = mesActual.split('-');
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  c.innerHTML = `
    <button class="btn-secondary" style="padding:7px 14px;font-size:13px;margin-bottom:14px" onclick="renderReportes()">← Volver</button>
    <div class="section-title">⚖️ Banco de Horas</div>
    <div class="section-sub">${meses[parseInt(m)-1]} ${y}</div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px">
      <div class="stat-card" style="border-color:rgba(214,61,74,.3);cursor:pointer" onclick="document.getElementById('rp-filtro').value='deben';filtrarBanco()">
        <div class="stat-num" style="color:var(--red)">${nosDebenCount}</div>
        <div class="stat-label">Nos deben</div>
      </div>
      <div class="stat-card" style="border-color:rgba(39,168,90,.3);cursor:pointer" onclick="document.getElementById('rp-filtro').value='debemos';filtrarBanco()">
        <div class="stat-num" style="color:var(--green)">${debemosCount}</div>
        <div class="stat-label">Les debemos</div>
      </div>
      <div class="stat-card" style="cursor:pointer" onclick="document.getElementById('rp-filtro').value='ok';filtrarBanco()">
        <div class="stat-num">${equilibrio}</div>
        <div class="stat-label">Equilibrio</div>
      </div>
      <div class="stat-card" style="border-color:rgba(26,143,203,.3);cursor:pointer;background:rgba(26,143,203,.04)" onclick="document.getElementById('rp-filtro').value='licencia';filtrarBanco()">
        <div class="stat-num" style="color:var(--accent)">${licenciaCount}</div>
        <div class="stat-label">🏥 En licencia</div>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <input id="rp-buscar" placeholder="🔍 Buscar operario..." oninput="filtrarBanco()"
        style="flex:1;min-width:160px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:14px;outline:none">
      <select id="rp-filtro" onchange="filtrarBanco()"
        style="background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;outline:none">
        <option value="">Todos</option>
        <option value="deben">Nos deben horas</option>
        <option value="debemos">Les debemos</option>
        <option value="ok">En equilibrio</option>
        <option value="licencia">🏥 En licencia</option>
      </select>
      <button class="btn-secondary" style="padding:9px 14px;font-size:13px" onclick="exportarBancoHoras()">⬇ Excel</button>
    </div>

    <div id="banco-tabla"></div>`;

  // Guardar rows globalmente para filtrado
  window._bancoRows = rows;
  filtrarBanco();
}

function filtrarBanco() {
  const q = (document.getElementById('rp-buscar')?.value || '').toLowerCase();
  const filtro = document.getElementById('rp-filtro')?.value || '';
  let rows = window._bancoRows || [];

  if (q) rows = rows.filter(r => (r.op.nombre||'').toLowerCase().replace(/,/g,' ').includes(q.replace(/,/g,' ')));
  if (filtro === 'deben') rows = rows.filter(r => r.diff < 0 && !r.licInfo);
  else if (filtro === 'debemos') rows = rows.filter(r => r.diff > 0 && !r.licInfo);
  else if (filtro === 'ok') rows = rows.filter(r => r.diff === 0 && !r.licInfo);
  else if (filtro === 'licencia') rows = rows.filter(r => r.licInfo);

  const cont = document.getElementById('banco-tabla');
  if (!cont) return;

  if (!rows.length) {
    cont.innerHTML = `<div class="card-section"><div style="text-align:center;padding:20px;color:var(--text3)">Sin resultados</div></div>`;
    return;
  }

  cont.innerHTML = `<div class="card-section" style="padding:0;overflow:hidden">
    <div style="padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase">
      <div>Operario</div><div style="text-align:center">Recibo</div><div style="text-align:center">Trabajadas</div><div style="text-align:center">Diferencia</div>
    </div>
    ${rows.map((r, i) => {
      const esLicencia = !!r.licInfo;
      const bg = esLicencia
        ? 'background:rgba(26,143,203,.04)'
        : i % 2 === 0 ? '' : 'background:var(--surface2)';
      const diffColor = r.diff < 0 ? 'var(--red)' : r.diff > 0 ? 'var(--green)' : 'var(--text3)';
      const diffLabel = r.diff < 0 ? `${r.diff.toFixed(1)}hs` : r.diff > 0 ? `+${r.diff.toFixed(1)}hs` : '—';
      return `<div style="padding:11px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;align-items:center;${bg}">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">${r.op.nombre}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:1px;display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span>Leg. ${r.op.legajo||'—'}</span>
            ${esLicencia
              ? `<span style="background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;white-space:nowrap">🏥 LIC. ENFERMEDAD</span>`
              : `<span style="background:${r.fuente==='FIJO'?'var(--accent-light)':r.fuente==='VARIABLE'?'var(--yellow-light)':'rgba(39,168,90,.1)'};color:${r.fuente==='FIJO'?'var(--accent)':r.fuente==='VARIABLE'?'var(--yellow)':'var(--green)'};padding:2px 6px;border-radius:10px;font-size:9px;font-weight:700;white-space:nowrap">${r.fuente}</span>`
            }
          </div>
          ${esLicencia ? `<div style="font-size:10px;color:var(--accent);margin-top:2px">
            Desde ${r.licInfo.fechaInicio} ${r.licInfo.fechaFin?'→ '+r.licInfo.fechaFin:'→ abierto'} · ${r.licInfo.diasLicencia} días este mes
            ${r.hsFijasDescontadas > 0 ? `· <span style="color:var(--text3)">${r.hsFijasDescontadas.toFixed(0)}hs fijas descontadas</span>` : ''}
          </div>` : ''}
          ${!esLicencia && r.hsSinFichar > 0 ? `<div style="font-size:10px;color:var(--yellow);font-weight:700;margin-top:2px">⚠ ${r.hsSinFichar.toFixed(1)}hs de cobertura estimadas sin fichar</div>` : ''}
          ${!esLicencia && r.hsCoberturas > 0 && r.hsSinFichar === 0 ? `<div style="font-size:10px;color:var(--green);margin-top:2px">✓ ${r.hsCoberturas.toFixed(1)}hs de cobertura fichadas</div>` : ''}
        </div>
        <div style="text-align:center;font-size:14px;font-weight:700;color:var(--text2)">${r.recibo}</div>
        <div style="text-align:center;font-size:14px;font-weight:700;color:${esLicencia?'var(--accent)':'var(--text2)'}">
          ${esLicencia ? `${r.trabajadas.toFixed(1)}<span style="font-size:9px;display:block;color:var(--accent)">+lic</span>` : `${r.trabajadas.toFixed(1)}${r.hsSinFichar>0?'<span style="font-size:10px;color:var(--yellow)"> *</span>':''}`}
        </div>
        <div style="text-align:center;font-size:15px;font-weight:900;color:${esLicencia?'var(--accent)':diffColor}">
          ${esLicencia ? '🏥' : diffLabel}
        </div>
      </div>`;
    }).join('')}
  </div>
  ${rows.some(r=>r.hsSinFichar>0) ? `<div style="font-size:11px;color:var(--yellow);padding:8px 12px;background:rgba(224,123,42,.06);border-radius:8px;margin-top:8px">⚠ Los valores con * incluyen horas de cobertura <strong>estimadas</strong> sin fichar aún. Se actualizarán cuando el reemplazante fiche.</div>` : ''}`;
}

async function exportarBancoHoras() {
  const rows = window._bancoRows || [];
  const mes = isoHoy().slice(0, 7);
  let csv = `BANCO DE HORAS;${mes}\n\n`;
  csv += `Legajo;Operario;Tipo;Horas Recibo;Horas Trabajadas;Diferencia;Estado\n`;
  for (const r of rows) {
    const estado = r.diff < 0 ? 'Nos deben' : r.diff > 0 ? 'Les debemos' : 'Equilibrio';
    csv += [r.op.legajo||'', r.op.nombre, r.op.tipo||'FIJO', r.recibo, r.trabajadas.toFixed(1), r.diff.toFixed(1), estado].join(';') + '\n';
  }
  const nosDebenTotal = rows.filter(r=>r.diff<0).reduce((s,r)=>s+Math.abs(r.diff),0);
  const debemosTotal = rows.filter(r=>r.diff>0).reduce((s,r)=>s+r.diff,0);
  csv += `\n;TOTALES;;;;\n`;
  csv += `;Horas que nos deben:;${nosDebenTotal.toFixed(1)}\n`;
  csv += `;Horas que debemos:;${debemosTotal.toFixed(1)}\n`;

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `BancoHoras_${mes}.csv`;
  link.click(); toast('✓ Exportado', 'ok');
}

async function renderArchivoMensual() {
  const c = document.getElementById('main-content');
  c.innerHTML = `<div class="section-title">🗄️ Archivo Mensual</div><div style="text-align:center;padding:30px;color:var(--text3)">Cargando...</div>`;

  const [fichadas, coberturas, configDoc] = await Promise.all([
    fsList('horas_fichadas'),
    fsList('horas_coberturas'),
    fsGet('config', 'archivo_mensual')
  ]);

  const config = configDoc || { meses: [] };
  const mesesArchivados = config.meses || [];

  // Agrupar fichadas y coberturas por mes
  const mesesFichadas = {};
  for (const f of fichadas) {
    const mes = f.fecha?.slice(0,7);
    if (!mes) continue;
    if (!mesesFichadas[mes]) mesesFichadas[mes] = { fichadas: [], coberturas: [] };
    mesesFichadas[mes].fichadas.push(f);
  }
  for (const cob of coberturas) {
    const mes = cob.fechaInicio?.slice(0,7);
    if (!mes) continue;
    if (!mesesFichadas[mes]) mesesFichadas[mes] = { fichadas: [], coberturas: [] };
    mesesFichadas[mes].coberturas.push(cob);
  }

  const mesesDisponibles = Object.keys(mesesFichadas).sort().reverse();
  const mesActual = isoHoy().slice(0,7);
  const meses_nombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // Detectar meses con más de 6 meses de antigüedad
  const hace6 = new Date();
  hace6.setMonth(hace6.getMonth() - 6);
  const limite6meses = hace6.toISOString().slice(0,7);
  const mesesAntiguos = mesesDisponibles.filter(m => m < limite6meses && !mesesArchivados.includes(m));

  c.innerHTML = `
    <button class="btn-secondary" style="padding:7px 14px;font-size:13px;margin-bottom:14px" onclick="renderReportes()">← Volver</button>
    <div class="section-title">🗄️ Archivo Mensual</div>
    <div class="section-sub">Descargá los datos a Excel y mantené Firestore liviano</div>

    ${mesesAntiguos.length > 0 ? `
    <div style="background:rgba(214,61,74,.08);border:1.5px solid rgba(214,61,74,.3);border-radius:12px;padding:14px;margin-bottom:16px">
      <div style="font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--red);margin-bottom:6px">
        ⚠ ${mesesAntiguos.length} mes${mesesAntiguos.length>1?'es':''} con más de 6 meses sin archivar
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px">
        ${mesesAntiguos.map(m => {
          const [y,mo] = m.split('-');
          return `${meses_nombres[parseInt(mo)-1]} ${y}`;
        }).join(', ')}
      </div>
      <button class="btn-primary" style="background:linear-gradient(135deg,var(--red),#b02a35)" onclick="archivarYBorrarAntiGuos(${JSON.stringify(mesesAntiguos)})">
        📥 ARCHIVAR Y LIMPIAR TODOS
      </button>
    </div>` : mesesDisponibles.length > 0 ? `
    <div style="background:var(--green-light);border:1.5px solid rgba(39,168,90,.3);border-radius:12px;padding:12px;margin-bottom:16px">
      <div style="font-size:13px;color:var(--green);font-weight:600">✅ Todo al día — sin datos antiguos pendientes de archivar</div>
    </div>` : ''}

    ${mesesDisponibles.length === 0 ? `
    <div class="card-section"><div style="text-align:center;padding:20px;color:var(--text3)">Sin datos de fichadas registrados aún</div></div>
    ` : mesesDisponibles.map(mes => {
      const [y, mo] = mes.split('-');
      const label = `${meses_nombres[parseInt(mo)-1]} ${y}`;
      const data = mesesFichadas[mes];
      const archivado = mesesArchivados.includes(mes);
      const esActual = mes === mesActual;
      const antiguo = mes < limite6meses;

      return `
      <div class="card-section" style="margin-bottom:10px;${antiguo && !archivado?'border-color:rgba(214,61,74,.3);background:rgba(214,61,74,.04)':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div>
            <div style="font-family:var(--font-display);font-size:18px;font-weight:700">
              📅 ${label}
              ${esActual?'<span style="font-size:11px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:8px;margin-left:6px">MES ACTUAL</span>':''}
              ${antiguo && !archivado?'<span style="font-size:11px;background:var(--red);color:#fff;padding:2px 7px;border-radius:8px;margin-left:6px">⚠ +6 MESES</span>':''}
            </div>
            <div style="font-size:13px;color:var(--text2);margin-top:4px">
              📍 ${data.fichadas.length} fichadas · 🔄 ${data.coberturas.length} coberturas
            </div>

          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn-secondary" style="flex:1;min-width:120px;padding:9px" onclick="descargarArchivoMes('${mes}')">
            📥 Descargar Excel
          </button>
          ${!esActual ? `<button class="btn-secondary" style="flex:1;min-width:120px;padding:9px;${antiguo && !archivado?'border-color:var(--red);color:var(--red)':''}" onclick="archivarYBorrarMes('${mes}')">
            🗑 Descargar y limpiar

async function descargarArchivoMes(mes) {
  const [y, mo] = mes.split('-');
  const meses_nombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const label = `${meses_nombres[parseInt(mo)-1]} ${y}`;

  const [fichadas, coberturas, operarios, servicios] = await Promise.all([
    fsList('horas_fichadas'), fsList('horas_coberturas'),
    fsList('horas_usuarios'), fsList('horas_servicios')
  ]);

  const fichadasMes = fichadas.filter(f => f.fecha?.startsWith(mes));
  const coberturasMes = coberturas.filter(c => c.fechaInicio?.startsWith(mes));

  let csv = `ARCHIVO MENSUAL MEGACLEAN;${label}\n`;
  csv += `Generado: ${new Date().toLocaleString('es-AR')}\n\n`;

  // FICHADAS
  csv += `FICHADAS (${fichadasMes.length})\n`;
  csv += `Fecha;Operario;Legajo;Servicio;Dirección;Entrada;Salida;Horas;GPS OK;Distancia GPS\n`;
  for (const f of fichadasMes.sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''))) {
    csv += [
      f.fecha||'', f.operarioNombre||'', f.operarioLegajo||'',
      f.clienteNombre||'', f.clienteDireccion||'',
      f.entrada||'', f.salida||'',
      (f.horasTrabajadas||0).toFixed(2),
      f.gpsOk?'SI':'NO', Math.round(f.distanciaEntrada||0)+'m'
    ].join(';') + '\n';
  }

  csv += `\nCOBERTURAS / AUSENCIAS (${coberturasMes.length})\n`;
  csv += `Tipo;Operario Ausente;Reemplazante;Motivo;Servicio;Fecha Inicio;Fecha Fin;Hs/Día;Estado\n`;
  for (const cob of coberturasMes) {
    csv += [
      cob.tipoCob||'AUSENCIA',
      cob.ausenteNombre||cob.operarioNombre||'',
      cob.reemplazanteNombre||'—',
      cob.motivo||'',
      cob.clienteNombre||'',
      cob.fechaInicio||'', cob.fechaFin||'',
      cob.horasContratadas||cob.horasTotal||0,
      cob.estado||''
    ].join(';') + '\n';
  }

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `MegaClean_Archivo_${mes}.csv`;
  link.click();
  toast(`✓ Archivo ${label} descargado`, 'ok');
}

async function archivarYBorrarMes(mes) {
  const [y, mo] = mes.split('-');
  const meses_nombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const label = `${meses_nombres[parseInt(mo)-1]} ${y}`;

  if (!confirm(`¿Archivar y limpiar ${label}?\n\n1. Se descargará el Excel completo\n2. Se borrarán las fichadas y coberturas de ese mes de Firestore\n\nAsegurate de guardar el Excel antes de confirmar.`)) return;

  // Primero descargar
  await descargarArchivoMes(mes);

  // Esperar 2 segundos para que descargue
  await new Promise(r => setTimeout(r, 2000));

  showLoader(true);

  const [fichadas, coberturas] = await Promise.all([
    fsList('horas_fichadas'), fsList('horas_coberturas')
  ]);

  // Borrar fichadas del mes
  const fichadasMes = fichadas.filter(f => f.fecha?.startsWith(mes));
  let borrados = 0;
  for (const f of fichadasMes) {
    await fsDelete('horas_fichadas', f._id);
    borrados++;
    if (borrados % 20 === 0) await new Promise(r => setTimeout(r, 200)); // pausa cada 20
  }

  // Borrar coberturas cerradas del mes
  const cobMes = coberturas.filter(c =>
    c.fechaInicio?.startsWith(mes) && c.estado === 'CERRADA'
  );
  for (const cob of cobMes) {
    await fsDelete('horas_coberturas', cob._id);
  }

  // Registrar como archivado
  const configDoc = await fsGet('config', 'archivo_mensual') || { meses: [] };
  const meses = configDoc.meses || [];
  if (!meses.includes(mes)) meses.push(mes);
  await fsSave('config', 'archivo_mensual', { meses });

  // Invalidar caches
  invalidarCache('horas_fichadas');
  invalidarCache('horas_coberturas');

  showLoader(false);
  toast(`✓ ${label} archivado — ${borrados} fichadas y ${cobMes.length} coberturas eliminadas`, 'ok');
  renderArchivoMensual();
}

async function archivarYBorrarAntiGuos(meses) {
  if (!confirm(`¿Archivar y limpiar ${meses.length} meses antiguos?\n\nSe descargarán todos en un solo Excel y se borrarán de Firestore.`)) return;

  for (const mes of meses) {
    await archivarYBorrarMes(mes);
    await new Promise(r => setTimeout(r, 1000));
  }
  toast('✅ Todos los meses antiguos archivados', 'ok');
}


async function renderReporteOperario() {
  const c = document.getElementById('main-content');
  c.innerHTML = `<div class="section-title">Por Operario</div><div style="text-align:center;padding:30px;color:var(--text3)">Cargando...</div>`;

  const [operarios, servicios, fichadas, coberturas] = await Promise.all([
    fsList('horas_usuarios'), fsList('horas_servicios'), fsList('horas_fichadas'), fsList('horas_coberturas')
  ]);
  const mes = isoHoy().slice(0,7);
  const hoy = isoHoy();
  const fichadasMes = fichadas.filter(f => f.fecha?.startsWith(mes));

  c.innerHTML = `
    <button class="btn-secondary" style="padding:7px 14px;font-size:13px;margin-bottom:14px" onclick="renderReportes()">← Volver</button>
    <div class="section-title">👷 Por Operario</div>
    <div class="section-sub">Cuenta corriente de horas · ${mes}</div>
    <input id="rp-op-q" placeholder="🔍 Buscar operario o legajo..." oninput="filtrarRepOp()"
      style="width:100%;background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:14px;outline:none;margin-bottom:14px">
    <div id="rp-op-lista"></div>`;

  window._rpOps = operarios.filter(o => o.rol === 'OPERARIO').map(o => {
    const srvs = servicios.filter(s => (Array.isArray(s.operarios)?s.operarios:[]).includes(o._id));
    const hsRecibo = Number(o.horasRecibo) || 0;
    const fichadasOp = fichadasMes.filter(f=>f.operarioId===o._id);
    const hsReales = fichadasOp.reduce((s,f)=>s+(f.horasTrabajadas||0),0);

    // Horas fijas
    const hsFijas = srvs.reduce((sum,s) => {
      const hsS = Number(s.horasPorSemana) || (Number(s.horasContratadas)||0)*(s.dias?.length||0);
      return sum + hsS * 4;
    }, 0);

    // Coberturas donde este operario es REEMPLAZANTE en el mes
    const cobsReemplazante = coberturas.filter(cob =>
      cob.reemplazanteId === o._id &&
      cob.estado === 'ACTIVA' &&
      cob.fechaInicio?.slice(0,7) === mes
    );

    // Obtener horarios por día del servicio original si existen
    const getHsPorDia = (cob, diaStr) => {
      // 1. Intentar desde horariosPorDia de la cobertura
      if (cob.horariosPorDia) {
        try {
          const hp = typeof cob.horariosPorDia==='string'?JSON.parse(cob.horariosPorDia):cob.horariosPorDia;
          if (hp[diaStr]?.hs && Number(hp[diaStr].hs) > 0) return Number(hp[diaStr].hs);
        } catch{}
      }
      // 2. Intentar desde el servicio original
      if (cob.servicioId) {
        const srv = servicios.find(s => s._id === cob.servicioId);
        if (srv?.horariosPorDia) {
          try {
            const hp = typeof srv.horariosPorDia==='string'?JSON.parse(srv.horariosPorDia):srv.horariosPorDia;
            if (hp[diaStr]?.hs && Number(hp[diaStr].hs) > 0) return Number(hp[diaStr].hs);
          } catch{}
        }
        // 3. Si el servicio tiene horasContratadas por jornada (no promedio)
        // Verificar que horasContratadas no sea un promedio raro (sin decimales largos)
        if (srv) {
          const hsDia = Number(srv.horasContratadas) || 0;
          // Si tiene horasPorSemana y días, calcular real por día
          if (srv.horasPorSemana && srv.dias?.length) {
            return Number(srv.horasPorSemana) / srv.dias.length;
          }
          return hsDia;
        }
      }
      // 4. Fallback: horasContratadas de la cobertura
      return Number(cob.horasContratadas) || 0;
    };

    // Calcular horas de cobertura día por día (exacto, no promedio)
    const detalleCoberturas = [];
    let hsCobTotal = 0;
    let hsCobSinFichar = 0;

    for (const cob of cobsReemplazante) {
      const fi = new Date(cob.fechaInicio + 'T12:00:00');
      const ff = cob.fechaFin ? new Date(cob.fechaFin + 'T12:00:00') : new Date(hoy + 'T12:00:00');
      const diasCob = cob.dias || [];
      const hsPorDia = Number(cob.horasContratadas) || 0;

      // Iterar cada día del período y verificar si ese día de la semana está en la cobertura
      let hsEstaCob = 0;
      let diasTrabajados = [];
      const cur = new Date(fi);
      while (cur <= ff) {
        const diaSemIdx = cur.getDay(); // 0=dom, 1=lun...
        const DIAS_JS_MAP = ['DOM','LUN','MAR','MIE','JUE','VIE','SAB'];
        const diaStr = DIAS_JS_MAP[diaSemIdx];
        if (diasCob.includes(diaStr)) {
          const hsEste = getHsPorDia(cob, diaStr);
          hsEstaCob += hsEste;
          diasTrabajados.push({ fecha: cur.toISOString().slice(0,10), dia: diaStr, hs: hsEste });
        }
        cur.setDate(cur.getDate() + 1);
      }

      // ¿Fichó en esta cobertura?
      const fichoCob = fichadasOp.some(f => f.coberturaId === cob._id);
      hsCobTotal += hsEstaCob;
      if (!fichoCob) hsCobSinFichar += hsEstaCob;

      if (hsEstaCob > 0) {
        detalleCoberturas.push({
          cob, hsEstaCob, diasTrabajados, fichoCob,
          cliente: cob.clienteNombre || '—',
          ausenteNombre: cob.ausenteNombre || '—'
        });
      }
    }

    const hsTotal = hsFijas + hsReales + hsCobSinFichar;
    const diff = hsTotal - hsRecibo;

    return {
      op: o, srvs, hsRecibo, hsFijas, hsVariables: hsReales,
      hsCobTotal, hsCobSinFichar, detalleCoberturas,
      hsTotal, diff
    };
  }).sort((a,b)=>a.op.nombre.localeCompare(b.op.nombre));

  filtrarRepOp();
}

      </div>
      <div class="stat-card">
        <div class="stat-num" style="font-size:28px;color:${totalTrabajadasMes-totalReciboMes>=0?'var(--green)':'var(--red)'}">${totalTrabajadasMes-totalReciboMes>=0?'+':''}${(totalTrabajadasMes-totalReciboMes).toFixed(0)}</div>
        <div class="stat-label">Balance Total</div>
      </div>
    </div>

    <button class="btn-primary" style="margin-bottom:14px" onclick="exportarCierreMensual()">⬇ EXPORTAR EXCEL COMPLETO</button>

    <div class="card-section" style="padding:0;overflow:hidden">
      <div style="padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase">
        <div>Operario</div><div style="text-align:center">Recibo</div><div style="text-align:center">Trabajadas</div><div style="text-align:center">Diferencia</div><div style="text-align:center">Servicios</div>
      </div>
      ${rows.map((r,i)=>`
        <div style="padding:10px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;align-items:center;${i%2===1?'background:var(--surface2)':''}">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text)">${r.o.nombre}</div>
            <div style="font-size:10px;color:var(--text3)">Leg.${r.o.legajo||'—'} · ${r.o.tipo||'FIJO'}</div>
          </div>
          <div style="text-align:center;font-size:13px;font-weight:700;color:var(--text2)">${r.recibo}</div>
          <div style="text-align:center;font-size:13px;font-weight:700;color:var(--text2)">${r.hsMes.toFixed(0)}</div>
          <div style="text-align:center;font-size:14px;font-weight:900;color:${r.diff<0?'var(--red)':r.diff>0?'var(--green)':'var(--text3)'}">
            ${r.diff>=0?'+':''}${r.diff.toFixed(0)}
          </div>
          <div style="text-align:center;font-size:13px;color:var(--text2)">${r.cantSrvs}</div>
        </div>`).join('')}
    </div>`;

  window._cierreMensualRows = rows;
  window._cierreMes = mes;
}

async function exportarCierreMensual() {
  const rows = window._cierreMensualRows||[];
  const mes = window._cierreMes||isoHoy().slice(0,7);
  const [y,m] = mes.split('-');
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  let csv = `CIERRE MENSUAL MEGACLEAN;${meses[parseInt(m)-1]} ${y}\n\n`;
  csv += `Legajo;Operario;Tipo;Supervisor;Horas Recibo;Horas Trabajadas;Diferencia;Cant. Servicios;Estado\n`;
  for (const r of rows) {
    const estado = r.diff<0?'Nos deben':r.diff>0?'Les debemos':'Equilibrio';
    csv += [r.o.legajo||'',r.o.nombre,r.o.tipo||'FIJO',r.o.supervisor||'',
      r.recibo,r.hsMes.toFixed(1),r.diff.toFixed(1),r.cantSrvs,estado].join(';')+'\n';
  }
  const totRec = rows.reduce((s,r)=>s+r.recibo,0);
  const totTrab = rows.reduce((s,r)=>s+r.hsMes,0);
  csv += `\n;TOTALES;;; ${totRec};${totTrab.toFixed(1)};${(totTrab-totRec).toFixed(1)};;\n`;

  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `CierreMensual_MegaClean_${mes}.csv`;
  link.click(); toast('✓ Cierre mensual exportado', 'ok');
}

//  MÓDULO: REPORTE AUSENTISMO
// ════════════════════════════════════════════
async function renderReporteAusentismo() {
  const c = document.getElementById('main-content');
  c.innerHTML = `<div class="section-title">Ausentismo</div><div style="text-align:center;padding:30px;color:var(--text3)">Cargando...</div>`;

  const coberturas = await fsList('horas_coberturas');
  const ausencias = coberturas.filter(cob => cob.tipoCob === 'AUSENCIA');

  // Selector de período
  const mesesSet = new Set();
  const hoy = isoHoy();
  ausencias.forEach(cob => { if (cob.fechaInicio) mesesSet.add(cob.fechaInicio.slice(0,7)); });
  // Incluir los últimos 6 meses aunque no haya datos
  for (let i = 0; i < 6; i++) {
    const d = new Date(); d.setMonth(d.getMonth() - i);
    mesesSet.add(d.toISOString().slice(0,7));
  }
  const meses = Array.from(mesesSet).sort().reverse();
  const mesSeleccionado = meses[0] || hoy.slice(0,7);

  function calcularDias(fechaInicio, fechaFin) {
    if (!fechaInicio) return 0;
    const fi = new Date(fechaInicio);
    const ff = fechaFin ? new Date(fechaFin) : new Date();
    return Math.max(1, Math.round((ff - fi) / (1000*60*60*24)) + 1);
  }

  function renderTabla(mes) {
    const [y, m] = mes.split('-');
    const mesInicio = mes + '-01';
    const mesFin = new Date(parseInt(y), parseInt(m), 0).toISOString().slice(0,10);
    const mesesNombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

    // Filtrar ausencias que se solapan con el mes
    const delMes = ausencias.filter(cob => {
      const ini = cob.fechaInicio || '';
      const fin = cob.fechaFin || hoy;
      return ini <= mesFin && fin >= mesInicio;
    });

    // Agrupar por operario
    const porOp = {};
    for (const cob of delMes) {
      const opId = cob.ausenteId || cob.operarioId || cob.ausenteNombre || 'sin';
      if (!porOp[opId]) porOp[opId] = { nombre: cob.ausenteNombre || cob.operarioNombre || '—', registros: [] };
      porOp[opId].registros.push(cob);
    }

    // Totales globales
    let totalDiasEnfermedad = 0, totalDiasART = 0, totalDiasEmpresa = 0, totalDiasARTcosto = 0;

    const filas = Object.values(porOp).map(op => {
      let diasEnf = 0, diasART = 0, diasARTcosto = 0, diasEmpresa = 0;

      for (const cob of op.registros) {
        const motivo = (cob.motivo || '').toLowerCase();
        // Clamp al mes
        const ini = cob.fechaInicio > mesInicio ? cob.fechaInicio : mesInicio;
        const fin = (!cob.fechaFin || cob.fechaFin > mesFin) ? mesFin : cob.fechaFin;
        const dias = calcularDias(ini, fin);

        if (motivo.includes('art')) {
          // Lic. ART: 100% costo ART
          diasART += dias;
          diasARTcosto += dias;
        } else if (motivo.includes('enfermedad')) {
          // Lic. enfermedad: primeros 10 días empresa, resto ART
          const totalAcum = calcularDias(cob.fechaInicio, ini); // días ya transcurridos antes del mes
          diasEnf += dias;
          const diasEmp = Math.max(0, Math.min(dias, 10 - totalAcum));
          const diasArt = Math.max(0, dias - diasEmp);
          diasEmpresa += diasEmp;
          diasARTcosto += diasArt;
        }
      }

      totalDiasEnfermedad += diasEnf;
      totalDiasART += diasART;
      totalDiasEmpresa += diasEmpresa;
      totalDiasARTcosto += diasARTcosto;

      return `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px">
          <div style="font-family:var(--font-display);font-size:15px;font-weight:700;margin-bottom:6px">${op.nombre}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${diasEnf > 0 ? `
            <div style="background:rgba(224,123,42,.08);border:1px solid rgba(224,123,42,.25);border-radius:8px;padding:6px 10px;min-width:90px;text-align:center">
              <div style="font-size:20px;font-weight:700;color:var(--yellow)">${diasEnf}</div>
              <div style="font-size:10px;color:var(--text2);font-weight:600">días enfermedad</div>
              <div style="font-size:10px;color:var(--text3);margin-top:2px">${diasEmpresa > 0 ? `🏢 ${diasEmpresa}d empresa` : ''}${diasEnf-diasEmpresa > 0 ? ` · 🦺 ${diasEnf-diasEmpresa}d ART` : ''}</div>
            </div>` : ''}
            ${diasART > 0 ? `
            <div style="background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.25);border-radius:8px;padding:6px 10px;min-width:90px;text-align:center">
              <div style="font-size:20px;font-weight:700;color:#7c3aed">${diasART}</div>
              <div style="font-size:10px;color:var(--text2);font-weight:600">días ART</div>
              <div style="font-size:10px;color:var(--text3);margin-top:2px">🦺 100% ART</div>
            </div>` : ''}
            ${diasEnf === 0 && diasART === 0 ? `<span style="font-size:12px;color:var(--text3)">Sin ausencias por enfermedad/ART</span>` : ''}
          </div>
          ${op.registros.map(cob => {
            const motivo = (cob.motivo||'').toLowerCase();
            const esART = motivo.includes('art');
            const dias = calcularDias(cob.fechaInicio, cob.fechaFin);
            return `<div style="font-size:11px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
              ${motivoBadge(cob.motivo)} ${cob.fechaInicio||'?'} → ${cob.fechaFin||'<em>abierto</em>'} · ${dias}d
              ${esART ? '<span style="color:#7c3aed;font-weight:600"> · No tiene costo para la empresa</span>' : ''}
            </div>`;
          }).join('')}
        </div>`;
    });

    if (!filas.length) {
      return `<div style="text-align:center;padding:30px;color:var(--text3)">Sin ausencias por enfermedad o ART en este período</div>`;
    }

    return `
      <!-- Resumen del mes -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
        <div class="stat-card" style="border-color:rgba(224,123,42,.3)">
          <div style="font-size:26px;font-weight:700;color:var(--yellow)">${totalDiasEnfermedad}</div>
          <div style="font-size:11px;color:var(--text2);font-weight:600">días enfermedad</div>
        </div>
        <div class="stat-card" style="border-color:rgba(124,58,237,.3)">
          <div style="font-size:26px;font-weight:700;color:#7c3aed">${totalDiasART}</div>
          <div style="font-size:11px;color:var(--text2);font-weight:600">días Lic. ART</div>
        </div>
        <div class="stat-card" style="border-color:rgba(214,61,74,.3)">
          <div style="font-size:26px;font-weight:700;color:var(--red)">${totalDiasEmpresa}</div>
          <div style="font-size:11px;color:var(--text2);font-weight:600">días a cargo empresa</div>
        </div>
      </div>
      <div style="background:rgba(124,58,237,.06);border:1.5px solid rgba(124,58,237,.2);border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--text2);line-height:1.6">
        <strong style="color:#7c3aed">Regla ART:</strong> Los primeros <strong>10 días</strong> de enfermedad son a cargo de la empresa.
        A partir del día 11, o si está registrado como <strong>Lic. ART</strong>, el costo lo absorbe la ART.
        Este mes: <strong>${totalDiasARTcosto} días cubiertos por ART</strong> · <strong>${totalDiasEmpresa} días a cargo empresa</strong>.
      </div>
      ${filas.join('')}`;
  }

  c.innerHTML = `
    <button class="btn-secondary" style="padding:7px 14px;font-size:13px;margin-bottom:14px" onclick="renderReportes()">← Volver</button>
    <div class="section-title">🩺 Ausentismo</div>
    <div class="section-sub">Enfermedad · ART · Impacto en costos</div>

    <div style="margin-bottom:16px">
      <label style="font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px">Período</label>
      <select id="aus-mes-sel" style="width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:14px;outline:none" onchange="document.getElementById('aus-tabla').innerHTML=renderTablaAusentismo(this.value)">
        ${meses.map(m => `<option value="${m}" ${m===mesSeleccionado?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>

    <div id="aus-tabla">${renderTabla(mesSeleccionado)}</div>`;

  // Exponer la función al scope global para el onchange del select
  window.renderTablaAusentismo = renderTabla;
}

window.addEventListener('load', () => {
  // Registrar Service Worker solo en GitHub Pages
  if ('serviceWorker' in navigator && location.hostname === 'megaclean-art.github.io') {
    navigator.serviceWorker.register('/horas/sw.js')
      .then(() => console.log('SW registrado'))
      .catch(e => console.warn('SW error:', e));
  }
  // Forzar ocultar loader siempre, incluso si hay errores
  function mostrarLogin() {
    const loader = document.getElementById('loader');
    const login = document.getElementById('screen-login');
    if (loader) loader.style.display = 'none';
    if (login) login.classList.remove('hidden');
    const passInput = document.getElementById('login-pass');
    if (passInput) passInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    const dniInput = document.getElementById('login-dni');
    if (dniInput) dniInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  }

  // Intentar con timeout normal
  setTimeout(mostrarLogin, 1000);

  // Seguro de respaldo: si en 4 segundos no se ocultó, forzar
  setTimeout(() => {
    const loader = document.getElementById('loader');
    if (loader && loader.style.display !== 'none') {
      mostrarLogin();
    }
  }, 4000);
});
