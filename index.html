<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaClean Panel</title>

<style>
body {
  font-family: Arial;
  background: #eef2f6;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

input {
  padding: 10px;
  width: 100%;
  margin-bottom: 10px;
}

.btn {
  padding: 12px;
  width: 100%;
  background: #27a85a;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.section {
  margin-top: 25px;
}

.title {
  padding: 12px;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.rojo { background: #d63031; }
.verde { background: #27a85a; }
.amarillo { background: #f39c12; }

.tabla {
  background: white;
  margin-top: 5px;
  border-radius: 8px;
  overflow: hidden;
}

.fila {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.fila.header {
  font-weight: bold;
  background: #f5f5f5;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h2>Panel MegaClean</h2>

<input type="text" id="usuario" placeholder="admin">
<button class="btn" onclick="login()">Entrar</button>

<div id="contenido"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBg7lvQteUOaHwEyI1qe1OUPK81-9DL0Ng",
  authDomain: "mega-clean-12f17.firebaseapp.com",
  projectId: "mega-clean-12f17",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function login() {
  if (document.getElementById("usuario").value !== "admin") return alert("Solo admin");
  cargarDashboard();
}

function toggle(id) {
  const el = document.getElementById(id);
  el.classList.toggle("hidden");
}

// ================= DASHBOARD =================
async function cargarDashboard() {

  const cont = document.getElementById("contenido");
  cont.innerHTML = "Cargando...";

  const hoy = new Date();
  const mes = hoy.getMonth();
  const año = hoy.getFullYear();

  const usuarios = await db.collection("horas_usuarios").get();
  const servicios = await db.collection("horas_servicios").get();
  const fichajes = await db.collection("fichajes").get();

  let mapaServicios = {};
  servicios.forEach(s => mapaServicios[s.id] = s.data());

  let deben = [];
  let ok = [];
  let pagar = [];

  for (const u of usuarios.docs) {

    const userId = u.id;
    const user = u.data();

    let horasObjetivo = 0;
    let variableMs = 0;

    servicios.forEach(s => {
      const data = s.data();

      if (!data.operarios || !data.operarios.includes(userId)) return;
      if (data.tipo !== "FIJO") return;

      const [h1,m1] = data.horaInicio.split(":").map(Number);
      const [h2,m2] = data.horaFin.split(":").map(Number);

      const horasDia = (h2+m2/60)-(h1+m1/60);
      horasObjetivo += horasDia * data.dias.length * 4;
    });

    let entrada = null;

    fichajes.forEach(f => {
      const d = f.data();

      if (d.operario !== userId || !d.timestamp) return;

      const fecha = new Date(d.timestamp);
      if (fecha.getMonth() !== mes || fecha.getFullYear() !== año) return;

      if (d.tipo === "entrada") entrada = {t:d.timestamp, servicio:d.servicio};

      if (d.tipo === "salida" && entrada) {
        const serv = mapaServicios[entrada.servicio];

        if (!serv || serv.tipo !== "FIJO") {
          variableMs += (d.timestamp - entrada.t);
        }

        entrada = null;
      }
    });

    const variable = variableMs / 1000 / 60 / 60;
    const total = horasObjetivo + variable;
    const recibo = user.horasRecibo || 0;

    const diff = total - recibo;

    const fila = {
      nombre: user.nombre,
      total: total.toFixed(0),
      recibo,
      diff: diff.toFixed(0)
    };

    if (diff < -2) deben.push(fila);
    else if (diff > 2) pagar.push(fila);
    else ok.push(fila);
  }

  // 🔥 ORDEN
  deben.sort((a,b)=>a.diff - b.diff);
  pagar.sort((a,b)=>b.diff - a.diff);

  cont.innerHTML = `
  
  ${renderGrupo("DEBEN HORAS", "rojo", "g1", deben)}
  ${renderGrupo("OK", "verde", "g2", ok)}
  ${renderGrupo("PAGAR HORAS", "amarillo", "g3", pagar)}

  `;
}

function renderGrupo(titulo, color, id, lista) {

  let filas = `
    <div class="fila header">
      <div>Operario</div>
      <div>Trabajado</div>
      <div>Recibo</div>
      <div>Diferencia</div>
    </div>
  `;

  lista.forEach(l => {
    filas += `
      <div class="fila">
        <div>${l.nombre}</div>
        <div>${l.total}</div>
        <div>${l.recibo}</div>
        <div>${l.diff}</div>
      </div>
    `;
  });

  return `
    <div class="section">
      <div class="title ${color}" onclick="toggle('${id}')">
        ${titulo} (${lista.length})
      </div>
      <div class="tabla" id="${id}">
        ${filas}
      </div>
    </div>
  `;
}

</script>

</body>
</html>
