<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaClean Gestión</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a8fcb">

<style>
body { font-family: Arial; background:#f4f7fa; }
.container { max-width:600px; margin:auto; padding:20px; }
.btn { padding:12px; margin:5px 0; width:100%; border:none; border-radius:8px; }
.btn-entrar { background:#27a85a; color:#fff; }
.btn-salir { background:#d63d4a; color:#fff; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
.install-banner {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  background: #1a8fcb;
  color: white;
  padding: 12px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gestión de Horas</h2>
  <div id="servicios"></div>
</div>

<div id="installBanner" class="install-banner">
📲 Instalá MegaClean
<button onclick="instalarApp()">Instalar</button>
</div>

<script>

// ================= CONFIG =================
const MODO_TEST = true;

// ================= INSTALL =================
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBanner").style.display = "block";
});

function instalarApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
    });
  }
}

// ================= SERVICE WORKER =================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// ================= GPS =================
let ultimaUbicacion = null;

function obtenerUbicacion() {
  return new Promise((resolve) => {

    if (!navigator.geolocation) {
      resolve({ lat: -31.42, lng: -64.18 });
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos => {
        resolve({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        });
      },
      error => {
        console.log("GPS error:", error.message);
        resolve({ lat: -31.42, lng: -64.18 });
      }
    );
  });
}

// ================= COBERTURAS =================
function cargarServicios() {

  const ahora = new Date();
  const horaActual = ahora.getHours();

  const coberturas = [
    {
      id: "1",
      cliente: "Cliente Centro",
      desde: 8,
      hasta: 12
    },
    {
      id: "2",
      cliente: "Banco Córdoba",
      desde: 14,
      hasta: 18
    }
  ];

  const activas = coberturas.filter(c => 
    horaActual >= c.desde && horaActual <= c.hasta
  );

  renderServicios(activas);
}

// ================= RENDER =================
function renderServicios(servicios) {
  const cont = document.getElementById("servicios");
  cont.innerHTML = "";

  if (servicios.length === 0) {
    cont.innerHTML = "<p>No tenés servicios activos en este horario</p>";
    return;
  }

  servicios.forEach(s => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${s.cliente}</b><br>
      <small>Horario: ${s.desde}:00 a ${s.hasta}:00</small><br><br>
      <button class="btn btn-entrar" onclick="fichar('${s.id}','entrada')">Entrar</button>
      <button class="btn btn-salir" onclick="fichar('${s.id}','salida')">Salir</button>
    `;

    cont.appendChild(div);
  });
}

// ================= FICHAR =================
async function fichar(servicioId, tipo) {

  const ubicacion = await obtenerUbicacion();

  alert("Fichada registrada ✔");

  console.log({
    servicioId,
    tipo,
    ubicacion,
    hora: new Date()
  });
}

// ================= INIT =================
cargarServicios();

</script>

</body>
</html>
