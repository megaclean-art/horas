<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaClean Gestión</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a8fcb">

<style>
body { font-family: Arial; background:#f4f7fa; }
.container { max-width:600px; margin:auto; padding:20px; }
.btn { padding:12px; margin:5px 0; width:100%; border:none; border-radius:8px; }
.btn-entrar { background:#27a85a; color:#fff; }
.btn-salir { background:#d63d4a; color:#fff; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
.install-banner {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  background: #1a8fcb;
  color: white;
  padding: 12px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gestión de Horas</h2>
  <div id="servicios"></div>
</div>

<div id="installBanner" class="install-banner">
📲 Instalá MegaClean
<button onclick="instalarApp()">Instalar</button>
</div>

<script>

// ================= CONFIG =================
const MODO_TEST = true;
const API_URL = "https://tu-api.com";

// ================= INSTALL =================
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBanner").style.display = "block";
});

function instalarApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
    });
  }
}

// ================= SERVICE WORKER =================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// ================= GPS =================
let ultimaUbicacion = null;
let ultimaActualizacion = 0;

function obtenerUbicacion() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(pos => {
      resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      });
    }, reject);
  });
}

function distancia(a, b) {
  const R = 6371e3;
  const dLat = (b.lat - a.lat) * Math.PI/180;
  const dLng = (b.lng - a.lng) * Math.PI/180;
  const lat1 = a.lat * Math.PI/180;
  const lat2 = b.lat * Math.PI/180;

  const x = Math.sin(dLat/2)**2 +
            Math.cos(lat1)*Math.cos(lat2) *
            Math.sin(dLng/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

async function enviarUbicacion() {
  const ahora = Date.now();
  if (ahora - ultimaActualizacion < 120000) return;

  const ubicacion = await obtenerUbicacion();

  if (!ultimaUbicacion || distancia(ultimaUbicacion, ubicacion) > 50) {
    ultimaUbicacion = ubicacion;
    ultimaActualizacion = ahora;

    if (MODO_TEST) {
      console.log("TEST ubicación", ubicacion);
      return;
    }

    await fetch(API_URL + "/ubicacion", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        usuario: "operario1",
        lat: ubicacion.lat,
        lng: ubicacion.lng
      })
    });
  }
}

setInterval(enviarUbicacion, 60000);

// ================= SERVICIOS =================
async function cargarServicios() {

  if (MODO_TEST) {
    const servicios = [
      { id: "1", nombre: "Cliente Centro" },
      { id: "2", nombre: "Banco Córdoba" }
    ];
    renderServicios(servicios);
    return;
  }

  const res = await fetch(API_URL + "/servicios/operario1");
  const servicios = await res.json();
  renderServicios(servicios);
}

function renderServicios(servicios) {
  const cont = document.getElementById("servicios");
  cont.innerHTML = "";

  servicios.forEach(s => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${s.nombre}</b><br>
      <button class="btn btn-entrar" onclick="fichar('${s.id}','entrada')">Entrar</button>
      <button class="btn btn-salir" onclick="fichar('${s.id}','salida')">Salir</button>
    `;

    cont.appendChild(div);
  });
}

// ================= FICHAR =================
async function fichar(servicioId, tipo) {
  const ubicacion = await obtenerUbicacion();

  const data = {
    usuario: "operario1",
    servicio: servicioId,
    tipo,
    ubicacion
  };

  if (MODO_TEST) {
    console.log("TEST fichada", data);
    alert("Fichada OK (test)");
    return;
  }

  await fetch(API_URL + "/fichar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  alert("Fichada registrada");
}

setInterval(cargarServicios, 60000);
cargarServicios();

</script>
</body>
</html>
