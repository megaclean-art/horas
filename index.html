<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaClean Gestión</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a8fcb">

<style>
body { font-family: Arial; background:#f4f7fa; }
.container { max-width:600px; margin:auto; padding:20px; }
.btn { padding:12px; margin:5px 0; width:100%; border:none; border-radius:8px; }
.btn-entrar { background:#27a85a; color:#fff; }
.btn-salir { background:#d63d4a; color:#fff; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
.estado {
  padding:5px;
  border-radius:5px;
  font-size:12px;
  display:inline-block;
  margin-top:5px;
}
.activo { background:#27a85a; color:#fff; }
.inactivo { background:#999; color:#fff; }
</style>
</head>

<body>

<div class="container">
  <h2>Gestión de Horas</h2>
  <div id="servicios">Cargando datos...</div>
</div>

<!-- 🔥 Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 CONFIG REAL
const firebaseConfig = {
  apiKey: "AIzaSyBg7lvQteUOaHwEyI1qe1OUPK81-9DL0Ng",
  authDomain: "mega-clean-12f17.firebaseapp.com",
  projectId: "mega-clean-12f17",
  storageBucket: "mega-clean-12f17.firebasestorage.app",
  messagingSenderId: "446418900871",
  appId: "1:446418900871:web:b178a54ceeb66944882522"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= ESTADO =================
let estadoOperario = {};

// ================= GPS =================
function obtenerUbicacion() {
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      pos => resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      }),
      () => resolve({ lat: -31.42, lng: -64.18 })
    );
  });
}

// ================= CARGA FIREBASE =================
async function cargarServicios() {

  try {

    const doc = await db.collection("config").doc("clients").get();
    const data = doc.data();

    if (!data || !data.list) {
      document.getElementById("servicios").innerHTML = "No hay datos";
      return;
    }

    // 🔥 tus clientes reales
    const clientes = data.list;

    // 👇 por ahora mostramos primeros 10 (para no romper)
    renderServicios(clientes.slice(0, 10));

  } catch (error) {
    console.error(error);
    document.getElementById("servicios").innerHTML = "Error cargando datos";
  }
}

// ================= RENDER =================
function renderServicios(servicios) {
  const cont = document.getElementById("servicios");
  cont.innerHTML = "";

  servicios.forEach(s => {

    const trabajando = estadoOperario[s.id] === true;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${s.name}</b><br>
      <small>${s.address}</small><br>
      <span class="estado ${trabajando ? 'activo' : 'inactivo'}">
        ${trabajando ? 'Trabajando' : 'No activo'}
      </span><br><br>

      ${!trabajando ? `
        <button class="btn btn-entrar" onclick="fichar('${s.id}','entrada')">Entrar</button>
      ` : ''}

      ${trabajando ? `
        <button class="btn btn-salir" onclick="fichar('${s.id}','salida')">Salir</button>
      ` : ''}
    `;

    cont.appendChild(div);
  });
}

// ================= FICHAR =================
async function fichar(servicioId, tipo) {

  const ubicacion = await obtenerUbicacion();

  if (tipo === "entrada") {

    if (estadoOperario[servicioId]) {
      alert("Ya estás trabajando");
      return;
    }

    estadoOperario[servicioId] = true;

  } else {

    if (!estadoOperario[servicioId]) {
      alert("No podés salir sin entrar");
      return;
    }

    estadoOperario[servicioId] = false;
  }

  alert("Fichada ✔");

  console.log({
    servicioId,
    tipo,
    ubicacion,
    hora: new Date()
  });

  renderServicios(document.querySelectorAll(".card"));
}

// ================= INIT =================
cargarServicios();

</script>

</body>
</html>
