<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MegaClean · Gestión de Horas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a8fcb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MegaClean">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
  :root {
    --bg: #f4f7fa;
    --surface: #ffffff;
    --surface2: #eef2f7;
    --border: #dce3ed;
    --accent: #1a8fcb;
    --accent2: #0e6fa0;
    --accent-light: #e8f4fc;
    --green: #27a85a;
    --green-light: #eaf7ef;
    --red: #d63d4a;
    --red-light: #fdeef0;
    --yellow: #e07b2a;
    --yellow-light: #fef3e8;
    --text: #1a2533;
    --text2: #4a6278;
    --text3: #8fa3b8;
    --shadow: 0 2px 12px rgba(26,143,203,.08);
    --shadow-md: 0 4px 24px rgba(26,143,203,.12);
    --radius: 10px;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
    /* MegaClean brand */
    --mc-blue: #1a8fcb;
    --mc-blue-dark: #0e6fa0;
    --mc-green: #5cb85c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }

  /* ── UTILS ── */
  .hidden { display: none !important; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
  .pill-green { background: var(--green-light); color: var(--green); border: 1px solid rgba(39,168,90,.25); }
  .pill-red { background: var(--red-light); color: var(--red); border: 1px solid rgba(214,61,74,.25); }
  .pill-yellow { background: var(--yellow-light); color: var(--yellow); border: 1px solid rgba(224,123,42,.25); }
  .pill-blue { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(26,143,203,.25); }
  .pill-gray { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .pill-purple { background: rgba(124,58,237,.12); color: #7c3aed; border: 1px solid rgba(124,58,237,.3); }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); border: none; color: #fff; padding: 12px 20px; border-radius: var(--radius); font-size: 13px; z-index: 9999; transition: transform .3s ease; white-space: nowrap; box-shadow: var(--shadow-md); }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── LOADER ── */
  #loader { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9000; flex-direction: column; gap: 16px; }
  .loader-bar { width: 120px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .loader-bar::after { content: ''; display: block; width: 40%; height: 100%; background: var(--accent); animation: loadSlide 1s ease infinite; }
  @keyframes loadSlide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }

  /* ── LOGO SVG ── */
  .mc-logo-wrap { display: flex; flex-direction: column; align-items: center; }
  .mc-logo-img { width: 110px; height: auto; }
  .mc-tagline { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-top: 4px; }
  .mc-app-label { background: var(--accent); color: #fff; font-family: var(--font-display); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-top: 6px; }

  /* ── LOGIN ── */
  #screen-login { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(160deg, #e8f4fc 0%, #f4f7fa 50%, #eef7ee 100%); }
  .login-card { width: 100%; max-width: 360px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px; box-shadow: var(--shadow-md); margin-top: 28px; }
  .login-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text2); letter-spacing: 1px; margin-bottom: 22px; text-transform: uppercase; text-align: center; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  .field input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); color: var(--text); font-family: var(--font-body); font-size: 16px; padding: 12px 14px; border-radius: var(--radius); outline: none; transition: border-color .2s; }
  .field input:focus { border-color: var(--accent); background: #fff; }

  /* ── BUTTONS ── */
  .btn-primary { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all .2s; margin-top: 8px; box-shadow: 0 4px 14px rgba(26,143,203,.3); }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:hover { box-shadow: 0 6px 20px rgba(26,143,203,.4); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border); font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border-radius: var(--radius); padding: 11px 18px; cursor: pointer; transition: all .2s; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-danger { background: var(--red-light); color: var(--red); border: 1.5px solid rgba(214,61,74,.25); font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border-radius: var(--radius); padding: 11px 18px; cursor: pointer; transition: all .2s; }
  .btn-entrar { background: var(--green); color: #fff; box-shadow: 0 3px 10px rgba(39,168,90,.25); }
  .btn-salir { background: var(--red); color: #fff; box-shadow: 0 3px 10px rgba(214,61,74,.2); }
  .btn-entrar:disabled, .btn-salir:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }

  /* ── MAIN LAYOUT ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid var(--border); padding: 0 16px; height: 58px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 8px rgba(0,0,0,.06); }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-logo-img { height: 36px; width: auto; }
  .topbar-apptag { background: var(--accent); color: #fff; font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; }
  .topbar-user { display: flex; align-items: center; gap: 10px; }
  .topbar-name { font-size: 13px; color: var(--text2); font-weight: 600; }
  .topbar-role { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
  .btn-logout { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all .2s; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

  /* ── TABS ── */
  .tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 1; min-width: 72px; padding: 12px 8px 10px; text-align: center; font-family: var(--font-display); font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; white-space: nowrap; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-light); }
  .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* ── CONTENT ── */
  .content { flex: 1; padding: 16px; max-width: 640px; margin: 0 auto; width: 100%; }
  .section-title { font-family: var(--font-display); font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--text); margin-bottom: 4px; }
  .section-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

  /* ── FICHAR ── */
  .fecha-hoy { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(26,143,203,.2); }
  .fecha-label { font-family: var(--font-display); font-size: 12px; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,.7); text-transform: uppercase; }
  .fecha-valor { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff; }
  .reloj { font-family: var(--font-display); font-size: 34px; font-weight: 900; color: #fff; letter-spacing: 2px; }

  .servicio-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: all .2s; box-shadow: var(--shadow); }
  .servicio-card.activo { border-color: var(--green); background: var(--green-light); box-shadow: 0 4px 16px rgba(39,168,90,.1); }
  .servicio-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .servicio-cliente { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: .5px; color: var(--text); }
  .servicio-dir { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .servicio-horario { font-size: 13px; color: var(--text3); margin-top: 6px; }
  .servicio-horario span { color: var(--accent); font-weight: 700; }
  .servicio-actions { display: flex; gap: 10px; margin-top: 12px; }
  .servicio-actions button { flex: 1; padding: 13px; border-radius: var(--radius); font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; transition: all .2s; }

  .fichada-info { margin-top: 10px; padding: 10px 12px; background: var(--surface2); border-radius: 8px; font-size: 12px; color: var(--text2); border: 1px solid var(--border); }
  .fichada-row { display: flex; justify-content: space-between; padding: 3px 0; }
  .fichada-row .val { color: var(--text); font-weight: 700; }
  .gps-ok { color: var(--green); }
  .gps-warn { color: var(--yellow); }

  .no-servicios { text-align: center; padding: 40px 20px; color: var(--text3); }
  .no-servicios .icon { font-size: 40px; margin-bottom: 12px; }

  /* ── CARDS / STATS ── */
  .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
  .stat-num { font-family: var(--font-display); font-size: 40px; font-weight: 900; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-top: 2px; }

  .card-section { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .card-section-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text2); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-sm { margin-bottom: 10px; }
  .field-sm label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
  .field-sm input, .field-sm select { width: 100%; background: var(--bg); border: 1.5px solid var(--border); color: var(--text); font-family: var(--font-body); font-size: 14px; padding: 9px 12px; border-radius: 8px; outline: none; transition: border-color .2s; }
  .field-sm input:focus, .field-sm select:focus { border-color: var(--accent); background: #fff; }

  .dias-check { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .dia-btn { padding: 6px 11px; background: var(--surface2); border: 1.5px solid var(--border); color: var(--text2); font-family: var(--font-display); font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all .2s; }
  .dia-btn.sel { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  /* ── LIST ITEMS ── */
  .list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .list-item:last-child { border-bottom: none; }
  .list-item-info { flex: 1; }
  .list-item-name { font-weight: 600; font-size: 15px; color: var(--text); }
  .list-item-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .list-item-actions { display: flex; gap: 8px; }
  .btn-icon { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text2); width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; transition: all .2s; }
  .btn-icon:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }
  .btn-icon.edit:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* ── SUPERVISOR ── */
  .fichada-supervisor { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .fs-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .fs-operario { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text); }
  .fs-detalle { font-size: 12px; color: var(--text2); display: flex; flex-direction: column; gap: 3px; }
  .fs-actions { display: flex; gap: 8px; margin-top: 10px; }

  /* ── MIS HORAS ── */
  .resumen-mes { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 16px; padding: 24px 20px; margin-bottom: 16px; text-align: center; box-shadow: 0 6px 24px rgba(26,143,203,.25); }
  .resumen-num { font-family: var(--font-display); font-size: 64px; font-weight: 900; color: #fff; line-height: 1; }
  .resumen-label { font-size: 13px; color: rgba(255,255,255,.8); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .resumen-tipo { font-size: 11px; color: rgba(255,255,255,.65); margin-top: 8px; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(26,37,51,.4); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: flex-end; justify-content: center; padding: 16px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px 20px 16px 16px; width: 100%; max-width: 480px; padding: 24px 20px; max-height: 90vh; overflow-y: auto; box-shadow: 0 -8px 40px rgba(0,0,0,.12); }
  .modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; color: var(--text); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button { flex: 1; }

  @media(max-width: 380px) {
    .admin-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>

<!-- TOAST -->

<!-- LOGIN -->
<div id="screen-login" class="hidden">

  <!-- Fondo con ondas igual al mockup -->

      <path d="M420 20 Q560 180 420 340 Q290 490 180 420 Q40 330 110 190 Q180 60 420 20Z" fill="none" stroke="#6ab8e0" stroke-width="2"/>

      <path d="M300 280 Q370 170 280 80 Q190 -10 100 60 Q10 130 60 240 Q110 330 300 280Z" fill="none" stroke="#7ec87e" stroke-width="2"/>
    </svg>
    <!-- Puntos arriba derecha -->
    <svg style="position:absolute;right:18px;top:18px;opacity:.4" width="130" height="90" viewBox="0 0 130 90">
      <circle cx="8" cy="8" r="3" fill="#1a8fcb"/><circle cx="30" cy="8" r="3" fill="#1a8fcb"/><circle cx="52" cy="8" r="3" fill="#1a8fcb"/><circle cx="74" cy="8" r="3" fill="#1a8fcb"/><circle cx="96" cy="8" r="3" fill="#1a8fcb"/>
      <circle cx="8" cy="30" r="3" fill="#1a8fcb"/><circle cx="30" cy="30" r="3" fill="#1a8fcb"/><circle cx="52" cy="30" r="3" fill="#1a8fcb"/><circle cx="74" cy="30" r="3" fill="#1a8fcb"/><circle cx="96" cy="30" r="3" fill="#1a8fcb"/>
      <circle cx="8" cy="52" r="3" fill="#1a8fcb"/><circle cx="30" cy="52" r="3" fill="#1a8fcb"/><circle cx="52" cy="52" r="3" fill="#1a8fcb"/><circle cx="74" cy="52" r="3" fill="#1a8fcb"/><circle cx="96" cy="52" r="3" fill="#1a8fcb"/>
    </svg>
    <!-- Puntos abajo izquierda -->
    <svg style="position:absolute;left:14px;bottom:90px;opacity:.35" width="110" height="90" viewBox="0 0 110 90">

function toFS(data) {
  const fields = {};
  for (const [k, v] of Object.entries(data)) {
    if (v === null || v === undefined) fields[k] = { nullValue: null };
    else if (typeof v === 'boolean') fields[k] = { booleanValue: v };
    else if (typeof v === 'number') {
      if (Number.isInteger(v)) fields[k] = { integerValue: String(v) };
      else fields[k] = { doubleValue: v };
    }
    else if (typeof v === 'string') fields[k] = { stringValue: v };
    else if (Array.isArray(v)) {
      fields[k] = { arrayValue: { values: v.map(i => {
        if (typeof i === 'string') return { stringValue: i };
        if (typeof i === 'number') return { integerValue: String(i) };
        return { stringValue: String(i) };
      })}};
    }
    else fields[k] = { stringValue: JSON.stringify(v) };
  }
  return { fields };
}

function fromFS(doc) {
  if (!doc.fields) return {};
  const out = {};
  for (const [k, v] of Object.entries(doc.fields)) {
    if (v.stringValue !== undefined) out[k] = v.stringValue;
    else if (v.integerValue !== undefined) out[k] = Number(v.integerValue);
    else if (v.doubleValue !== undefined) out[k] = v.doubleValue;
    else if (v.booleanValue !== undefined) out[k] = v.booleanValue;
    else if (v.nullValue !== undefined) out[k] = null;
    else if (v.arrayValue) out[k] = (v.arrayValue.values || []).map(i => i.stringValue ?? i.integerValue ?? i.booleanValue);
    else out[k] = null;
  }
  out._id = doc.name?.split('/').pop();
  return out;
}

async function fsGet(col, id) {
  const headers = await getAuthHeaders();
  const r = await fetch(`${API}/${col}/${id}`, { headers });
  if (!r.ok) return null;
  return fromFS(await r.json());
}

// Cache simple por sesión para evitar requests repetidas
const _fsCache = {};
const _fsCacheTime = {};
const CACHE_TTL = 300000; // 5 minutos

async function fsListPage(col, pageToken) {
  const url = `${API}/${col}?pageSize=300${pageToken ? '&pageToken=' + encodeURIComponent(pageToken) : ''}`;
  try {
    const headers = await getAuthHeaders();
    const r = await fetch(url, { headers });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) {
    return null;
  }
}

async function fsList(col) {
  const now = Date.now();
  if (_fsCache[col] && (now - (_fsCacheTime[col]||0)) < CACHE_TTL) {
    return _fsCache[col];
  }

  let allDocs = [];
  let pageToken = '';
  let safety = 0;

  do {
    const data = await fsListPage(col, pageToken);
    if (!data) break;
    if (data.documents) allDocs = allDocs.concat(data.documents.map(fromFS));
    pageToken = data.nextPageToken || '';
    if (pageToken) await new Promise(res => setTimeout(res, 200));
    safety++;
    if (safety > 15) break;
  } while (pageToken);

  _fsCache[col] = allDocs;
  _fsCacheTime[col] = now;
  return allDocs;
}

function invalidarCache(col) {
  delete _fsCache[col];
  delete _fsCacheTime[col];
}

async function fsSave(col, id, data) {
  const body = toFS(data);
  const mask = Object.keys(data).map(k => `updateMask.fieldPaths=${k}`).join('&');
  const headers = await getAuthHeaders();
  const r = await fetch(`${API}/${col}/${id}?${mask}`, {
    method: 'PATCH', headers, body: JSON.stringify(body)
  });
  return r.ok;
}

async function fsAdd(col, data) {
  const headers = await getAuthHeaders();
  const r = await fetch(`${API}/${col}`, {
    method: 'POST', headers, body: JSON.stringify(toFS(data))
  });
  if (!r.ok) {
    const err = await r.json().catch(()=>({}));
    console.error('fsAdd error:', r.status, err);
    return null;
  }
  const d = await r.json();
  return d.name?.split('/').pop();
}

async function fsDelete(col, id) {
  const headers = await getAuthHeaders();
  await fetch(`${API}/${col}/${id}`, { method: 'DELETE', headers });
}

function toast(msg, type = 'info') {
  const t = document.getElementById('toast');
  const colors = { info: 'var(--accent)', ok: 'var(--green)', error: 'var(--red)', warn: 'var(--yellow)' };
  t.style.borderColor = colors[type] || colors.info;
  t.textContent = msg;

}

function fechaHoy() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function isoHoy() {
  return new Date().toISOString().split('T')[0];
}
function horaActual() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function horaCompleta() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function diasHoy() {
  // retorna índice 0..6 (LUN=0..DOM=6)
  const js = new Date().getDay(); // 0=dom,1=lun...
  return DIAS_JS.indexOf(js);
}
function diffHoras(entrada, salida) {
  const [h1,m1] = entrada.split(':').map(Number);
  const [h2,m2] = salida.split(':').map(Number);
  return ((h2*60+m2) - (h1*60+m1)) / 60;
}
function distanciaMetros(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

    // Construir objeto similar a servicio para reutilizar la tarjeta

      _id: cob.servicioId,

      direccion: '',
      horaInicio: cob.horaInicio,
      horaFin: cob.horaFin,
      horasContratadas: cob.horasContratadas,
      dias: cob.dias,

    return renderTarjetaServicio(srvSimulado, fichadasHoy, true);
  });

  const tieneSalida = fichada && fichada.salida;

  let fichadaHtml = '';

    fichadaHtml = `<div class="fichada-info">
      ${tieneEntrada ? `<div class="fichada-row"><span>Entrada:</span><span class="val">${fichada.entrada}</span></div>` : ''}

      ${bloqueado ? `<div style="background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);border-radius:6px;padding:8px;margin-top:6px;font-size:12px;color:var(--red)">⛔ Salida bloqueada — superás las horas contratadas. Aguardá autorización del supervisor.</div>` : ''}
    </div>`;
  }

  let estado = tieneSalida ? `<span class="pill pill-green">✓ Completado</span>`
    : bloqueado ? `<span class="pill pill-red">⛔ Bloqueado</span>`
    : enCurso ? `<span class="pill pill-yellow">En curso</span>`

  const cobTag = esCobertura ? `<span class="pill pill-blue" style="font-size:10px;margin-left:4px">${s._motivo||'Cobertura'}</span>` : '';

  return `<div class="servicio-card ${enCurso ? 'activo' : ''}">
    <div class="servicio-header">
      <div>
        <div class="servicio-cliente">${s.cliente} ${cobTag}</div>

      <button class="btn-entrar" ${tieneEntrada ? 'disabled' : ''} onclick="ficharEntradaV2('${s._id}','${s.cliente}','${esCobertura ? s._coberturaId : ''}')">
        ${tieneEntrada ? '✓ Entrada marcada' : '▶ ENTRAR'}

      <button class="btn-salir" ${!tieneEntrada || tieneSalida || bloqueado ? 'disabled' : ''} onclick="ficharSalidaV2('${s._id}','${s.cliente}','${esCobertura ? s._coberturaId : ''}',${s.horasContratadas||0},${s._horasExtra||0})">

async function ficharEntradaV2(servicioId, clienteNombre, coberturaId = '') {
  const pos = await getGPS();
  const servicio = await fsGet('horas_servicios', servicioId);
  let gpsOk = true, distancia = 0, lat = 0, lon = 0;

  if (pos) {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    if (servicio && servicio.lat && servicio.lon) {
      distancia = distanciaMetros(lat, lon, Number(servicio.lat), Number(servicio.lon));
      gpsOk = distancia <= (servicio.radioGps || 300);
    }
  }

  const id = coberturaId
    ? `${currentUser._id}_cob_${coberturaId}_${isoHoy()}`
    : `${currentUser._id}_${servicioId}_${isoHoy()}`;

  await fsSave('horas_fichadas', id, {
    operarioId: currentUser._id,
    operarioNombre: currentUser.nombre,
    servicioId,
    coberturaId,
    clienteNombre,
    fecha: isoHoy(),
    entrada: horaActual(),
    salida: '',
    latEntrada: String(lat),
    lonEntrada: String(lon),
    gpsOk,
    distanciaEntrada: distancia,
    aprobado: false,
    bloqueadoHorasExtra: false,
    estado: 'en-curso',
    tipoFichada: coberturaId ? 'COBERTURA' : 'FIJO'
  });

  toast(gpsOk ? `✓ Entrada registrada — ${clienteNombre}` : `⚠ Entrada marcada fuera de rango GPS`, gpsOk ? 'ok' : 'warn');
  await cargarServiciosHoy();
}

async function ficharSalidaV2(servicioId, clienteNombre, coberturaId = '', horasContratadas = 0, horasExtra = 0) {
  const id = coberturaId
    ? `${currentUser._id}_cob_${coberturaId}_${isoHoy()}`
    : `${currentUser._id}_${servicioId}_${isoHoy()}`;

  const fichada = await fsGet('horas_fichadas', id);
  if (!fichada || !fichada.entrada) return toast('No hay entrada registrada', 'error');

  const salida = horaActual();
  const horas = diffHoras(fichada.entrada, salida);
  const tope = horasContratadas + horasExtra;

  // Verificar si supera el tope
  if (tope > 0 && horas > tope) {
    // Bloquear salida — requiere autorización
    await fsSave('horas_fichadas', id, {
      salidaTentativa: salida,
      horasTentativas: horas,
      bloqueadoHorasExtra: true,
      estado: 'bloqueado-horas-extra'
    });
    toast(`⛔ Superás ${tope}hs contratadas. Se notificó al supervisor para autorizar.`, 'warn');
    await cargarServiciosHoy();
    return;
  }

  await fsSave('horas_fichadas', id, {
    salida,
    horasTrabajadas: horas,
    bloqueadoHorasExtra: false,
    estado: 'completo'
  });
  toast(`✓ Salida registrada — ${horas.toFixed(1)}hs en ${clienteNombre}`, 'ok');
  await cargarServiciosHoy();
}

// Mantener compatibilidad con funciones anteriores
async function ficharEntrada(servicioId, clienteNombre) {
  return ficharEntradaV2(servicioId, clienteNombre, '');
}
async function ficharSalida(servicioId, clienteNombre) {
  const servicio = await fsGet('horas_servicios', servicioId);
  return ficharSalidaV2(servicioId, clienteNombre, '', servicio?.horasContratadas || 0, 0);
}

function getGPS() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(resolve, () => resolve(null), { timeout: 8000, enableHighAccuracy: true });
  });
}

          <input id="op-nombre" placeholder="Ej: García, Juan Carlos" value="${o.nombre||''}">
        </div>
        <div class="form-row">
          <div class="field-sm"><label>DNI</label>
            <input id="op-dni" type="number" inputmode="numeric" placeholder="30123456" value="${o.dni||''}">
          </div>
          <div class="field-sm"><label>Contraseña</label>
            <input id="op-pass" type="password" placeholder="${esEdicion?'Dejar vacío para no cambiar':'••••••••'}" value="">

        <div class="form-row">
          <div class="field-sm"><label>Rol</label>
            <select id="op-rol">

              <option value="SUPERVISOR" ${o.rol==='SUPERVISOR'?'selected':''}>Supervisor</option>
              <option value="ADMIN" ${o.rol==='ADMIN'?'selected':''}>Admin</option>

              <option value="FIJO" ${o.tipo==='FIJO'?'selected':''}>Fijo (× 4 semanas)</option>

        <div class="field-sm">
          <label>Horas de recibo mensuales <span style="color:var(--accent);font-size:10px">(del recibo de sueldo)</span></label>
          <input id="op-recibo" type="number" placeholder="Ej: 144" value="${o.horasRecibo||''}">

          <label>Legajo Skylab <span style="color:var(--text3);font-size:10px">(opcional)</span></label>
          <input id="op-legajo" placeholder="Ej: 00064" value="${o.legajo||''}">

          <div class="field-sm">
            <label>Dirección</label>
            <input id="op-direccion" placeholder="Ej: Av. Colón 1234" value="${o.direccion||''}">
          </div>

            <label>Barrio</label>

          <button class="btn-secondary" onclick="cerrarModal()">CANCELAR</button>
          <button class="btn-primary" onclick="guardarOperario('${id||''}')">
            ${esEdicion ? '💾 GUARDAR CAMBIOS' : '✓ CREAR OPERARIO'}

        </div>
      </div>
    </div>`;
}

function toggleHorasFijas() {
  const tipo = document.getElementById('op-tipo')?.value;
  const campo = document.getElementById('campo-hs-sem');
  if (campo) campo.style.display = tipo === 'FIJO' ? 'block' : 'none';
}

async function guardarOperario(id = '') {
  const nombre = document.getElementById('op-nombre').value.trim();
  const dni = document.getElementById('op-dni').value.trim();
  const pass = document.getElementById('op-pass').value.trim();
  const rol = document.getElementById('op-rol').value;
  const tipo = document.getElementById('op-tipo').value;
  const hs = Number(document.getElementById('op-hs')?.value || 0);
  const horasRecibo = Number(document.getElementById('op-recibo')?.value || 0);
  const legajo = document.getElementById('op-legajo')?.value.trim() || '';
  const direccion = document.getElementById('op-direccion')?.value.trim() || '';
  const barrio = document.getElementById('op-barrio')?.value.trim() || '';

  if (!nombre) return toast('El nombre es obligatorio', 'warn');
  if (!id && !pass) return toast('La contraseña es obligatoria para usuarios nuevos', 'warn');

  const data = { nombre, dni, rol, tipo, horasSemana: hs, activo: true };
  if (horasRecibo) data.horasRecibo = horasRecibo;
  if (legajo) data.legajo = legajo;
  if (direccion) data.direccion = direccion;
  if (barrio) data.barrio = barrio;
  if (pass) data.password = pass;

  if (id) {
    await fsSave('horas_usuarios', id, data);
    invalidarCache('horas_usuarios');
    toast(`✓ ${nombre} actualizado`, 'ok');
  } else {
    await fsAdd('horas_usuarios', data);
    invalidarCache('horas_usuarios');
    toast(`✓ ${nombre} creado`, 'ok');
  }
  cerrarModal();
  renderOperarios();
}

async function eliminarOperario(id, nombre) {
  if (!confirm(`¿Eliminar a ${nombre}?\nEsta acción no se puede deshacer.`)) return;
  await fsDelete('horas_usuarios', id);
  _operariosAll = _operariosAll.filter(o => o._id !== id);
  filtrarOperarios();
  toast(`${nombre} eliminado`, 'ok');
}

//  SCREEN: SERVICIOS (ADMIN) — ABM COMPLETO

let diasSelServ = [];
let _serviciosCache = [];
let _operariosCache = [];

async function renderServicios() {

  c.innerHTML = `

      <select id="srv-filtro-admin" onchange="filtrarServicios()"
        style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;outline:none">
        <option value="">Todos los administradores</option>
        ${admins.map(a=>`<option value="${a}">${a}</option>`).join('')}

    </div>

      <select id="srv-filtro-sup" onchange="filtrarServicios()"
        style="flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;outline:none">
        <option value="">Todos los supervisores</option>
        ${supervisores.map(s=>`<option value="${s}">${s}</option>`).join('')}
      </select>
      <select id="srv-filtro-op" onchange="filtrarServicios()"
        style="flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;outline:none">
        <option value="">Todos los operarios</option>
        ${operarios.filter(o=>o.rol==='OPERARIO').sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(o=>`<option value="${o._id}">${o.nombre}</option>`).join('')}
      </select>
    </div>

    <div id="srv-lista"></div>`;

  filtrarServicios();
}

function filtrarServicios() {
  const buscar = (document.getElementById('srv-buscar')?.value || '').toLowerCase();
  const filtroSup = document.getElementById('srv-filtro-sup')?.value || '';
  const filtroOp = document.getElementById('srv-filtro-op')?.value || '';
  const filtroAdmin = document.getElementById('srv-filtro-admin')?.value || '';

  let lista = _serviciosCache;
  if (buscar) lista = lista.filter(s => (s.cliente||'').toLowerCase().includes(buscar) || (s.codigo||'').includes(buscar) || (s.direccion||'').toLowerCase().includes(buscar) || (s.adminCliente||'').toLowerCase().includes(buscar));
  if (filtroSup) lista = lista.filter(s => (s.supervisor||s.idSupervisor||'') === filtroSup);
  if (filtroAdmin) lista = lista.filter(s => s.adminCliente === filtroAdmin);
  if (filtroOp) lista = lista.filter(s => {
    const ops = Array.isArray(s.operarios) ? s.operarios : (s.operarios ? [s.operarios] : []);
    return ops.includes(filtroOp);
  });

  // ── AGRUPAR por código + horario ──
  // Clave de agrupación: codigo|horaInicio|horaFin|dias_ordenados
  const grupos = {};
  for (const s of lista) {
    const diasKey = (s.dias||[]).slice().sort().join('-');
    const clave = `${s.codigo||s.cliente}|${s.horaInicio||''}|${s.horaFin||''}|${diasKey}`;
    if (!grupos[clave]) {
      grupos[clave] = { ...s, _ids: [s._id], _operariosAll: [...(Array.isArray(s.operarios)?s.operarios:(s.operarios?[s.operarios]:[])) ] };
    } else {
      // Agregar operarios del duplicado al grupo
      const opsNuevos = Array.isArray(s.operarios) ? s.operarios : (s.operarios ? [s.operarios] : []);
      for (const op of opsNuevos) {
        if (!grupos[clave]._operariosAll.includes(op)) grupos[clave]._operariosAll.push(op);
      }
      grupos[clave]._ids.push(s._id);
    }
  }

  const listaAgrupada = Object.values(grupos);

  const cont = document.getElementById('srv-lista');
  if (!cont) return;

  if (listaAgrupada.length === 0) {
    cont.innerHTML = `<div class="card-section"><div style="color:var(--text3);text-align:center;padding:20px">Sin resultados</div></div>`;
    return;
  }

  cont.innerHTML = `<div class="card-section">
    <div class="card-section-title">Mostrando ${listaAgrupada.length} servicios (${lista.length} registros)</div>
    ${listaAgrupada.map(s => {
      const ops = s._operariosAll
        .map(id => _operariosCache.find(o => o._id === id)?.nombre || id)
        .filter(Boolean);
      const supLabel = s.supervisor || (s.idSupervisor ? `Sup. ${s.idSupervisor}` : '');
      // Para editar/eliminar usamos el primer ID del grupo
      const primerIdStr = s._ids[0];
      // Si el grupo tiene múltiples IDs, mostrar badge
      const multiTag = s._ids.length > 1 ? `<span style="background:var(--accent-light);color:var(--accent);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:6px">${s._ids.length} registros</span>` : '';
      return `<div class="list-item">
        <div class="list-item-info" style="padding-right:8px">
          <div class="list-item-name">${s.cliente || '—'} ${s.codigo ? `<span style="color:var(--text3);font-size:11px;font-weight:400">#${s.codigo}</span>` : ''}${multiTag}</div>
          <div class="list-item-sub">📍 ${s.direccion || '<em style="color:var(--text3)">Sin dirección</em>'}</div>
          <div class="list-item-sub">
            ${(s.dias||[]).join(' · ')} &nbsp;·&nbsp; ${s.horaInicio||'--:--'} – ${s.horaFin||'--:--'} &nbsp;·&nbsp; <strong>${((Number(s.horasPorSemana)||((Number(s.horasContratadas)||0)*(s.dias?.length||0)))*4).toFixed(0)}hs/mes</strong>
            ${supLabel ? `&nbsp;·&nbsp; <span style="color:var(--text3)">🏷 ${supLabel}</span>` : ''}
          </div>
          <div style="margin-top:4px">
            ${ops.length === 0
              ? `<em style="font-size:12px;color:var(--text3)">Sin asignar</em>`
              : ops.map(n => `<div style="font-size:12px;color:var(--accent);padding:2px 0">👷 ${n}</div>`).join('')
            }
          </div>
        </div>
        <div class="list-item-actions" style="flex-shrink:0">
          <button class="btn-icon" title="Ver detalle" onclick="verServicio('${primerIdStr}')">👁</button>
          <button class="btn-icon edit" title="Editar" onclick="modalServicio('${primerIdStr}')">✏️</button>
          <button class="btn-icon" title="Eliminar" onclick="eliminarServicioGrupo(${JSON.stringify(s._ids).replace(/"/g,"'")}, '${(s.cliente||'').replace(/'/g,'')}')">🗑</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── MODAL UNIFICADO ALTA / EDICIÓN ──
async function modalServicio(id = null) {
  diasSelServ = [];
  const operarios = await fsList('horas_usuarios');
  let s = {};
  if (id) {
    s = await fsGet('horas_servicios', id);
    diasSelServ = Array.isArray(s.dias) ? [...s.dias] : [];
  }

  const esEdicion = !!id;
  const opsIds = Array.isArray(s.operarios) ? s.operarios : (s.operarios ? [s.operarios] : []);
  const opsList = operarios.filter(o => o.rol === 'OPERARIO').sort((a,b) => a.nombre.localeCompare(b.nombre));

  // Horarios por día — leer estructura existente o heredar el horario general
  // horariosPorDia: { LUN: { inicio, fin, hs }, MAR: {...}, ... }
  let horariosPorDia = {};
  try {
    if (s.horariosPorDia) horariosPorDia = typeof s.horariosPorDia === 'string' ? JSON.parse(s.horariosPorDia) : s.horariosPorDia;
  } catch {}
  // Si no tiene horarios por día pero tiene horario general, precargar en cada día seleccionado
  if (Object.keys(horariosPorDia).length === 0 && s.horaInicio) {
    for (const d of diasSelServ) {
      horariosPorDia[d] = { inicio: s.horaInicio, fin: s.horaFin || '', hs: s.horasContratadas || 0 };
    }
  }

  const m = document.getElementById('modal-container');
  m.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)cerrarModal()">
      <div class="modal">
        <div class="modal-title">${esEdicion ? 'Editar Servicio' : 'Nuevo Servicio'}</div>

        <div class="form-row">
          <div class="field-sm"><label>Código objetivo</label><input id="sv-codigo" placeholder="Ej: 0000895" value="${s.codigo||''}"></div>
          <div class="field-sm"><label>ID Supervisor</label><input id="sv-idsup" placeholder="Ej: 007" value="${s.idSupervisor||''}"></div>
        </div>
        <div class="field-sm"><label>Nombre del cliente / objetivo</label><input id="sv-cliente" placeholder="Ej: Edificio Los Arcos" value="${s.cliente||''}"></div>
        <div class="field-sm"><label>Dirección</label><input id="sv-dir" placeholder="Ej: Av. Colón 1234, Córdoba" value="${s.direccion||''}"></div>
        <div class="field-sm"><label>Supervisor (nombre)</label><input id="sv-sup" placeholder="Ej: SUPERVISION CENTRICA" value="${s.supervisor||''}"></div>
        <div class="field-sm">
          <label>Cliente / Administrador <span style="color:var(--text3);font-size:10px">(para agrupar servicios del mismo cliente)</span></label>
          <input id="sv-admin" placeholder="Ej: Adm Olocco" value="${s.adminCliente||''}">
        </div>

        <!-- DÍAS CON HORARIO POR DÍA -->
        <div class="field-sm">
          <label>Días y horarios</label>
          <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Seleccioná cada día y completá su horario</div>

          <div class="dias-check" style="margin-bottom:10px">
            ${DIAS_SEMANA.map(d => `<button class="dia-btn ${diasSelServ.includes(d)?'sel':''}" id="dia-${d}" onclick="toggleDiaHorario('${d}')">${d}</button>`).join('')}
          </div>

          <!-- Botón para replicar el horario del primero a todos -->
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <button onclick="replicarHorarioATodos()" class="btn-secondary" style="padding:6px 12px;font-size:12px;font-weight:600">
              ↕ Replicar horario del primero a todos los días
            </button>
          </div>

          <!-- Filas de horario por día seleccionado -->
          <div id="sv-horarios-dias">
            ${diasSelServ.map(d => renderFilaDia(d, horariosPorDia[d] || {})).join('')}

        <div class="form-row">
          <div class="field-sm"><label>Radio GPS tolerancia (m)</label><input id="sv-radio" type="number" placeholder="300" value="${s.radioGps||300}"></div>
        </div>

        <div class="field-sm">
          <label>Asignar operarios</label>
          <input id="sv-op-buscar" placeholder="🔍 Filtrar operario..." oninput="filtrarOpsModal()"
            style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;outline:none;margin-bottom:6px">
          <div id="sv-ops-lista" style="max-height:180px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 0">
            ${opsList.map(o => `

                <div class="list-item-info">
                  <div style="font-size:14px;font-weight:500">${o.nombre}</div>
                  <div style="font-size:11px;color:var(--text3)">DNI: ${o.dni||'—'}</div>
                </div>
                <input type="checkbox" id="chk-${o._id}" ${opsIds.includes(o._id)?'checked':''}
                  style="width:20px;height:20px;accent-color:var(--accent);flex-shrink:0">
              </div>`).join('')}
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">Podés seleccionar varios operarios</div>
        </div>

        <div class="modal-actions">

      </div>

      <div style="font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--accent);text-align:center">${dia}</div>
      <div>
        <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:3px">Inicio</div>
        <input type="time" id="h-inicio-${dia}" value="${horario.inicio||''}"
          oninput="calcularHsDia('${dia}')"
          style="width:100%;background:#fff;border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:13px;outline:none">
      </div>
      <div>
        <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:3px">Fin</div>
        <input type="time" id="h-fin-${dia}" value="${horario.fin||''}"
          oninput="calcularHsDia('${dia}')"
          style="width:100%;background:#fff;border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:13px;outline:none">
      </div>
      <div>
        <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:3px">Hs</div>
        <input type="number" id="h-hs-${dia}" value="${horario.hs||''}" step="0.5" placeholder="0"

      </div>
      <div style="padding-top:16px;text-align:center">
        <button onclick="toggleTurno2('${dia}')" id="btn-t2-${dia}" title="${tieneTurno2?'Quitar turno tarde':'Agregar turno tarde'}"

          oninput="calcularHsDia('${dia}')"

      </div>
      <div>
        <input type="time" id="h-fin2-${dia}" value="${horario.fin2||''}"
          oninput="calcularHsDia('${dia}')"
          style="width:100%;background:#fff;border:1px solid rgba(224,123,42,.4);color:var(--text);padding:6px 8px;border-radius:6px;font-size:13px;outline:none">
      </div>
      <div>
        <input type="number" id="h-hs2-${dia}" value="${horario.hs2||''}" step="0.5" placeholder="0"
          style="width:100%;background:#fff;border:1px solid rgba(224,123,42,.4);color:var(--text);padding:6px 8px;border-radius:6px;font-size:13px;outline:none">
      </div>
      <div></div>
    </div>
  </div>`;
}

function toggleTurno2(dia) {
  const t2 = document.getElementById(`turno2-${dia}`);
  const btn = document.getElementById(`btn-t2-${dia}`);
  if (!t2) return;
  const visible = t2.style.display !== 'none';
  if (visible) {
    t2.style.display = 'none';
    btn.textContent = '+';
    btn.style.background = 'var(--surface2)';
    btn.style.color = 'var(--text3)';
    // Limpiar campos turno 2
    ['h-inicio2-','h-fin2-','h-hs2-'].forEach(p => {
      const el = document.getElementById(p+dia);
      if (el) el.value = '';
    });
  } else {
    t2.style.display = 'grid';
    btn.textContent = '−';
    btn.style.background = 'var(--accent)';
    btn.style.color = '#fff';
  }
  calcularHsDia(dia);
}

function calcularHsDia(dia) {
  const ini = document.getElementById(`h-inicio-${dia}`)?.value;
  const fin = document.getElementById(`h-fin-${dia}`)?.value;
  const ini2 = document.getElementById(`h-inicio2-${dia}`)?.value;
  const fin2 = document.getElementById(`h-fin2-${dia}`)?.value;
  let totalHs = 0;
  if (ini && fin) {
    const hs = diffHoras(ini, fin);
    if (hs > 0) totalHs += hs;
  }
  if (ini2 && fin2) {
    const hs2 = diffHoras(ini2, fin2);
    if (hs2 > 0) {
      totalHs += hs2;
      document.getElementById(`h-hs2-${dia}`).value = hs2.toFixed(1);
    }
  }
  if (totalHs > 0) document.getElementById(`h-hs-${dia}`).value = totalHs.toFixed(1);
}

// Obtener el último horario cargado en los días ya seleccionados
function obtenerUltimoHorario() {
  for (let i = diasSelServ.length - 1; i >= 0; i--) {
    const d = diasSelServ[i];
    const ini = document.getElementById(`h-inicio-${d}`)?.value;
    const fin = document.getElementById(`h-fin-${d}`)?.value;
    const hs = document.getElementById(`h-hs-${d}`)?.value;
    if (ini || fin) return { inicio: ini||'', fin: fin||'', hs: Number(hs)||0 };
  }
  return {};
}

function toggleDiaHorario(dia) {
  const btn = document.getElementById('dia-' + dia);
  const cont = document.getElementById('sv-horarios-dias');
  if (!cont) return;

  if (diasSelServ.includes(dia)) {
    // Quitar día
    diasSelServ = diasSelServ.filter(d => d !== dia);
    btn.classList.remove('sel');
    const fila = document.getElementById('fila-dia-' + dia);
    if (fila) fila.remove();
  } else {
    // Agregar día — hereda el horario del último día cargado
    const horarioHeredado = obtenerUltimoHorario();
    diasSelServ.push(dia);
    btn.classList.add('sel');
    diasSelServ.sort((a,b) => DIAS_SEMANA.indexOf(a) - DIAS_SEMANA.indexOf(b));
    // Insertar fila en posición correcta
    const filasActuales = Array.from(cont.children);
    const idxNuevo = diasSelServ.indexOf(dia);
    const newFila = document.createElement('div');
    newFila.innerHTML = renderFilaDia(dia, horarioHeredado);
    const filaEl = newFila.firstElementChild;
    if (idxNuevo >= filasActuales.length) {
      cont.appendChild(filaEl);
    } else {
      cont.insertBefore(filaEl, filasActuales[idxNuevo]);
    }
  }
}

function replicarHorarioATodos() {
  if (diasSelServ.length === 0) return toast('Seleccioná al menos un día primero', 'warn');
  const primero = diasSelServ[0];
  const ini = document.getElementById(`h-inicio-${primero}`)?.value || '';
  const fin = document.getElementById(`h-fin-${primero}`)?.value || '';
  const hs = document.getElementById(`h-hs-${primero}`)?.value || '';
  if (!ini && !fin) return toast('Cargá el horario del primer día primero', 'warn');
  for (const d of diasSelServ) {
    const iEl = document.getElementById(`h-inicio-${d}`);
    const fEl = document.getElementById(`h-fin-${d}`);
    const hEl = document.getElementById(`h-hs-${d}`);
    if (iEl) iEl.value = ini;
    if (fEl) fEl.value = fin;
    if (hEl) hEl.value = hs;
  }
  toast(`✓ Horario replicado a ${diasSelServ.length} días`, 'ok');
}

// Mantener toggleDia para coberturas y otros usos
function toggleDia(dia) {

async function guardarServicio(id = '') {
  const cliente = document.getElementById('sv-cliente').value.trim();
  const direccion = document.getElementById('sv-dir').value.trim();
  const codigo = document.getElementById('sv-codigo').value.trim();
  const idSupervisor = document.getElementById('sv-idsup').value.trim();
  const supervisor = document.getElementById('sv-sup').value.trim();
  const adminCliente = document.getElementById('sv-admin')?.value.trim() || '';
  const radioGps = Number(document.getElementById('sv-radio').value) || 300;
  const operariosSelec = Array.from(document.querySelectorAll('[id^="chk-"]')).filter(c=>c.checked).map(c=>c.id.replace('chk-',''));

  if (!cliente) return toast('El nombre del cliente es obligatorio', 'warn');
  if (diasSelServ.length === 0) return toast('Seleccioná al menos un día', 'warn');

  // Leer horarios por día
  const horariosPorDia = {};
  let hsTotalSemana = 0;
  for (const dia of diasSelServ) {
    const inicio = document.getElementById(`h-inicio-${dia}`)?.value || '';
    const fin = document.getElementById(`h-fin-${dia}`)?.value || '';
    const hs = Number(document.getElementById(`h-hs-${dia}`)?.value) || 0;
    const inicio2 = document.getElementById(`h-inicio2-${dia}`)?.value || '';
    const fin2 = document.getElementById(`h-fin2-${dia}`)?.value || '';
    const hs2 = Number(document.getElementById(`h-hs2-${dia}`)?.value) || 0;
    horariosPorDia[dia] = { inicio, fin, hs };
    if (inicio2 || fin2) horariosPorDia[dia] = { inicio, fin, hs, inicio2, fin2, hs2 };
    hsTotalSemana += hs;
  }

  // Para compatibilidad: guardar también horaInicio/horaFin/horasContratadas del primer día
  const primerDia = diasSelServ[0];
  const horaInicio = horariosPorDia[primerDia]?.inicio || '';
  const horaFin = horariosPorDia[primerDia]?.fin || '';
  // horasContratadas = promedio por jornada (para compatibilidad con cálculos existentes)
  const horasContratadas = diasSelServ.length > 0 ? hsTotalSemana / diasSelServ.length : 0;

  const data = {
    cliente, direccion, codigo, idSupervisor, supervisor, adminCliente,
    horaInicio, horaFin, horasContratadas,
    horasPorSemana: hsTotalSemana,
    radioGps,
    dias: diasSelServ,
    horariosPorDia: JSON.stringify(horariosPorDia),
    operarios: operariosSelec,
    tipo: 'FIJO',
    lat: '', lon: ''
  };

  if (id) {
    await fsDelete('horas_servicios', id);
    const ok = await fsSave('horas_servicios', id, data);
    if (!ok) return toast('❌ Error al guardar — revisá la consola F12', 'error');
    invalidarCache('horas_servicios');
    toast(`✓ ${cliente} actualizado`, 'ok');
  } else {
    const newId = await fsAdd('horas_servicios', data);
    if (!newId) return toast('❌ Error al crear el servicio — revisá la consola F12', 'error');
    invalidarCache('horas_servicios');
    toast(`✓ ${cliente} creado`, 'ok');
  }

  cerrarModal();
  renderServicios();
}

function filtrarAccesos() {
  const q = (document.getElementById('acc-buscar')?.value||'').toLowerCase().replace(/,/g,' ');
  const todos = window._accesosTodos || [];
  ['ADMIN','SUPERVISOR','OPERARIO'].forEach(rol => {

    const key = rol==='ADMIN'?'admins':rol==='SUPERVISOR'?'supervisores':'ops-lista';
    const cont = document.getElementById(`acc-${key}`);
    if (cont) {
      const html = lista.map(u=>renderFilaAcceso(u)).join('');

        const btn = cont.querySelector('button[onclick*="modalNuevoAcceso"]');
        cont.innerHTML = html;
        if (btn) cont.appendChild(btn);
      } else {
        cont.innerHTML = html;
      }

  });
}

async function guardarNuevaPass(id, dni) {
  const pass = document.getElementById('np-pass')?.value.trim();
  const pass2 = document.getElementById('np-pass2')?.value.trim();
  if (!pass) return toast('Ingresá la nueva contraseña', 'warn');
  if (pass.length < 3) return toast('Mínimo 3 caracteres', 'warn');
  if (pass !== pass2) return toast('Las contraseñas no coinciden', 'error');

  showLoader(true);

  // 1. Actualizar en Firestore
  await fsSave('horas_usuarios', id, { password: pass });

  // 2. Actualizar en Firebase Auth
  const API_KEY = 'AIzaSyBg7lvQteUOaHwEyI1qe1OUPK81-9DL0Ng';
  const email = dni + '@megaclean.com.ar';
  let passAuth = pass;
  while (passAuth.length < 6) passAuth = passAuth + passAuth;
  passAuth = passAuth.slice(0,6);

  try {
    // Intentar actualizar via signIn + updatePassword
    const signInRes = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${API_KEY}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: passAuth, returnSecureToken: true})
    });
    // Si falla el login (contraseña vieja distinta), crear usuario nuevo con nueva contraseña
    // Firebase Auth update requires the user's current token — easier approach: delete+recreate
    const signInData = await signInRes.json();
    if (signInData.idToken) {
      // Actualizar contraseña en Firebase Auth
      await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:update?key=${API_KEY}`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({idToken: signInData.idToken, password: passAuth, returnSecureToken: false})
      });
    }
  } catch(e) {
    console.warn('Firebase Auth update:', e);
  }

  invalidarCache('horas_usuarios');
  showLoader(false);
  cerrarModal();
  toast('✓ Contraseña actualizada', 'ok');
  renderGestionAccesos();
}

// ════════════════════════════════════════════
function esMiServicio(s) {
  const supNombre = (currentUser.nombre||'').toUpperCase().trim();
  const supSupervisor = (currentUser.supervisor||'').toUpperCase().trim();
  const supId = currentUser._id || '';
  const supDni = currentUser.dni || '';
  const srvSupervisor = (s.supervisor||'').toUpperCase().trim();
  const srvIdSup = (s.idSupervisor||'').toString().trim();

  // Si el supervisor no tiene campo supervisor configurado → ver todo
  if (!supSupervisor) return true;

  return (
    srvSupervisor.includes(supSupervisor) ||
    supSupervisor.includes(srvSupervisor) && srvSupervisor.length > 3 ||
    srvSupervisor.includes(supNombre) ||
    srvIdSup === supId ||
    srvIdSup === supDni
  );
}

function esMiOperario(o, misServicios) {
  // Un operario es "mío" si está asignado a alguno de mis servicios
  return misServicios.some(s =>
    (Array.isArray(s.operarios)?s.operarios:[]).includes(o._id)
  );
}

async function exportarExcel() {
  toast('Generando Excel...', 'info');
  const [fichadas, operarios, servicios] = await Promise.all([
    fsList('horas_fichadas'), fsList('horas_usuarios'), fsList('horas_servicios')
  ]);

  const mesActual = isoHoy().slice(0,7);
  const fichadasMes = fichadas.filter(f => f.fecha && f.fecha.startsWith(mesActual));

  // Agrupar por operario
  const porOperario = {};
  for (const f of fichadasMes) {
    if (!porOperario[f.operarioId]) porOperario[f.operarioId] = [];
    porOperario[f.operarioId].push(f);
  }

  let csv = 'Operario;DNI;Tipo;Fecha;Cliente;Entrada;Salida;Hs.Reales;Hs.Contratadas;GPS OK;Estado;Observacion\n';

  for (const [opId, fics] of Object.entries(porOperario)) {
    const op = operarios.find(o => o._id === opId);
    for (const f of fics.sort((a,b) => a.fecha.localeCompare(b.fecha))) {
      const srv = servicios.find(s => s._id === f.servicioId);
      csv += [
        f.operarioNombre || '',
        op?.dni || '',
        op?.tipo || 'VARIABLE',
        f.fecha,
        f.clienteNombre || '',
        f.entrada || '',
        f.salida || '',
        f.horasTrabajadas ? f.horasTrabajadas.toFixed(1) : '',
        srv?.horasContratadas || '',
        f.gpsOk ? 'SI' : 'NO',
        f.estado || '',
        f.observacion || ''
      ].join(';') + '\n';
    }
  }

  // Totales por operario
  csv += '\n;TOTALES POR OPERARIO;;\n';
  csv += 'Operario;Tipo;Hs.Mes;Metodo\n';
  for (const [opId, fics] of Object.entries(porOperario)) {
    const op = operarios.find(o => o._id === opId);
    let total;
    if (op?.tipo === 'FIJO') {
      total = (op.horasSemana || 0) * 4;
    } else {
      total = fics.reduce((s, f) => s + (f.horasTrabajadas || 0), 0);
    }
    csv += `${op?.nombre || opId};${op?.tipo || 'VARIABLE'};${total.toFixed(1)};${op?.tipo === 'FIJO' ? 'hs/sem × 4' : 'Suma real fichadas'}\n`;
  }

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `MegaClean_Horas_${mesActual}.csv`;
  a.click();
  toast('✓ Excel exportado', 'ok');
}

          <button class="btn-icon" onclick="eliminarCobertura('${cob._id}')">🗑</button>

  cont.innerHTML = htmlAusencias + htmlOtros;
}

let _adiTipoSrv = 'sin';
function toggleAdiServicio(tipo) {
  _adiTipoSrv = tipo;
  ['sin','existente','manual'].forEach(t => {
    const btn = document.getElementById(`adi-btn-${t}`);
    const bloque = document.getElementById(`adi-srv-${t}`);
    if (btn) {
      btn.style.background = t===tipo ? 'var(--green)' : 'var(--surface2)';
      btn.style.color = t===tipo ? '#fff' : 'var(--text2)';
      btn.style.borderColor = t===tipo ? 'var(--green)' : 'var(--border)';
    }
    if (bloque) bloque.style.display = t===tipo ? 'block' : 'none';
  });

async function guardarAdicional(id='') {
  const opSel = document.getElementById('adi-op');
  const operarioId = opSel?.value;
  const operarioNombre = opSel?.options[opSel.selectedIndex]?.dataset.nombre || opSel?.options[opSel.selectedIndex]?.text?.split(' · ')[0] || '';
  const motivo = document.getElementById('adi-motivo')?.value;
  const descripcion = document.getElementById('adi-desc')?.value.trim() || '';
  const fechaInicio = document.getElementById('adi-finicio')?.value;
  const fechaFin = document.getElementById('adi-ffin')?.value || '';
  const horaInicio = document.getElementById('adi-hinicio')?.value || '';
  const horaFin = document.getElementById('adi-hfin')?.value || '';
  const horasTotal = Number(document.getElementById('adi-hstotal')?.value) || 0;

  if (!operarioId) return toast('Seleccioná un operario', 'warn');
  if (!fechaInicio) return toast('La fecha de inicio es obligatoria', 'warn');

  let clienteNombre = '', clienteManual = '', servicioId = '';
  if (_adiTipoSrv === 'existente') {
    const srvSel = document.getElementById('adi-srv');
    servicioId = srvSel?.value || '';
    clienteNombre = srvSel?.options[srvSel.selectedIndex]?.dataset.nombre || '';
  } else if (_adiTipoSrv === 'manual') {
    clienteManual = document.getElementById('adi-cliente-manual')?.value.trim() || '';
    clienteNombre = clienteManual;
  }

  const data = {
    tipoCob: 'ADICIONAL', operarioId, operarioNombre,
    motivo, descripcion, servicioId, clienteNombre, clienteManual,
    fechaInicio, fechaFin, horaInicio, horaFin, horasTotal,
    estado: 'ACTIVA', creadaPor: currentUser.nombre, fechaCreacion: isoHoy()
  };

  if (id) {
    await fsDelete('horas_coberturas', id);
    await fsSave('horas_coberturas', id, data);
    toast('✓ Adicional actualizado', 'ok');
  } else {
    await fsAdd('horas_coberturas', data);
    toast(`✓ Adicional registrado para ${operarioNombre}`, 'ok');
  }
  invalidarCache('horas_coberturas');
  cerrarModal();
  renderCoberturas();
}

async function guardarAusencia() {
  const ausenteSel = document.getElementById('aus-op');
  const ausenteId = ausenteSel?.value;
  const ausenteNombre = ausenteSel?.options[ausenteSel.selectedIndex]?.dataset.nombre || '';
  const motivo = document.getElementById('aus-motivo')?.value;
  const fechaInicio = document.getElementById('aus-finicio')?.value;
  const fechaFin = document.getElementById('aus-ffin')?.value || '';
  const observaciones = document.getElementById('aus-obs')?.value.trim() || '';

  if (!ausenteId) return toast('Seleccioná el operario ausente', 'warn');
  if (!fechaInicio) return toast('La fecha de inicio es obligatoria', 'warn');

  const servicios = window._aus_servicios || [];
  const misServicios = servicios.filter(s =>
    (Array.isArray(s.operarios)?s.operarios:[]).includes(ausenteId)
  );

  let guardados = 0;

  if (misServicios.length === 0) {
    // Solo novedad sin servicios
    await fsAdd('horas_coberturas', {
      ausenteId, ausenteNombre, motivo, fechaInicio, fechaFin, observaciones,
      operarioId: ausenteId, operarioNombre: ausenteNombre,
      clienteNombre: '— Sin servicio asignado —',
      estado: 'ACTIVA', dias: [], horasContratadas: 0,
      soloNovedad: true, creadaPor: currentUser.nombre, fechaCreacion: isoHoy()
    });
    guardados++;
  } else {
    // Una cobertura por servicio incluido
    for (const s of misServicios) {
      const chk = document.getElementById(`chk-srv-${s._id}`);
      if (!chk?.checked) continue;

      const repSel = document.getElementById(`rep-${s._id}`);
      const reemplazanteId = repSel?.value || '';
      const reemplazanteNombre = reemplazanteId ? (repSel?.options[repSel.selectedIndex]?.dataset.nombre || repSel?.options[repSel.selectedIndex]?.text?.split(' · ')[0] || '') : '';

      await fsAdd('horas_coberturas', {
        ausenteId, ausenteNombre, motivo, fechaInicio, fechaFin, observaciones,
        operarioId: reemplazanteId || ausenteId,
        operarioNombre: reemplazanteNombre || ausenteNombre,
        reemplazanteId, reemplazanteNombre,
        servicioId: s._id, clienteNombre: s.cliente||'',
        horaInicio: s.horaInicio||'', horaFin: s.horaFin||'',
        horasContratadas: s.horasContratadas||0, dias: s.dias||[],
        estado: 'ACTIVA', creadaPor: currentUser.nombre, fechaCreacion: isoHoy()
      });
      guardados++;
    }
  }

  invalidarCache('horas_coberturas');
  cerrarModal();
  toast(`✓ Ausencia registrada — ${guardados} cobertura${guardados!==1?'s':''} creadas`, 'ok');
  renderCoberturas();
}

// ── REPORTE NOVEDADES LIQUIDACIÓN ──
async function exportarNovedadesLiquidacion() {
  const coberturas = await fsList('horas_coberturas');
  const mes = isoHoy().slice(0,7);
  const [y,m] = mes.split('-');
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // Filtrar ausencias del mes (por fecha inicio)
  const delMes = coberturas.filter(c => c.ausenteNombre && c.fechaInicio?.startsWith(mes));

  if (!delMes.length) {
    // Si no hay del mes actual, tomar todos
    const todos = coberturas.filter(c => c.ausenteNombre);
    if (!todos.length) return toast('Sin novedades para exportar', 'warn');
  }

  const lista = delMes.length ? delMes : coberturas.filter(c => c.ausenteNombre);

  // Agrupar por ausente para calcular días totales
  const porAusente = {};
  for (const cob of lista) {
    const k = cob.ausenteId || cob.ausenteNombre;
    if (!porAusente[k]) porAusente[k] = {
      nombre: cob.ausenteNombre, motivo: cob.motivo,
      fechaInicio: cob.fechaInicio, fechaFin: cob.fechaFin,
      observaciones: cob.observaciones, servicios: []
    };
    if (cob.clienteNombre && !cob.soloNovedad) {
      porAusente[k].servicios.push(`${cob.clienteNombre} → ${cob.reemplazanteNombre||'Sin reemplazante'}`);
    }
  }

  let csv = `NOVEDADES PARA LIQUIDACIÓN;${meses[parseInt(m)-1]} ${y}\n\n`;
  csv += `Operario;Motivo;Fecha Inicio;Fecha Fin;Días Ausencia;Servicios Cubiertos;Observaciones\n`;

  for (const nov of Object.values(porAusente)) {
    // Calcular días de ausencia
    let diasAusencia = '';
    if (nov.fechaInicio) {
      const fi = new Date(nov.fechaInicio);
      const ff = nov.fechaFin ? new Date(nov.fechaFin) : new Date();
      const diff = Math.round((ff - fi) / (1000*60*60*24)) + 1;
      diasAusencia = diff;
    }
    csv += [
      nov.nombre, nov.motivo, nov.fechaInicio||'',
      nov.fechaFin||'abierto', diasAusencia,
      nov.servicios.join(' / ') || '—',
      nov.observaciones||''
    ].join(';') + '\n';
  }

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `Novedades_Liquidacion_${mes}.csv`;
  link.click();
  toast('✓ Novedades de liquidación exportadas', 'ok');
}

async function guardarCobertura(id = '') {
  const opSel = document.getElementById('cob-op');
  const motivo = document.getElementById('cob-motivo').value;
  const esFacturable = motivo === 'Facturable';

  const operarioId = opSel?.value || '';
  const operarioNombre = opSel?.options[opSel.selectedIndex]?.dataset.nombre || opSel?.options[opSel.selectedIndex]?.text?.split(' · ')[0] || '';

  // Resolver servicioId y clienteNombre según tipo
  let servicioId = '', clienteNombre = '', clienteNombreManual = '', direccionManual = '';
  if (esFacturable) {
    if (_tipoObjetivoFact === 'manual') {
      clienteNombreManual = document.getElementById('fact-cliente')?.value.trim() || '';
      direccionManual = document.getElementById('fact-dir')?.value.trim() || '';
      clienteNombre = clienteNombreManual;
      if (!clienteNombreManual) return toast('Ingresá el nombre del trabajo', 'warn');
    } else {
      const srvSel2 = document.getElementById('cob-srv2');
      servicioId = srvSel2?.value || '';
      clienteNombre = srvSel2?.options[srvSel2.selectedIndex]?.text?.split(' #')[0] || '';
    }
  } else {
    const srvSel = document.getElementById('cob-srv');
    servicioId = srvSel?.value || '';
    clienteNombre = srvSel?.options[srvSel.selectedIndex]?.text?.split(' #')[0] || '';
  }

  const fechaInicio = document.getElementById('cob-finicio').value;
  const fechaFin = document.getElementById('cob-ffin').value;
  const horaInicio = document.getElementById('cob-hinicio').value;
  const horaFin = document.getElementById('cob-hfin').value;
  const horasContratadas = Number(document.getElementById('cob-hs').value) || 0;
  const horasExtraAutorizadas = Number(document.getElementById('cob-hsextra').value) || 0;
  const observaciones = document.getElementById('cob-obs').value.trim();
  const precio = esFacturable && currentUser.rol === 'ADMIN' ? Number(document.getElementById('cob-precio')?.value) || 0 : undefined;

  if (!operarioId) return toast('Seleccioná un operario', 'warn');
  if (!esFacturable && !servicioId) return toast('Seleccioná un servicio', 'warn');
  if (!fechaInicio) return toast('La fecha de inicio es obligatoria', 'warn');
  if (_diasSelCob.length === 0) return toast('Seleccioná al menos un día', 'warn');

  const data = {
    operarioId, operarioNombre, servicioId, clienteNombre,
    clienteNombreManual, direccionManual,
    motivo, fechaInicio, fechaFin,
    horaInicio, horaFin, horasContratadas,
    horasExtraAutorizadas, observaciones,
    dias: _diasSelCob,
    tipoObjetivo: esFacturable ? _tipoObjetivoFact : 'existente',
    estado: 'ACTIVA',
    creadaPor: currentUser.nombre
  };
  if (precio !== undefined) data.precio = precio;
  if (!id) data.fechaCreacion = isoHoy();

  if (id) {
    // Preservar estado actual antes de recrear
    const cobActual = await fsGet('horas_coberturas', id);
    data.estado = cobActual?.estado || 'ACTIVA';
    data.fechaCreacion = cobActual?.fechaCreacion || isoHoy();
    await fsDelete('horas_coberturas', id);
    await fsSave('horas_coberturas', id, data);
    toast(`✓ Cobertura actualizada`, 'ok');
  } else {
    await fsAdd('horas_coberturas', data);
    toast(`✓ Cobertura creada para ${operarioNombre}`, 'ok');
  }

  cerrarModal();
  renderCoberturas();
}

async function exportarFacturables() {

  const fichadas = await fsList('horas_fichadas');
  const mes = isoHoy().slice(0,7);

  // Filtrar facturables del mes actual (por fecha inicio)

    const todos = coberturas.filter(c => c.motivo === 'Facturable');
    if (!todos.length) return toast('No hay coberturas facturables registradas', 'warn');
  }

  const lista = facturables.length ? facturables : coberturas.filter(c => c.motivo === 'Facturable');

  let csv = `REPORTE TRABAJOS FACTURABLES;${mes}\n\n`;
  csv += `Operario;Cliente / Trabajo;Dirección;Fecha Inicio;Fecha Fin;Días;Horario;Hs/Jornada;Precio;Estado;Observaciones\n`;

  for (const c of lista.sort((a,b) => (a.fechaInicio||'').localeCompare(b.fechaInicio||''))) {
    // Calcular horas totales fichadas
    const fichadasCob = fichadas.filter(f =>
      f.operarioId === c.operarioId &&
      f.coberturaId === c._id
    );
    const hsTotales = fichadasCob.reduce((s,f) => s + (f.horasTrabajadas||0), 0);

    const dir = c.direccionManual || '';
    const precio = currentUser.rol === 'ADMIN' ? (c.precio || '') : '(restringido)';
    csv += [
      c.operarioNombre||'',
      c.clienteNombre||'',
      dir,
      c.fechaInicio||'',
      c.fechaFin||'indefinida',
      (c.dias||[]).join('-'),
      `${c.horaInicio||''}–${c.horaFin||''}`,
      c.horasContratadas||0,
      precio,
      c.estado||'',
      c.observaciones||''
    ].join(';') + '\n';
  }

  // Totales
  const totalPrecio = currentUser.rol === 'ADMIN'
    ? lista.reduce((s,c) => s + (Number(c.precio)||0), 0)
    : null;
  csv += `\n`;
  if (totalPrecio !== null) csv += `;TOTAL A FACTURAR:;${totalPrecio.toLocaleString('es-AR', {minimumFractionDigits:2})}\n`;

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `Facturables_MegaClean_${mes}.csv`;
  link.click();
  toast('✓ Reporte facturables exportado', 'ok');
}

let _feriadosCache = [];

function formatFecha(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function diaSemanaDeISO(iso) {
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  return dias[new Date(iso + 'T12:00:00').getDay()];
}

async function renderFeriados() {
  const c = document.getElementById('main-content');
  c.innerHTML = `<div class="section-title">Feriados</div><div style="text-align:center;padding:30px;color:var(--text3)">Cargando...</div>`;

  _feriadosCache = feriados.sort((a,b) => a.fecha.localeCompare(b.fecha));

  const hoy = isoHoy();
  const proximos = _feriadosCache.filter(f => f.fecha >= hoy);
  const pasados  = _feriadosCache.filter(f => f.fecha < hoy);
  const totalAsig = _feriadosCache.reduce((s,f) => s + parsearAsignaciones(f.asignaciones).length, 0);

  c.innerHTML = `

    ${pasados.length > 0 ? `<div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:16px 0 8px">Historial</div>${pasados.map(f => renderFeriadoCard(f, true)).join('')}` : ''}

function parsearAsignaciones(raw) {
  if (!raw || !Array.isArray(raw)) return [];
  return raw.map(a => { try { return typeof a === 'string' ? JSON.parse(a) : a; } catch { return null; } }).filter(Boolean);
}

  m.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)cerrarModal()">
      <div class="modal">

async function guardarFeriado(id = '') {
  const fecha   = document.getElementById('fer-fecha').value;
  const nombre  = document.getElementById('fer-nombre').value.trim();
  const descripcion = document.getElementById('fer-desc').value.trim();
  if (!fecha)  return toast('La fecha es obligatoria', 'warn');
  if (!nombre) return toast('El nombre es obligatorio', 'warn');
  if (id) {
    await fsSave('horas_feriados', id, { fecha, nombre, descripcion });
    toast(`✓ ${nombre} actualizado`, 'ok');
  } else {
    await fsAdd('horas_feriados', { fecha, nombre, descripcion, asignaciones: [], creadoPor: currentUser.nombre, fechaCreacion: isoHoy() });
    toast(`✓ Feriado "${nombre}" creado`, 'ok');
  }
  cerrarModal(); renderFeriados();
}

async function eliminarFeriado(id, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"?`)) return;
  await fsDelete('horas_feriados', id);
  toast(`${nombre} eliminado`, 'ok');
  renderFeriados();
}

async function guardarAsigFeriado(feriadoId) {
  const opSel  = document.getElementById('fasig-op');
  const srvSel = document.getElementById('fasig-srv');
  const operarioId      = opSel?.value || '';
  const operarioNombre  = opSel?.options[opSel.selectedIndex]?.dataset?.nombre || '';
  const servicioId      = srvSel?.value || '';
  const clienteNombre   = srvSel?.options[srvSel.selectedIndex]?.dataset?.nombre || '';
  const horaInicio      = document.getElementById('fasig-hi').value;
  const horaFin         = document.getElementById('fasig-hf').value;
  const horasEstimadas  = Number(document.getElementById('fasig-hs').value) || 0;
  const nota            = document.getElementById('fasig-nota').value.trim();

  if (!operarioId) return toast('Seleccioná un operario', 'warn');
  if (!servicioId) return toast('Seleccioná un objetivo', 'warn');
  if (!horaInicio || !horaFin) return toast('Ingresá el horario', 'warn');

  const feriado = await fsGet('horas_feriados', feriadoId);
  const actuales = parsearAsignaciones(feriado?.asignaciones);
  if (actuales.find(a => a.operarioId === operarioId)) return toast('Operario ya asignado', 'warn');

  const nueva = { operarioId, operarioNombre, servicioId, clienteNombre, horaInicio, horaFin, horasEstimadas, nota };
  const nuevas = [...actuales, nueva].map(a => JSON.stringify(a));
  await fsSave('horas_feriados', feriadoId, { asignaciones: nuevas });
  toast(`✓ ${operarioNombre} asignado`, 'ok');
  cerrarModal(); renderFeriados();
}

async function eliminarAsignacionFeriado(feriadoId, operarioId) {
  if (!confirm('¿Quitar este operario del feriado?')) return;
  const feriado = await fsGet('horas_feriados', feriadoId);
  const nuevas = parsearAsignaciones(feriado?.asignaciones)
    .filter(a => a.operarioId !== operarioId)
    .map(a => JSON.stringify(a));
  await fsSave('horas_feriados', feriadoId, { asignaciones: nuevas });
  toast('Operario quitado', 'ok'); renderFeriados();
}

// ── EXPORTAR UN FERIADO ──
async function exportarFeriado(feriadoId) {
  const feriado = await fsGet('horas_feriados', feriadoId);
  if (!feriado) return toast('No se encontró el feriado', 'error');
  const fichadasDia = (await fsList('horas_fichadas')).filter(f => f.fecha === feriado.fecha);
  const asigs = parsearAsignaciones(feriado.asignaciones);

  let csv = `REPORTE FERIADO;${feriado.nombre};${formatFecha(feriado.fecha)}\n\n`;
  csv += `Operario;Objetivo;Hora Entrada;Hora Salida;Hs Trabajadas;Hs Estimadas;GPS OK;Diferencia (hs)\n`;
  for (const a of asigs) {
    const f = fichadasDia.find(f => f.operarioId === a.operarioId && f.servicioId === a.servicioId);
    const hs = f?.horasTrabajadas || 0;
    csv += [a.operarioNombre, a.clienteNombre, f?.entrada||'', f?.salida||'', hs?hs.toFixed(1):'(sin fichar)', a.horasEstimadas||0, f?(f.gpsOk?'SI':'NO'):'—', hs?(hs-(a.horasEstimadas||0)).toFixed(1):'—'].join(';') + '\n';
  }
  const totalEst  = asigs.reduce((s,a) => s+(a.horasEstimadas||0), 0);
  const totalReal = asigs.reduce((s,a) => { const f=fichadasDia.find(f=>f.operarioId===a.operarioId&&f.servicioId===a.servicioId); return s+(f?.horasTrabajadas||0); }, 0);
  csv += `\n;;TOTALES;;;${totalReal.toFixed(1)};${totalEst.toFixed(1)};;\n`;

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `Feriado_${feriado.nombre.replace(/\s+/g,'_')}_${feriado.fecha}.csv`;
  link.click(); toast('✓ Reporte exportado', 'ok');
}

// ── EXPORTAR TODOS LOS FERIADOS DEL MES ──
async function exportarFeriadosMes() {
  const mes = isoHoy().slice(0,7);
  const feriados = (await fsList('horas_feriados')).filter(f => f.fecha?.startsWith(mes));
  if (!feriados.length) return toast('No hay feriados este mes', 'warn');
  const fichadas = await fsList('horas_fichadas');

  let csv = `REPORTE FERIADOS;${mes}\n\n`;
  csv += `Feriado;Fecha;Dia;Operario;Objetivo;Hs Estimadas;Hs Reales;GPS OK;Diferencia\n`;
  for (const fer of feriados.sort((a,b)=>a.fecha.localeCompare(b.fecha))) {
    const asigs = parsearAsignaciones(fer.asignaciones);
    if (!asigs.length) { csv += `${fer.nombre};${formatFecha(fer.fecha)};${diaSemanaDeISO(fer.fecha)};Sin asignaciones;;;;;;;\n`; continue; }
    for (const a of asigs) {
      const f = fichadas.find(f => f.fecha===fer.fecha && f.operarioId===a.operarioId && f.servicioId===a.servicioId);
      const hs = f?.horasTrabajadas||0;
      csv += [fer.nombre, formatFecha(fer.fecha), diaSemanaDeISO(fer.fecha), a.operarioNombre, a.clienteNombre, a.horasEstimadas||0, hs?hs.toFixed(1):'(sin fichar)', f?(f.gpsOk?'SI':'NO'):'—', hs?(hs-(a.horasEstimadas||0)).toFixed(1):'—'].join(';') + '\n';
    }
  }
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `Feriados_${mes}.csv`;
  link.click(); toast('✓ Reporte mensual exportado', 'ok');
}
