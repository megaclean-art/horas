function log(msg, type='info') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = type; d.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function pb(pct) { document.getElementById('pb').style.width = pct + '%'; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function normNombre(n) {
  return n.toUpperCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^A-Z0-9\s,]/g,'').trim();
}

function toFS(data) {
  const fields = {};
  for (const [k,v] of Object.entries(data)) {
    if (typeof v === 'string') fields[k] = {stringValue: v};
    else if (typeof v === 'number') fields[k] = {integerValue: String(v)};
    else if (typeof v === 'boolean') fields[k] = {booleanValue: v};
  }
  return {fields};
}

async function run() {
  document.getElementById('btn').disabled = true;
  log('Leyendo operarios de Firebase...', 'info');

  const r = await fetch(API + '/horas_usuarios?pageSize=300');
  const d = await r.json();
  if (!d.documents) { log('Sin operarios en Firebase', 'err'); return; }

  log('Operarios en Firebase: ' + d.documents.length, 'info');

  let ok = 0, noMatch = 0, errors = 0;
  const total = DATA.length;

  for (let i = 0; i < DATA.length; i++) {
    const rec = DATA[i];
    const recNorm = normNombre(rec.nombre);

    // Buscar por nombre normalizado
    const doc = d.documents.find(doc => {
      const nombre = doc.fields?.nombre?.stringValue || '';
      return normNombre(nombre) === recNorm;
    });

    if (!doc) {
      noMatch++;
      if (noMatch <= 10) log('Sin match: ' + rec.nombre, 'warn');
      pb((i+1)/total*100);
      continue;
    }

    const docId = doc.name.split('/').pop();
    const mask = 'updateMask.fieldPaths=legajo&updateMask.fieldPaths=horasRecibo';
    const res = await fetch(API + '/horas_usuarios/' + docId + '?' + mask, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(toFS({ legajo: rec.legajo, horasRecibo: rec.horasRecibo }))
    });

    if (res.ok) { ok++; }
    else { errors++; log('Error actualizando: ' + rec.nombre, 'err'); }

    if ((i+1) % 20 === 0 || i === total-1) {
      log('Procesados: ' + (i+1) + '/' + total + ' · OK: ' + ok + ' · Sin match: ' + noMatch, 'ok');
      pb((i+1)/total*100);
      await sleep(80);
    }
  }

  document.getElementById('stat-ok').textContent = ok;
  document.getElementById('stat-nm').textContent = noMatch;

  log('', 'info');
  log('✅ IMPORTACIÓN COMPLETA', 'ok');
  log('Actualizados: ' + ok + ' · Sin match: ' + noMatch + ' · Errores: ' + errors, 'info');
  if (noMatch > 0) log('Los sin match pueden tener pequeñas diferencias de nombre. Revisá manualmente.', 'warn');
  pb(100);
  document.getElementById('btn').textContent = '✓ COMPLETADO';
}
