// Índice por código para lookup rápido
const idx = {};
for (const r of DIRS) idx[r.codigo] = r;

function log(msg, type='info') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'log-' + type;
  d.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
function pb(pct) { document.getElementById('pb').style.width = pct + '%'; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function toFS(data) {
  const fields = {};
  for (const [k, v] of Object.entries(data)) {
    if (typeof v === 'string') fields[k] = { stringValue: v };
    else if (typeof v === 'number') fields[k] = { doubleValue: v };
    else if (typeof v === 'boolean') fields[k] = { booleanValue: v };
    else fields[k] = { stringValue: String(v) };
  }
  return { fields };
}

async function run() {
  document.getElementById('btn').disabled = true;
  log('Leyendo servicios de Firebase...', 'info');

  // Traer todos los servicios
  const r = await fetch(API + '/horas_servicios?pageSize=500');
  const d = await r.json();
  if (!d.documents) { log('No se encontraron servicios en Firebase. ¿Ya corriste el importador?', 'err'); return; }

  log('Servicios en Firebase: ' + d.documents.length, 'info');

  let matched = 0, noMatch = 0, updated = 0, errors = 0;
  const total = d.documents.length;

  for (let i = 0; i < d.documents.length; i++) {
    const doc = d.documents[i];
    const docId = doc.name.split('/').pop();
    const campos = doc.fields || {};
    const codigo = campos.codigo?.stringValue || '';

    const dir = idx[codigo];
    if (!dir) {
      noMatch++;
      continue;
    }

    matched++;

    // Actualizar direccion + idSupervisor
    const patch = {
      direccion: dir.direccion,
      idSupervisor: dir.idSupervisor
    };
    const mask = Object.keys(patch).map(k => 'updateMask.fieldPaths=' + k).join('&');
    const res = await fetch(API + '/horas_servicios/' + docId + '?' + mask, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(toFS(patch))
    });

    if (res.ok) {
      updated++;
    } else {
      errors++;
      log('Error en ' + docId, 'err');
    }

    // Log cada 30
    if ((i + 1) % 30 === 0 || i === total - 1) {
      log('Procesados: ' + (i+1) + '/' + total + ' · Actualizados: ' + updated + ' · Sin match: ' + noMatch, 'ok');
      pb(((i + 1) / total) * 100);
      await sleep(100);
    }
  }

  document.getElementById('stat-match').textContent = matched;
  document.getElementById('stat-nodir').textContent = noMatch;

  log('', 'info');
  log('✅ ACTUALIZACIÓN COMPLETA', 'ok');
  log('Actualizados: ' + updated + ' servicios con dirección + ID supervisor', 'ok');
  if (noMatch > 0) log('Sin coincidencia: ' + noMatch + ' servicios (códigos no encontrados en el Excel)', 'warn');
  if (errors > 0) log('Errores: ' + errors, 'err');

  pb(100);
  document.getElementById('btn').textContent = '✓ COMPLETADO';
}
